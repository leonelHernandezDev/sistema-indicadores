<div class="workspace-container">
  <div class="d-flex align-items-center mb-3">
    <h3 class="mb-0 fw-bold text-white">
      <i class="bi bi-sliders me-2"></i>Configuración
    </h3>
  </div>

  <ul class="nav nav-pills mb-3" id="configTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button
        class="nav-link active"
        id="periodos-tab"
        data-bs-toggle="pill"
        data-bs-target="#panel-periodos"
        type="button"
        role="tab"
      >
        <i class="bi bi-calendar-range me-2"></i>Periodos Escolares
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button
        class="nav-link"
        id="materias-tab"
        data-bs-toggle="pill"
        data-bs-target="#panel-materias"
        type="button"
        role="tab"
      >
        <i class="bi bi-book me-2"></i>Materias y Asignaturas
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button
        class="nav-link"
        id="grupos-tab"
        data-bs-toggle="pill"
        data-bs-target="#panel-grupos"
        type="button"
        role="tab"
      >
        <i class="bi bi-people-fill me-2"></i>Gestión de Grupos
      </button>
    </li>
  </ul>

  <div class="tab-content panel-fill" id="configTabsContent">
    <div
      class="tab-pane fade show active h-100"
      id="panel-periodos"
      role="tabpanel"
    >
      <div class="row h-100 g-3">
        <div class="col-md-4 col-xl-3">
          <div class="card h-100 border-0">
            <div class="card-header border-0">
              <span class="text-uppercase small text-muted fw-bold"
                >Nuevo Periodo</span
              >
            </div>
            <div class="card-body">
              <form id="form-periodo">
                <div class="mb-3">
                  <label class="form-label text-muted small"
                    >Nombre (AAAA-P)</label
                  >
                  <input
                    type="text"
                    class="form-control form-control-lg text-uppercase"
                    id="nombre_periodo"
                    placeholder="Ej: 2025-1"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  <i class="bi bi-plus-lg"></i> Agregar
                </button>
              </form>
            </div>
          </div>
        </div>
        <div class="col-md-8 col-xl-9">
          <div class="card h-100 border-0 panel-fill">
            <div class="card-header border-0 d-flex justify-content-between">
              <span class="text-uppercase small text-muted fw-bold"
                >Periodos Registrados</span
              >
            </div>
            <div class="scroll-container">
              <table class="table table-hover align-middle">
                <thead>
                  <tr>
                    <th class="ps-4">Periodo</th>
                    <th class="text-end pe-4">Acciones</th>
                  </tr>
                </thead>
                <tbody id="periodos-table-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-pane fade h-100" id="panel-materias" role="tabpanel">
      <div class="row h-100 g-3">
        <div class="col-md-4 col-xl-3">
          <div class="card h-100 border-0">
            <div class="card-header border-0">
              <span class="text-uppercase small text-muted fw-bold"
                >Gestión de Materia</span
              >
            </div>
            <div class="card-body">
              <form id="form-materia">
                <div class="mb-3">
                  <label class="form-label text-muted small"
                    >Nombre Asignatura</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="nombre_materia"
                    placeholder="Ej: Cálculo Integral"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label text-muted small"
                    >Semestre Ideal</label
                  >
                  <input
                    type="number"
                    class="form-control"
                    id="semestre_materia"
                    min="1"
                    max="12"
                    value="1"
                    required
                  />
                </div>
                <div class="mb-4">
                  <label class="form-label text-muted small"
                    >Créditos de la Materia</label
                  >
                  <input
                    type="number"
                    class="form-control"
                    id="creditos_materia"
                    min="1"
                    max="50"
                    value="5"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-success w-100">
                  <i class="bi bi-save me-2"></i> Guardar Materia
                </button>
              </form>
            </div>
          </div>
        </div>
        <div class="col-md-8 col-xl-9">
          <div class="card h-100 border-0 panel-fill">
            <div class="card-header border-0 d-flex justify-content-between">
              <span class="text-uppercase small text-muted fw-bold"
                >Catálogo de Materias</span
              >
            </div>
            <div class="scroll-container">
              <table class="table table-hover align-middle">
                <thead>
                  <tr>
                    <th class="ps-4">Semestre</th>
                    <th>Asignatura</th>
                    <th class="text-center">Créditos</th>
                    <th class="text-end pe-4">Acciones</th>
                  </tr>
                </thead>
                <tbody id="materias-table-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-pane fade h-100" id="panel-grupos" role="tabpanel">
      <div class="row h-100 g-3">
        <div class="col-md-4 col-xl-3">
          <div class="card h-100 border-0">
            <div class="card-header border-0">
              <span class="text-uppercase small text-muted fw-bold"
                >Crear Grupo</span
              >
            </div>
            <div class="card-body">
              <form id="form-grupo">
                <div class="mb-3">
                  <label class="form-label text-muted small"
                    >Periodo Escolar</label
                  >
                  <select class="form-select" id="grupo_periodo" required>
                    <option value="">Cargando...</option>
                  </select>
                </div>
                <div class="mb-4">
                  <label class="form-label text-muted small"
                    >Nombre del Grupo</label
                  >
                  <input
                    type="text"
                    class="form-control text-uppercase"
                    id="nombre_grupo"
                    placeholder="Ej: 381"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  <i class="bi bi-plus-lg"></i> Agregar Grupo
                </button>
              </form>
            </div>
          </div>
        </div>
        <div class="col-md-8 col-xl-9">
          <div class="card h-100 border-0 panel-fill">
            <div class="card-header border-0 d-flex justify-content-between">
              <span class="text-uppercase small text-muted fw-bold"
                >Catálogo Oficial de Grupos</span
              >
            </div>
            <div class="scroll-container">
              <table class="table table-hover align-middle">
                <thead>
                  <tr>
                    <th class="ps-4">Nombre del Grupo</th>
                    <th class="text-end pe-4">Acciones</th>
                  </tr>
                </thead>
                <tbody id="grupos-table-body">
                  <tr>
                    <td colspan="2" class="text-center text-muted py-4">
                      Selecciona un periodo a la izquierda para ver sus grupos
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
