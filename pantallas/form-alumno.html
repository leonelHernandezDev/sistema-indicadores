<div class="d-flex justify-content-between align-items-center mb-3">
  <h1><i class="bi bi-person-plus-fill"></i> Agregar Nuevo Alumno</h1>
  <button class="btn btn-secondary" id="btn-volver-alumnos">
    <i class="bi bi-arrow-left"></i> Volver al listado
  </button>
</div>
<p class="lead">
  Llena los datos para registrar un nuevo estudiante en el sistema.
</p>
<hr />

<form id="form-alumno" class="row g-3">
  <div class="col-md-4">
    <label for="numero_control" class="form-label">Número de Control *</label>
    <input type="text" class="form-control" id="numero_control" required />
  </div>
  <div class="col-md-8">
    <label for="nombre" class="form-label">Nombre(s) *</label>
    <input type="text" class="form-control" id="nombre" required />
  </div>

  <div class="col-md-6">
    <label for="apellido_paterno" class="form-label">Apellido Paterno *</label>
    <input type="text" class="form-control" id="apellido_paterno" required />
  </div>
  <div class="col-md-6">
    <label for="apellido_materno" class="form-label">Apellido Materno</label>
    <input type="text" class="form-control" id="apellido_materno" />
  </div>

  <div class="col-md-4">
    <label for="genero" class="form-label">Género</label>
    <select id="genero" class="form-select">
      <option value="Masculino" selected>Masculino</option>
      <option value="Femenino">Femenino</option>
      <option value="Otro">Otro</option>
    </select>
  </div>
  <div class="col-md-4">
    <label for="fecha_nacimiento" class="form-label">Fecha de Nacimiento</label>
    <input type="date" class="form-control" id="fecha_nacimiento" />
  </div>
  <div class="col-md-4">
    <label for="status" class="form-label">Status *</label>
    <select id="status" class="form-select">
      <option value="Activo" selected>Activo</option>
      <option value="Egresado">Egresado</option>
      <option value="Desertor">Desertor</option>
    </select>
  </div>

  <div class="col-md-6">
    <label for="id_periodo_ingreso_fk" class="form-label"
      >Periodo de Ingreso *</label
    >
    <select id="id_periodo_ingreso_fk" class="form-select" required>
      <option value="" selected disabled>Cargando periodos...</option>
    </select>
  </div>

  <div class="col-12 mt-4">
    <button type="submit" class="btn btn-primary btn-lg">
      <i class="bi bi-save-fill"></i> Guardar Alumno
    </button>
  </div>
</form>

<div id="form-message" class="alert mt-3 d-none" role="alert"></div>
