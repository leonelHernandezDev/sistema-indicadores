        // Función reutilizable actualizada para realizar la COMPOSICIÓN visual
        const aplicarMembretes = (doc, orientation = 'portrait') => {
          const pageWidth = doc.internal.pageSize.getWidth();
          const pageHeight = doc.internal.pageSize.getHeight();
          
          const margenSeguro = 15; 

          try {
            // 1. CAPA BASE (Membrete Superior) - FULL BLEED
            doc.addImage(baseMembreteB64, 'PNG', 0, 0, pageWidth, 0); 

            // 2. CAPA SUPERIOR (Logotipo)
            const logoWidth = orientation === 'portrait' ? 60 : 75; 
            const logoX = pageWidth - margenSeguro - logoWidth; 
            const logoY = 12; 
            doc.addImage(logoMejoradoB64, 'PNG', logoX, logoY, logoWidth, 0);

            // 3. PIE DE PÁGINA - FULL BLEED
            // ¡AJUSTE VISUAL AQUÍ! Aumentamos la resta a 45 para subir la imagen 
            // y compensar el crecimiento proporcional de su altura.
            doc.addImage(footerB64, 'PNG', 0, pageHeight - 40, pageWidth, 0);
            
          } catch (e) {
            console.warn("Advertencia Visual Premium: No se pudieron cargar o componer los membretes. Verifica Base64.");
          }
        };


        // =========================================================
        // REPORTE 1: ALERTA TEMPRANA (PDF)
        // =========================================================
        const repAlertaPeriodo = document.getElementById("rep-alerta-periodo");
        const btnExportAlerta = document.getElementById("btn-export-alerta-pdf");

        try {
          const periodos = await window.electronAPI.invoke("get-periodos");
          repAlertaPeriodo.innerHTML = '<option value="">Seleccione Periodo...</option>';
          periodos.forEach(p => repAlertaPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`);
        } catch (e) {}

        if (btnExportAlerta) {
          btnExportAlerta.addEventListener("click", async () => {
            const id_periodo = repAlertaPeriodo.value;
            if (!id_periodo) return window.electronAPI.invoke("dialog-alert", "Selecciona un periodo.");

            const textPer = repAlertaPeriodo.options[repAlertaPeriodo.selectedIndex].text;
            const originalBtn = btnExportAlerta.innerHTML;
            btnExportAlerta.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

            try {
              const reporte = await window.electronAPI.invoke("get-alerta-temprana", id_periodo);
              if (reporte.length === 0) {
                btnExportAlerta.innerHTML = originalBtn;
                return window.electronAPI.invoke("dialog-alert", "No se detectaron alumnos en riesgo.");
              }

              const doc = new jsPDF("landscape");
              aplicarMembretes(doc, 'landscape');

              // --- AJUSTE DE COORDENADAS 'Y' ---
              doc.setFont("helvetica", "bold");
              doc.setFontSize(16);
              doc.setTextColor(180, 0, 0);
              // Título: Estaba en 40, lo movemos a 60
              doc.text("SISTEMA DE ALERTA TEMPRANA Y PREVENCIÓN DE DESERCIÓN", 148, 60, { align: "center" });
              
              doc.setFontSize(11);
              doc.setTextColor(60, 60, 60);
              // Datos de Periodo: Estaban en 52, movemos a 72
              doc.text(`Periodo Evaluado: `, 14, 72);
              doc.setFont("helvetica", "normal");
              doc.text(`${textPer}`, 48, 72);
              
              doc.setFont("helvetica", "bold");
              // Datos de Riesgo: Estaban en 58, movemos a 78
              doc.text(`Alumnos en Riesgo Detectados: `, 14, 78);
              doc.setFont("helvetica", "normal");
              doc.setTextColor(180, 0, 0);
              doc.text(`${reporte.length}`, 72, 78);

              const bodyData = reporte.map(a => [
                a.numero_control,
                a.nombre_completo,
                a.materias_reprobadas_actuales,
                a.materias_recurse.length > 0 ? a.materias_recurse.join("\n") : "-",
                a.materias_especial.length > 0 ? a.materias_especial.join("\n") : "-"
              ]);

              doc.autoTable({
                // --- AJUSTE DE START_Y DE LA TABLA ---
                // ¡AJUSTE CLAVE! Estaba en 65, lo movemos a 85 para que respire
                startY: 85, 
                head: [["No. Control", "Nombre del Alumno", "Reprobadas", "Materias en Recurse", "Materias en Especial"]],
                body: bodyData,
                theme: "grid",
                headStyles: { fillColor: [180, 0, 0], textColor: 255, fontStyle: 'bold', halign: 'center' },
                columnStyles: {
                  0: { fontStyle: 'bold', halign: 'center' },
                  2: { halign: 'center', textColor: [200, 0, 0], fontStyle: 'bold' }
                },
                styles: { fontSize: 9, cellPadding: 4, valign: 'middle' },
                alternateRowStyles: { fillColor: [250, 240, 240] },
                margin: { bottom: 25 }
              });

              doc.save(`Alerta_Temprana_${textPer}.pdf`);
            } catch (e) {
              console.error(e);
            }
            btnExportAlerta.innerHTML = originalBtn;
          });
        }

        // =========================================================
        // REPORTE 2: KÁRDEX OFICIAL (PDF)
        // =========================================================
        let todosLosAlumnos = [];
        try { todosLosAlumnos = await window.electronAPI.invoke("get-alumnos"); } catch (e) {}

        const kardexSearch = document.getElementById("rep-kardex-search");
        const kardexResults = document.getElementById("rep-kardex-results");
        const kardexSelected = document.getElementById("rep-kardex-selected");
        const btnClearKardex = document.getElementById("btn-rep-kardex-clear");
        const btnExportKardex = document.getElementById("btn-export-kardex-pdf");
        let alumnoKardexSeleccionado = null;

        kardexSearch.addEventListener("input", (e) => {
          const val = e.target.value.toLowerCase().trim();
          kardexResults.innerHTML = "";
          if (!val) { kardexResults.classList.add("d-none"); return; }

          const filtrados = todosLosAlumnos.filter(a => a.nombre.toLowerCase().includes(val) || a.apellido_paterno.toLowerCase().includes(val) || a.numero_control.includes(val)).slice(0, 5);

          if (filtrados.length > 0) {
            kardexResults.classList.remove("d-none");
            filtrados.forEach(a => {
              const btn = document.createElement("button");
              btn.className = "list-group-item list-group-item-action text-white bg-dark border-secondary";
              btn.innerHTML = `<strong>${a.numero_control}</strong> - ${a.nombre} ${a.apellido_paterno}`;
              btn.onclick = () => {
                alumnoKardexSeleccionado = a;
                document.getElementById("rep-kardex-nombre").textContent = `${a.nombre} ${a.apellido_paterno} ${a.apellido_materno || ""}`;
                document.getElementById("rep-kardex-control").textContent = `No. Control: ${a.numero_control}`;
                kardexSearch.classList.add("d-none");
                kardexResults.classList.add("d-none");
                kardexSelected.classList.remove("d-none");
                btnExportKardex.disabled = false;
              };
              kardexResults.appendChild(btn);
            });
          } else { kardexResults.classList.add("d-none"); }
        });

        btnClearKardex.addEventListener("click", () => {
          alumnoKardexSeleccionado = null;
          kardexSearch.value = "";
          kardexSearch.classList.remove("d-none");
          kardexSelected.classList.add("d-none");
          btnExportKardex.disabled = true;
          kardexSearch.focus();
        });

        btnExportKardex.addEventListener("click", async () => {
          if (!alumnoKardexSeleccionado) return;
          try {
            const historial = await window.electronAPI.invoke("get-historial-alumno", alumnoKardexSeleccionado.id_alumno);
            const doc = new jsPDF();
            aplicarMembretes(doc, 'portrait');

            // --- AJUSTE DE COORDENADAS 'Y' ---
            doc.setFont("helvetica", "bold");
            doc.setFontSize(16);
            doc.setTextColor(17, 42, 70);
            // Título: Estaba en 40, lo movemos a 60
            doc.text("KÁRDEX OFICIAL DE CALIFICACIONES", 105, 60, { align: "center" });

            // Ficha de Identificación
            doc.setDrawColor(200, 200, 200);
            doc.setFillColor(248, 249, 250);
            // Cuadro de datos: Estaba en 48, lo movemos a 68
            doc.roundedRect(14, 68, 182, 22, 3, 3, 'FD');

            doc.setFontSize(10);
            doc.setTextColor(50, 50, 50);
            doc.setFont("helvetica", "bold");
            // Datos internos: Incrementar en +20 cada valor. 55->75, 63->83.
            doc.text("Alumno:", 18, 75);
            doc.setFont("helvetica", "normal");
            doc.text(`${alumnoKardexSeleccionado.nombre} ${alumnoKardexSeleccionado.apellido_paterno} ${alumnoKardexSeleccionado.apellido_materno || ""}`, 35, 75);
            
            doc.setFont("helvetica", "bold");
            doc.text("No. Control:", 18, 83);
            doc.setFont("helvetica", "normal");
            doc.text(`${alumnoKardexSeleccionado.numero_control}`, 42, 83);

            doc.setFont("helvetica", "bold");
            doc.text("Estatus:", 135, 83);
            doc.setFont("helvetica", "normal");
            doc.text(`${alumnoKardexSeleccionado.status}`, 152, 83);
            const bodyData = historial.map(h => [
              h.nombre_periodo,
              h.nombre_materia,
              h.creditos,
              h.calificacion_final !== null ? (h.calificacion_final === 0 ? "NA" : h.calificacion_final) : "--",
              h.tipo_acreditacion || "CN",
              h.estado_materia
            ]);

            doc.autoTable({
              startY: 95,
              head: [["Periodo", "Materia", "Créditos", "Calificación", "Acreditación", "Estatus"]],
              body: bodyData,
              theme: "grid",
              headStyles: { fillColor: [17, 42, 70], textColor: 255 }, // Azul marino
              columnStyles: {
                0: { halign: 'center' },
                2: { halign: 'center' },
                3: { halign: 'center', fontStyle: 'bold' },
                4: { halign: 'center' },
                5: { halign: 'center' }
              },
              didParseCell: function(data) {
                // Pintar de rojo si está reprobada
                if (data.section === 'body' && data.column.index === 3 && data.cell.raw === 'NA') {
                  data.cell.styles.textColor = [200, 0, 0];
                }
              },
              styles: { fontSize: 9, cellPadding: 3 },
              margin: { bottom: 25 }
            });

            // Resumen Final
            const materiasAprobadas = historial.filter(h => h.calificacion_final >= 70);
            const prom = materiasAprobadas.length > 0 ? (materiasAprobadas.reduce((sum, h) => sum + h.calificacion_final, 0) / materiasAprobadas.length).toFixed(2) : 0;
            const creditos = materiasAprobadas.reduce((sum, h) => sum + (h.creditos || 0), 0);

            const finalY = doc.lastAutoTable.finalY || 80;
            doc.setDrawColor(17, 42, 70);
            doc.setLineWidth(0.5);
            doc.line(14, finalY + 8, 196, finalY + 8);

            doc.setFontSize(11);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(17, 42, 70);
            doc.text(`Promedio General (Aprobatorio):`, 14, finalY + 16);
            doc.setFont("helvetica", "normal");
            doc.text(`${prom}`, 75, finalY + 16);

            doc.setFont("helvetica", "bold");
            doc.text(`Créditos Acumulados:`, 120, finalY + 16);
            doc.setFont("helvetica", "normal");
            doc.text(`${creditos}`, 162, finalY + 16);

            doc.save(`Kardex_${alumnoKardexSeleccionado.numero_control}.pdf`);
          } catch (e) { console.error(e); }
        });

        // =========================================================
        // REPORTE 3: SÁBANA DE CALIFICACIONES (EXCEL Y PDF PREMIUM BLINDADO)
        // =========================================================
        const sabPeriodo = document.getElementById("rep-sabana-periodo");
        const sabMateria = document.getElementById("rep-sabana-materia");
        const sabGrupo = document.getElementById("rep-sabana-grupo");

        // 1. Limpieza de UX: Quitamos el "Cargando..."
        try {
          const periodos = await window.electronAPI.invoke("get-periodos");
          sabPeriodo.innerHTML = '<option value="">Seleccione Periodo...</option>';
          periodos.forEach(p => sabPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`);
          
          const materias = await window.electronAPI.invoke("get-materias");
          sabMateria.innerHTML = '<option value="">Seleccione Materia...</option>';
          materias.forEach(m => sabMateria.innerHTML += `<option value="${m.id_materia}">${m.nombre_materia}</option>`);
        } catch (e) {
          console.error("Error cargando catálogos Sábana:", e);
        }

        sabPeriodo.addEventListener("change", async (e) => {
          sabGrupo.innerHTML = '<option value="">Seleccione grupo...</option>';
          if (!e.target.value) return;
          try {
            const grupos = await window.electronAPI.invoke("get-grupos-por-periodo", e.target.value);
            grupos.forEach(g => sabGrupo.innerHTML += `<option value="${g.id_grupo}">${g.nombre_grupo}</option>`);
          } catch (e) {}
        });

        const obtenerDatosSabana = async () => {
          const id_periodo = sabPeriodo.value;
          const id_materia = sabMateria.value;
          const id_grupo = sabGrupo.value;
          if (!id_periodo || !id_materia || !id_grupo) {
            await window.electronAPI.invoke("dialog-alert", "Por favor, selecciona Periodo, Materia y Grupo.");
            return null;
          }
          const alumnos = await window.electronAPI.invoke("get-grupo-especifico", { id_periodo, id_materia, id_grupo_fk: id_grupo });
          if (alumnos.length === 0) {
            await window.electronAPI.invoke("dialog-alert", "Este grupo no tiene alumnos registrados.");
            return null;
          }
          return alumnos;
        };

        // EXCEL PREMIUM BLINDADO
        document.getElementById("btn-export-sabana-excel").addEventListener("click", async (e) => {
          const btn = e.currentTarget;
          const originalText = btn.innerHTML;
          try {
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Procesando...';
            btn.disabled = true;

            const alumnos = await obtenerDatosSabana();
            if (!alumnos) return; // Si no hay alumnos, la alerta ya saltó en obtenerDatosSabana

            const dataExcel = alumnos.map(a => ({
              "No. Control": a.numero_control,
              "Nombre Completo": `${a.apellido_paterno} ${a.apellido_materno || ""} ${a.nombre}`,
              "C1": a.c1 !== null ? a.c1 : "", "C2": a.c2 !== null ? a.c2 : "",
              "C3": a.c3 !== null ? a.c3 : "", "C4": a.c4 !== null ? a.c4 : "",
              "C5": a.c5 !== null ? a.c5 : "", "C6": a.c6 !== null ? a.c6 : "",
              "C7": a.c7 !== null ? a.c7 : "", "C8": a.c8 !== null ? a.c8 : "",
              "C9": a.c9 !== null ? a.c9 : "", "C10": a.c10 !== null ? a.c10 : "",
              "Calif. Final": a.calificacion_final !== null ? (a.calificacion_final === 0 ? "NA" : a.calificacion_final) : "--",
              "Acreditación": a.tipo_acreditacion || "CN"
            }));

            const ws = XLSX.utils.json_to_sheet(dataExcel);
            ws['!cols'] = [ {wch: 15}, {wch: 45}, {wch: 5}, {wch: 5}, {wch: 5}, {wch: 5}, {wch: 5}, {wch: 5}, {wch: 5}, {wch: 5}, {wch: 5}, {wch: 5}, {wch: 12}, {wch: 15} ];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sábana");
            
            const matNombre = sabMateria.options[sabMateria.selectedIndex].text.split("(")[0].trim();
            const grpNombre = sabGrupo.options[sabGrupo.selectedIndex].text;
            XLSX.writeFile(wb, `Sabana_${matNombre}_Grupo${grpNombre}.xlsx`);
            
          } catch (error) {
            await window.electronAPI.invoke("dialog-alert", "Error al generar Excel: " + error.message);
          } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
          }
        });

        // PDF SÁBANA PREMIUM BLINDADO (CORREGIDO)
        document.getElementById("btn-export-sabana-pdf").addEventListener("click", async (e) => {
          const btn = e.currentTarget;
          const originalText = btn.innerHTML;
          
          try {
            // 1. Efecto Visual de Carga y Bloqueo
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Generando...';
            btn.disabled = true;

            const alumnos = await obtenerDatosSabana();
            if (!alumnos) return; // Se detiene si faltan datos o el grupo está vacío

            // 2. Extraer Textos de manera segura
            const matNombre = sabMateria.options[sabMateria.selectedIndex].text.split("(")[0].trim();
            const grpNombre = sabGrupo.options[sabGrupo.selectedIndex].text; // VARIABLE CORRECTA
            const perNombre = sabPeriodo.options[sabPeriodo.selectedIndex].text;

            // 3. Iniciar jsPDF
            const doc = new jsPDF();
            aplicarMembretes(doc, 'portrait');

            // 4. Escribir Encabezados
            doc.setFont("helvetica", "bold");
            doc.setFontSize(14);
            doc.setTextColor(40, 40, 40);
            doc.text("SÁBANA OFICIAL DE CALIFICACIONES", 105, 58, { align: "center" });
            
            doc.setFontSize(10);
            doc.text(`Periodo:`, 14, 68); doc.setFont("helvetica", "normal"); doc.text(`${perNombre}`, 30, 68);
            doc.setFont("helvetica", "bold");
            doc.text(`Materia:`, 14, 74); doc.setFont("helvetica", "normal"); doc.text(`${matNombre}`, 30, 74);
            
            doc.setFont("helvetica", "bold");
            // ¡AQUÍ ESTABA EL ERROR! Cambiamos grpName por grpNombre
            doc.text(`Grupo:`, 140, 68); doc.setFont("helvetica", "normal"); doc.text(`${grpNombre}`, 155, 68);

            // 5. Mapear Datos
            const bodyData = alumnos.map(a => [
              a.numero_control,
              `${a.apellido_paterno} ${a.apellido_materno || ""} ${a.nombre}`,
              a.calificacion_final !== null ? (a.calificacion_final === 0 ? "NA" : a.calificacion_final) : "--",
              a.tipo_acreditacion || "CN"
            ]);

            // 6. Dibujar Tabla AutoTable
            doc.autoTable({
              startY: 80, 
              head: [["No. Control", "Nombre Completo del Estudiante", "Calif. Final", "Acreditación"]],
              body: bodyData, 
              theme: "striped",
              headStyles: { fillColor: [40, 167, 69], textColor: 255 }, 
              columnStyles: {
                0: { fontStyle: 'bold' },
                2: { halign: 'center', fontStyle: 'bold' },
                3: { halign: 'center' }
              },
              didParseCell: function(data) {
                if (data.section === 'body' && data.column.index === 2 && data.cell.raw === 'NA') {
                  data.cell.styles.textColor = [220, 53, 69]; // Rojo para NA
                }
              },
              styles: { fontSize: 9, cellPadding: 3 }
            });

            // 7. Descargar PDF
            doc.save(`Sabana_${matNombre}_Grupo${grpNombre}.pdf`);

          } catch (error) {
            // EL ESCUDO: Si algo falla, lo mostramos en pantalla en lugar de morir en silencio
            console.error(error);
            await window.electronAPI.invoke("dialog-alert", "Error en el PDF: " + error.message);
          } finally {
            // Siempre restauramos el botón a su estado original gracias al bloque 'finally'
            btn.innerHTML = originalText;
            btn.disabled = false;
          }
        });

        // =========================================================
        // REPORTE 4: BOLETAS MASIVAS PARCIALES (PDF PREMIUM)
        // =========================================================
        const repBolPeriodo = document.getElementById("rep-bol-periodo");
        const repBolMateria = document.getElementById("rep-bol-materia");
        const repBolGrupo = document.getElementById("rep-bol-grupo");
        const btnExportBoletas = document.getElementById("btn-export-boletas-pdf");

        window.electronAPI.invoke("get-periodos").then(periodos => {
          repBolPeriodo.innerHTML = '<option value="">Seleccione Periodo...</option>';
          periodos.forEach(p => repBolPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`);
        });

        repBolPeriodo.addEventListener("change", async (e) => {
          repBolMateria.innerHTML = '<option value="">Cargando...</option>';
          repBolGrupo.innerHTML = '<option value="">Grupo...</option>';
          repBolMateria.disabled = true; repBolGrupo.disabled = true;
          if (!e.target.value) return;
          try {
            const materias = await window.electronAPI.invoke("get-materias");
            repBolMateria.innerHTML = '<option value="">Seleccione Materia...</option>';
            materias.forEach(m => repBolMateria.innerHTML += `<option value="${m.id_materia}">${m.nombre_materia}</option>`);
            repBolMateria.disabled = false;
          } catch (err) {}
        });

        repBolMateria.addEventListener("change", async (e) => {
          repBolGrupo.innerHTML = '<option value="">Cargando...</option>';
          repBolGrupo.disabled = true;
          if (!e.target.value) return;
          try {
            const grupos = await window.electronAPI.invoke("get-grupos-por-periodo", repBolPeriodo.value);
            repBolGrupo.innerHTML = '<option value="">Seleccione Grupo...</option>';
            grupos.forEach(g => repBolGrupo.innerHTML += `<option value="${g.id_grupo}">${g.nombre_grupo}</option>`);
            repBolGrupo.disabled = false;
          } catch (err) {}
        });

        if (btnExportBoletas) {
          btnExportBoletas.addEventListener("click", async () => {
            if (!repBolPeriodo.value || !repBolMateria.value || !repBolGrupo.value) {
              return window.electronAPI.invoke("dialog-alert", "Selecciona Periodo, Materia y Grupo.");
            }

            const originalBtn = btnExportBoletas.innerHTML;
            btnExportBoletas.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

            try {
              const boletas = await window.electronAPI.invoke("get-boletas-grupo", {
                id_periodo: repBolPeriodo.value, id_materia: repBolMateria.value, id_grupo: repBolGrupo.value
              });

              if (boletas.length === 0) {
                btnExportBoletas.innerHTML = originalBtn;
                return window.electronAPI.invoke("dialog-alert", "No hay alumnos inscritos.");
              }

              const doc = new jsPDF("portrait");
              const matName = boletas[0].nombre_materia;
              const perName = boletas[0].nombre_periodo;
              const grpName = boletas[0].nombre_grupo;

              boletas.forEach((al, index) => {
                if (index > 0) doc.addPage(); 
                aplicarMembretes(doc, 'portrait');

                // --- AJUSTE DE COORDENADAS 'Y' ---
                // Título Boleta: Estaba en 45, lo movemos a 65
                doc.setFontSize(16);
                doc.setFont("helvetica", "bold");
                doc.setTextColor(23, 162, 184);
                doc.text("BOLETA DE CALIFICACIONES PARCIALES", 105, 65, { align: "center" });

                // Datos Generales
                doc.setFontSize(11);
                doc.setTextColor(50, 50, 50);
                // Datos: Incrementar en +20. 58->78, 65->85.
                doc.text(`Periodo Escolar:`, 14, 78); doc.setFont("helvetica", "normal"); doc.text(`${perName}`, 48, 78);
                doc.setFont("helvetica", "bold");
                doc.text(`Asignatura:`, 14, 85); doc.setFont("helvetica", "normal"); doc.text(`${matName}`, 40, 85);
                doc.setFont("helvetica", "bold");
                doc.text(`Grupo:`, 140, 78); doc.setFont("helvetica", "normal"); doc.text(`${grpName}`, 155, 78);

                // Tarjeta del Estudiante
                doc.setDrawColor(23, 162, 184);
                doc.setLineWidth(0.5);
                // Cuadro: Estaba en 75, lo movemos a 95
                doc.roundedRect(14, 95, 182, 25, 3, 3);
                
                doc.setFont("helvetica", "bold");
                // Datos internos: Incrementar en +20. 83->103, 92->112.
                doc.text("No. Control:", 18, 103);
                doc.setFont("helvetica", "normal");
                doc.text(`${al.numero_control}`, 45, 103);
                
                doc.setFont("helvetica", "bold");
                doc.text("Estudiante:", 18, 112);
                doc.setFont("helvetica", "normal");
                doc.text(`${al.apellido_paterno} ${al.apellido_materno || ""} ${al.nombre}`, 45, 112);

                // Grid de Competencias
                const competenciasBody = [];
                for (let i = 1; i <= 10; i++) {
                  if (al[`c${i}`] !== null && al[`c${i}`] !== undefined && al[`c${i}`] !== "") {
                    competenciasBody.push([`C${i}`, al[`c${i}`] === 0 ? "NA" : al[`c${i}`]]);
                  }
                }

                if (competenciasBody.length > 0) {
                   doc.autoTable({
                    startY: 130,
                    head: [["Unidad Evaluada", "Calificación Obtenida"]],
                    body: competenciasBody,
                    theme: "grid",
                    headStyles: { fillColor: [240, 240, 240], textColor: [40, 40, 40], halign: 'center' },
                    columnStyles: { 0: { halign: 'center', fontStyle: 'bold' }, 1: { halign: 'center' } },
                    didParseCell: function(data) {
                      if (data.section === 'body' && data.column.index === 1 && data.cell.raw === 'NA') {
                        data.cell.styles.textColor = [220, 53, 69];
                        data.cell.styles.fontStyle = 'bold';
                      }
                    },
                    margin: { left: 40, right: 40 }, // Centrar tabla
                    styles: { fontSize: 10 }
                  });
                } else {
                  doc.setFont("helvetica", "italic");
                  doc.text("Sin desglose de competencias registrado.", 105, 120, { align: "center" });
                }

                // Resultado Final
                const finalY = doc.lastAutoTable ? doc.lastAutoTable.finalY + 15 : 135;
                const califFinal = al.calificacion_final === 0 ? "NA" : al.calificacion_final;
                const isReprobada = califFinal === "NA" || califFinal < 70;

                doc.setFillColor(isReprobada ? 255 : 240, isReprobada ? 235 : 248, isReprobada ? 235 : 240);
                doc.rect(14, finalY, 182, 12, 'FD');
                
                doc.setFont("helvetica", "bold");
                doc.setFontSize(12);
                doc.setTextColor(isReprobada ? 180 : 40, 0, 0);
                doc.text(`PROMEDIO FINAL: ${califFinal}  (${al.estado_materia})`, 105, finalY + 8, { align: "center" });

                // Firmas (Posicionadas perfectamente arriba del footer)
                doc.setDrawColor(100, 100, 100);
                doc.line(30, 220, 80, 220);
                doc.setFontSize(9);
                doc.setTextColor(80, 80, 80);
                doc.text("Firma del Docente", 55, 225, { align: "center" });

                doc.line(130, 220, 180, 220);
                doc.text("Firma del Alumno", 155, 225, { align: "center" });
              });

              doc.save(`Boletas_${matName}_${grpName}.pdf`);
            } catch (err) { console.error(err); }
            btnExportBoletas.innerHTML = originalBtn;
          });
        }

        // =========================================================
        // REPORTE 5: PADRÓN HISTÓRICO DE TITULADOS (EXCEL PREMIUM)
        // =========================================================
        document.getElementById("btn-export-titulados-excel").addEventListener("click", async () => {
          try {
            const titulados = await window.electronAPI.invoke("get-titulados");
            if (titulados.length === 0) return window.electronAPI.invoke("dialog-alert", "No hay alumnos titulados.");

            const dataExcel = titulados.map(t => ({
              "Folio de Acta": t.folio_acta || "En Trámite",
              "No. Control": t.numero_control,
              "Nombre Completo": `${t.apellido_paterno} ${t.apellido_materno || ""} ${t.nombre}`,
              "Promedio Final": t.promedio,
              "Modalidad de Titulación": t.modalidad,
              "Mención": t.mencion_honorifica ? "Sí" : "No",
              "Fecha de Titulación": t.fecha_titulacion
            }));

            const ws = XLSX.utils.json_to_sheet(dataExcel);
            
            // Estilizado Premium de anchos de columna para SheetJS
            ws['!cols'] = [
              {wch: 15}, // Folio
              {wch: 15}, // Control
              {wch: 45}, // Nombre
              {wch: 15}, // Promedio
              {wch: 30}, // Modalidad
              {wch: 10}, // Mención
              {wch: 20}  // Fecha
            ];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Titulados Oficial");
            XLSX.writeFile(wb, "Padron_Historico_Titulados.xlsx");
          } catch (e) { console.error(e); }
        });
      }
    </script>

    <script>
      // Lógica de Toggle de la Barra Lateral
      document
        .getElementById("btn-toggle-sidebar")
        .addEventListener("click", () => {
          document.querySelector(".sidebar").classList.toggle("collapsed");
        });
    </script>
  </body>
</html>
