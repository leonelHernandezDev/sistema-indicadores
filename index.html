            });

            input.addEventListener("input", (e) => {
              let val = parseInt(e.target.value);
              if (val > 100) e.target.value = 100;
              if (val < 0) e.target.value = 0;

              // Alerta visual de cambios sin guardar
              sabanaStatusGuardado.innerHTML =
                '<span class="text-warning"><i class="bi bi-exclamation-triangle"></i> Cambios sin guardar</span>';
              window.cambiosSinGuardarSabana = true;
              // Disparar cálculo automático
              calcularPromedioFila(e.target.closest("tr"));
            });
          });

          // Detalle UX: Navegación rápida con tecla Enter
          inputs.forEach((input, index) => {
            input.addEventListener("keypress", (e) => {
              if (e.key === "Enter") {
                e.preventDefault();
                // Intentar bajar a la misma columna de la fila de abajo
                const row = input.closest("tr");
                const nextRow = row.nextElementSibling;
                if (nextRow) {
                  const indexInRow = Array.from(
                    row.querySelectorAll("input"),
                  ).indexOf(input);
                  const nextInput =
                    nextRow.querySelectorAll("input")[indexInRow];
                  if (nextInput) nextInput.focus();
                }
              }
            });
          });

          // Lógica del nuevo Bote de Basura Seguro
          document.querySelectorAll(".btn-quitar-sabana").forEach((btn) => {
            btn.addEventListener("click", async (e) => {
              const fila = e.target.closest("tr");
              const id = fila.dataset.id_alumno;

              if (
                await window.electronAPI.invoke(
                  "dialog-confirm",
                  "⚠️ ¿Estás seguro de quitar a este alumno de la lista?\n\nSolo usa esto para ERRORES DE CAPTURA. Si el alumno abandonó la materia a mitad del curso, usa el menú 'Estatus' para marcarlo como Baja.",
                )
              ) {
                alumnosEnSabana = alumnosEnSabana.filter(
                  (al) => (al.id_alumno_fk || al.id_alumno) != id,
                );
                sabanaStatusGuardado.innerHTML =
                  '<span class="text-warning"><i class="bi bi-exclamation-triangle"></i> Cambios sin guardar (Alumno removido)</span>';
                window.cambiosSinGuardarSabana = true;
                renderizarSabanaDinamica();
              }
            });
          });
        };

        // 6. Calculadora de Promedio con Regla TecNM ("NA")
        const calcularPromedioFila = (tr) => {
          const isCompetencias = switchModalidad.checked;
          const inputFinal = tr.querySelector(".input-final");

          if (!isCompetencias) return; // Si es captura histórica (manual), no calculamos

          const parciales = Array.from(tr.querySelectorAll(".input-parcial"));
          let suma = 0;
          let completadas = 0;
          let reprobada = false;

          parciales.forEach((p) => {
            if (p.value !== "") {
              const val = parseFloat(p.value);
              suma += val;
              completadas++;
              if (val < 70) reprobada = true; // Aplicamos la regla TecNM

              // Efecto visual en la celda del parcial
              p.classList.remove("text-info", "text-danger");
              p.classList.add(val < 70 ? "text-danger" : "text-info");
            } else {
              p.classList.remove("text-danger");
              p.classList.add("text-info");
            }
          });

          // Si hay al menos un número escrito...
          if (completadas > 0) {
            let promedio = Math.round(suma / completadas);
            if (reprobada) {
              inputFinal.value = "NA";
              inputFinal.classList.replace("text-white", "text-danger");
            } else {
              inputFinal.value = promedio;
              inputFinal.classList.replace("text-danger", "text-white");
            }
          } else {
            inputFinal.value = "";
            inputFinal.classList.replace("text-danger", "text-white");
          }
        };

        // 7. Buscador Dinámico de Alumnos (Reutilizado del código anterior)
        document
          .getElementById("btn-add-alumno-sabana")
          .addEventListener("click", () => {
            if (document.getElementById("sabana-search-container")) return;

            const container = document.createElement("div");
            container.id = "sabana-search-container";
            container.className = "mt-3 position-relative w-100";

            const inputBusqueda = document.createElement("input");
            inputBusqueda.type = "text";
            inputBusqueda.className =
              "form-control form-control-sm border-success shadow";
            inputBusqueda.placeholder =
              "🔍 Escribe nombre o control... (ESC para cancelar)";

            const resultsDiv = document.createElement("div");
            resultsDiv.className =
              "list-group shadow position-absolute w-100 start-0 mt-1 d-none";
            resultsDiv.style.zIndex = "1050";

            container.appendChild(inputBusqueda);
            container.appendChild(resultsDiv);

            const header = document.querySelector(
              "#sabana-workspace .card-header",
            );
            header.appendChild(container);
            inputBusqueda.focus();

            inputBusqueda.addEventListener("input", (e) => {
              const val = e.target.value.toLowerCase().trim();
              resultsDiv.innerHTML = "";
              if (!val) {
                resultsDiv.classList.add("d-none");
                return;
              }

              const filtrados = todosLosAlumnos
                .filter(
                  (a) =>
                    a.nombre.toLowerCase().includes(val) ||
                    a.apellido_paterno.toLowerCase().includes(val) ||
                    a.numero_control.includes(val),
                )
                .slice(0, 5);
              resultsDiv.classList.remove("d-none");

              if (filtrados.length > 0) {
                filtrados.forEach((a) => {
                  const btn = document.createElement("button");
                  btn.className =
                    "list-group-item list-group-item-action text-white bg-dark border-secondary small py-2";
                  btn.innerHTML = `<strong>${a.numero_control}</strong> - ${a.nombre} ${a.apellido_paterno}`;

                  btn.addEventListener("click", () => {
                    const yaExiste = alumnosEnSabana.some(
                      (al) => (al.id_alumno_fk || al.id_alumno) === a.id_alumno,
                    );
                    if (!yaExiste) {
                      // Agregar alumno nuevo a la vista
                      a.id_alumno_fk = a.id_alumno;
                      alumnosEnSabana.push(a);
                      window.cambiosSinGuardarSabana = true; //AQUI LA PUSEEEE
                      sabanaStatusGuardado.innerHTML =
                        '<span class="text-warning"><i class="bi bi-exclamation-triangle"></i> Cambios sin guardar (Alumno nuevo)</span>';
                      renderizarSabanaDinamica();
                      container.remove();
                    } else {
                      inputBusqueda.value =
                        "⚠️ Este alumno ya está en la lista";
                      inputBusqueda.classList.replace(
                        "border-success",
                        "border-danger",
                      );
                      inputBusqueda.classList.add("text-danger");
                      setTimeout(() => {
                        inputBusqueda.value = val;
                        inputBusqueda.classList.replace(
                          "border-danger",
                          "border-success",
                        );
                        inputBusqueda.classList.remove("text-danger");
                        inputBusqueda.focus();
                      }, 1500);
                    }
                  });
                  resultsDiv.appendChild(btn);
                });
              } else {
                resultsDiv.innerHTML =
                  '<div class="list-group-item text-muted bg-dark small py-2">❌ No se encontró.</div>';
              }
            });
            inputBusqueda.addEventListener("keydown", (e) => {
              if (e.key === "Escape") container.remove();
            });
          });

        // 8. GUARDAR SÁBANA (Preparación del JSON para el UPSERT en main.js)
        btnGuardarSabana.addEventListener("click", async () => {
          if (alumnosEnSabana.length === 0) return;

          // CORRECCIÓN: Parseamos a Entero para que el motor UPSERT de main.js los compare bien
          const payload = {
            id_periodo: parseInt(sabanaPeriodo.value),
            id_materia: parseInt(sabanaMateria.value),
            id_grupo: parseInt(sabanaGrupo.value),
            alumnos: [],
          };

          const filas = tbodySabana.querySelectorAll("tr");

          filas.forEach((fila) => {
            const isCompetencias = switchModalidad.checked;
            const alumnoData = {
              // Si existe el ID, lo convertimos a Número. Si no, va Nulo.
              id_inscripcion: fila.dataset.id_inscripcion
                ? parseInt(fila.dataset.id_inscripcion)
                : null,
              id_alumno_fk: parseInt(fila.dataset.id_alumno),
              c1: null,
              c2: null,
              c3: null,
              c4: null,
              c5: null,
              c6: null,
              c7: null,
              c8: null,
              calificacion_final: null,
              estado_materia: fila.querySelector(".select-estado").value,
              tipo_acreditacion: fila.querySelector(".select-acreditacion")
                .value,
            };

            if (isCompetencias) {
              const parciales = fila.querySelectorAll(".input-parcial");
              parciales.forEach((p) => {
                const compKey = p.dataset.comp;
                if (p.value !== "") alumnoData[compKey] = parseFloat(p.value);
              });
            }

            const califFinalStr = fila.querySelector(".input-final").value;

            if (califFinalStr === "NA") {
              alumnoData.calificacion_final = 0;
              if (alumnoData.estado_materia === "Auto")
                alumnoData.estado_materia = "Reprobada";
            } else if (califFinalStr !== "") {
              alumnoData.calificacion_final = parseFloat(califFinalStr);
              if (alumnoData.estado_materia === "Auto") {
                alumnoData.estado_materia =
                  alumnoData.calificacion_final >= 70
                    ? "Aprobada"
                    : "Reprobada";
              }
            }

            payload.alumnos.push(alumnoData);
          });

          try {
            const originalHtml = btnGuardarSabana.innerHTML;
            btnGuardarSabana.innerHTML =
              '<span class="spinner-border spinner-border-sm me-2"></span>Sincronizando...';
            btnGuardarSabana.disabled = true;

            const res = await window.electronAPI.invoke(
              "save-calificaciones-masivas",
              payload,
            );

            if (res.success) {
              window.cambiosSinGuardarSabana = false;
              btnGuardarSabana.classList.replace("btn-primary", "btn-success");
              btnGuardarSabana.classList.replace("btn-warning", "btn-success");
              btnGuardarSabana.innerHTML =
                '<i class="bi bi-check2-all me-2"></i> ¡Lista Sincronizada!';
              sabanaStatusGuardado.innerHTML =
                '<span class="text-success"><i class="bi bi-cloud-check"></i> Base de datos actualizada</span>';

              formSabana.dispatchEvent(new Event("submit"));

              setTimeout(() => {
                btnGuardarSabana.innerHTML = originalHtml;
                btnGuardarSabana.disabled = false;
              }, 2000);
            }
          } catch (error) {
            await window.electronAPI.invoke(
              "dialog-alert",
              "Error al guardar: " + error.message,
            );
            btnGuardarSabana.disabled = false;
          }
        });
        // 9. Botón Cerrar Lista
        document
          .getElementById("btn-limpiar-sabana")
          .addEventListener("click", () => {
            sabanaWorkspace.classList.add("d-none");
            sabanaEmptyState.classList.add("d-none");
            alumnosEnSabana = [];
          });

        // ==========================================
        // PILAR 7: ÁNGEL DE LA GUARDA (Unsaved Changes)
        // ==========================================
        const tabGrupal = document.getElementById("grupal-tab");
        tabGrupal.addEventListener("hide.bs.tab", async (e) => {
          if (window.cambiosSinGuardarSabana) {
            e.preventDefault(); // Detenemos el cambio de pestaña
            const confirmar = await window.electronAPI.invoke(
              "dialog-confirm",
              "⚠️ Tienes calificaciones capturadas sin guardar.\n\nSi cambias de pestaña, perderás este progreso. ¿Deseas salir y PERDER los cambios?",
            );
            if (confirmar) {
              window.cambiosSinGuardarSabana = false;
              // Forzamos el cambio a la pestaña que quería ir
              const tab = new bootstrap.Tab(e.relatedTarget);
              tab.show();
            }
          }
        });

        // Aplicamos la misma protección al botón "Cerrar Lista"
        const btnLimpiarSabana = document.getElementById("btn-limpiar-sabana");
        // Quitamos el evento viejo reemplazando el botón consigo mismo
        const nuevoBtnLimpiar = btnLimpiarSabana.cloneNode(true);
        btnLimpiarSabana.parentNode.replaceChild(
          nuevoBtnLimpiar,
          btnLimpiarSabana,
        );

        nuevoBtnLimpiar.addEventListener("click", async () => {
          if (window.cambiosSinGuardarSabana) {
            const confirmar = await window.electronAPI.invoke(
              "dialog-confirm",
              "⚠️ Tienes calificaciones capturadas sin guardar.\n\n¿Estás seguro de cerrar la lista y PERDER los cambios?",
            );
            if (!confirmar) return;
          }
          window.cambiosSinGuardarSabana = false;
          sabanaWorkspace.classList.add("d-none");
          document.getElementById("sabana-empty-state").classList.add("d-none");
          alumnosEnSabana = [];
        });
      }

      // ==========================================
      //    LÓGICA: TITULACIÓN (FINAL)
      // ==========================================
      async function setupTitulacion() {
        const searchInput = document.getElementById("tit-search");
        const resultsList = document.getElementById("tit-results");

        const cardAlumno = document.getElementById("tit-alumno-card");
        const lblNombre = document.getElementById("tit-alumno-nombre");
        const lblControl = document.getElementById("tit-alumno-control");
        const lblStatus = document.getElementById("tit-alumno-status");
        const hiddenId = document.getElementById("tit-selected-id");

        const formTitulacion = document.getElementById("form-titulacion");
        const instructionMsg = document.getElementById("tit-instruction");
        const tableBody = document.getElementById("titulados-table-body");
        const lblTotal = document.getElementById("total-titulados");

        const cargarTitulados = async () => {
          tableBody.innerHTML =
            '<tr><td colspan="6" class="text-center">Cargando...</td></tr>';
          try {
            const lista = await window.electronAPI.invoke("get-titulados");
            tableBody.innerHTML = "";
            lblTotal.textContent = `${lista.length} Registros`;

            if (lista.length === 0) {
              tableBody.innerHTML =
                '<tr><td colspan="6" class="text-center text-muted py-4">No hay actas registradas.<br><small>Utiliza el formulario para titular alumnos.</small></td></tr>';
              return;
            }

            lista.forEach((t) => {
              const folioDisplay = t.folio_acta
                ? `<span class="text-warning font-monospace">${t.folio_acta}</span>`
                : '<span class="badge bg-secondary opacity-50">En Trámite</span>';

              // Badge de Mención Honorífica
              const mencionBadge =
                t.mencion_honorifica === 1
                  ? '<i class="bi bi-star-fill text-warning ms-1" title="Mención Honorífica"></i>'
                  : "";

              const row = document.createElement("tr");
              row.innerHTML = `
                <td class="ps-4">${folioDisplay}</td>
                <td class="fw-bold">
                    ${t.nombre} ${t.apellido_paterno}
                    <div class="small text-muted font-monospace">${t.numero_control}</div>
                </td>
                <td class="text-center">
                    <span class="fw-bold text-white">${t.promedio}</span>
                    ${mencionBadge}
                </td>
                <td><span class="badge bg-dark border border-secondary">${t.modalidad}</span></td>
                <td class="small text-muted">${t.fecha_titulacion}</td>
                <td class="text-end pe-4">
                   <button class="btn btn-sm btn-outline-danger btn-borrar-titulacion border-0" data-id="${t.id_titulacion}">
                     <i class="bi bi-trash"></i>
                   </button>
                </td>
              `;
              tableBody.appendChild(row);
            });
          } catch (e) {
            console.error(e);
          }
        };

        await cargarTitulados();

        let todosLosAlumnos = [];
        try {
          todosLosAlumnos = await window.electronAPI.invoke("get-alumnos");
        } catch (e) {}

        searchInput.addEventListener("input", (e) => {
          const texto = e.target.value.toLowerCase();
          resultsList.innerHTML = "";

          if (texto.length < 2) {
            resultsList.classList.add("d-none");
            return;
          }

          const filtrados = todosLosAlumnos.filter(
            (a) =>
              a.nombre.toLowerCase().includes(texto) ||
              a.apellido_paterno.toLowerCase().includes(texto) ||
              a.numero_control.toLowerCase().includes(texto),
          );

          if (filtrados.length > 0) {
            resultsList.classList.remove("d-none");
            filtrados.slice(0, 5).forEach((alumno) => {
              const item = document.createElement("button");
              item.className =
                "list-group-item list-group-item-action list-group-item-dark d-flex justify-content-between align-items-center";

              const statusBadge =
                alumno.status === "Titulado"
                  ? '<span class="badge bg-success ms-2"><i class="bi bi-check-circle"></i> Titulado</span>'
                  : "";

              item.innerHTML = `
                <div>
                  <strong class="text-primary">${alumno.numero_control}</strong> - ${alumno.nombre} ${alumno.apellido_paterno}
                </div>
                ${statusBadge}
              `;

              item.onclick = () => seleccionarAlumno(alumno);
              resultsList.appendChild(item);
            });
          } else {
            resultsList.classList.add("d-none");
          }
        });

        const seleccionarAlumno = (alumno) => {
          searchInput.value = "";
          resultsList.classList.add("d-none");

          instructionMsg.classList.add("d-none");
          cardAlumno.classList.remove("d-none");

          lblNombre.textContent = `${alumno.nombre} ${alumno.apellido_paterno} ${alumno.apellido_materno || ""}`;
          lblControl.textContent = alumno.numero_control;
          lblStatus.textContent = alumno.status;

          if (alumno.status === "Titulado")
            lblStatus.className = "badge bg-success";
          else if (alumno.status === "Egresado")
            lblStatus.className = "badge bg-info text-dark";
          else lblStatus.className = "badge bg-secondary";

          hiddenId.value = alumno.id_alumno;

          if (alumno.status === "Titulado") {
            formTitulacion.classList.add("d-none");
            window.electronAPI.invoke(
              "dialog-alert",
              "Este alumno ya cuenta con acta de titulación.",
            );
          } else {
            formTitulacion.classList.remove("d-none");
            document.getElementById("tit-folio").focus();
          }
        };

        formTitulacion.addEventListener("submit", async (e) => {
          e.preventDefault();
          const idAlumno = hiddenId.value;
          const folio = document
            .getElementById("tit-folio")
            .value.trim()
            .toUpperCase();
          const modalidad = document.getElementById("tit-modalidad").value;
          const fecha = document.getElementById("tit-fecha").value;
          const promedio = document.getElementById("tit-promedio").value;
          const mencion = document.getElementById("tit-mencion").checked
            ? 1
            : 0;

          if (!idAlumno || !fecha || !modalidad || !promedio) return;

          const confirmado = await window.electronAPI.invoke(
            "dialog-confirm",
            "¿Confirmar titulación? Verifica que los datos del acta sean correctos.",
          );

          if (confirmado) {
            try {
              const res = await window.electronAPI.invoke("titular-alumno", {
                id_alumno: idAlumno,
                fecha,
                modalidad,
                folio,
                promedio,
                mencion,
              });

              if (res.success) {
                await window.electronAPI.invoke(
                  "dialog-alert",
                  "¡Acta registrada exitosamente!",
                );

                formTitulacion.reset();
                formTitulacion.classList.add("d-none");
                cardAlumno.classList.add("d-none");
                instructionMsg.classList.remove("d-none");

                todosLosAlumnos =
                  await window.electronAPI.invoke("get-alumnos");
                await cargarTitulados();
              }
            } catch (error) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error: " + error.message,
              );
            }
          }
        });

        tableBody.addEventListener("click", async (e) => {
          const btn = e.target.closest(".btn-borrar-titulacion");
          if (!btn) return;

          const confirmar = await window.electronAPI.invoke(
            "dialog-confirm",
            "¿Eliminar acta? El alumno dejará de estar titulado.",
          );

          if (confirmar) {
            try {
              await window.electronAPI.invoke(
                "delete-titulacion",
                btn.dataset.id,
              );
              todosLosAlumnos = await window.electronAPI.invoke("get-alumnos");
              await cargarTitulados();
            } catch (error) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error: " + error.message,
              );
            }
          }
        });
      }
    </script>
  </body>
</html>
