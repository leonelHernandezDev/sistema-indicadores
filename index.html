                elSwitch.checked = true;
                elSwitch.dispatchEvent(new Event("change"));

                // Ajustamos el número de casillas visibles
                elSelectUnidades.disabled = false;
                elSelectUnidades.value = Math.max(maxActivo, 4); // Mínimo 4 por estética
                elSelectUnidades.dispatchEvent(new Event("change"));

                // Disparamos el 'blur' para que se aplique el color rojo/azul y calcule
                for (let i = 1; i <= maxActivo; i++) {
                  const inputDom = document.getElementById(`acad-c${i}`);
                  if (inputDom && inputDom.value !== "") {
                    inputDom.dispatchEvent(new Event("blur"));
                  }
                }
              } else {
                // Apagamos el modo competencias porque fue captura histórica
                if (elSwitch) {
                  elSwitch.checked = false;
                  elSwitch.dispatchEvent(new Event("change"));
                }
              }
              // ----------------------------------------------------

              // Cambiar aspecto del botón principal
              if (btnGuardarKardex) {
                btnGuardarKardex.innerHTML =
                  '<i class="bi bi-pencil-square me-2"></i> Actualizar';
                btnGuardarKardex.classList.replace(
                  "btn-primary",
                  "btn-warning",
                );
              }
              acadCalificacion.focus();
              return;
            }

            // Lógica: Clic en BORRAR
            const btnBorrar = e.target.closest(".btn-borrar-inscripcion");
            if (btnBorrar) {
              if (
                await window.electronAPI.invoke(
                  "dialog-confirm",
                  "¿Estás seguro de eliminar esta calificación del historial?",
                )
              ) {
                try {
                  await window.electronAPI.invoke(
                    "delete-inscripcion",
                    btnBorrar.dataset.id,
                  );

                  // Si el usuario borra la materia que justo estaba editando, limpiamos el formulario para evitar errores
                  if (idInscripcionAEditar == btnBorrar.dataset.id) {
                    formAcademico.reset();
                    idInscripcionAEditar = null;
                    if (btnGuardarKardex) {
                      btnGuardarKardex.innerHTML =
                        '<i class="bi bi-check-lg"></i> Registrar';
                      btnGuardarKardex.classList.replace(
                        "btn-warning",
                        "btn-primary",
                      );
                    }
                  }
                  if (alumnoSeleccionado)
                    cargarKardex(alumnoSeleccionado.id_alumno);
                } catch (error) {
                  await window.electronAPI.invoke(
                    "dialog-alert",
                    "Error al eliminar: " + error.message,
                  );
                }
              }
            }
          });
        }

        // GUARDAR O ACTUALIZAR (SUBMIT DEL FORMULARIO)
        if (formAcademico) {
          formAcademico.addEventListener("submit", async (e) => {
            e.preventDefault();
            if (!alumnoSeleccionado) return;

            // --- CORRECCIÓN DEL BUG "NA" ---
            let califNum = null;
            const valorVisual = acadCalificacion.value.trim().toUpperCase();

            // Traductor: Si visualmente dice NA, a la base de datos viaja un 0
            if (valorVisual === "NA") {
              califNum = 0;
            } else if (valorVisual !== "") {
              califNum = parseFloat(valorVisual);
            }

            // Seguro anti-errores por si se cuela un texto raro
            if (isNaN(califNum)) califNum = null;

            let estado = "Cursando";
            if (califNum !== null) {
              estado = califNum >= 70 ? "Aprobada" : "Reprobada";
            }
            // --------------------------------

            // --- EXTRAER C1-C10 ---
            const switchMod = document.getElementById("acad-switch-modalidad");
            const selectNumComp = document.getElementById(
              "acad-select-num-competencias",
            );
            const comps = {
              c1: null,
              c2: null,
              c3: null,
              c4: null,
              c5: null,
              c6: null,
              c7: null,
              c8: null,
              c9: null,
              c10: null,
            };

            if (switchMod && switchMod.checked) {
              const maxC = parseInt(selectNumComp.value);
              for (let i = 1; i <= maxC; i++) {
                const val = document.getElementById(`acad-c${i}`).value;
                if (val !== "") comps[`c${i}`] = parseFloat(val);
              }
            }

            try {
              if (idInscripcionAEditar) {
                // MODO EDICIÓN INDIVIDUAL
                await window.electronAPI.invoke("update-inscripcion", {
                  id_inscripcion: idInscripcionAEditar,
                  id_periodo_fk: acadPeriodo.value,
                  id_materia_fk: acadMateria.value,
                  id_grupo_fk: acadGrupo.value,
                  calificacion_final: califNum,
                  estado_materia: estado,
                  tipo_acreditacion:
                    document.getElementById("acad-acreditacion").value,
                  ...comps, // <-- INYECCIÓN DE COMPETENCIAS A LA BD
                });
                await window.electronAPI.invoke(
                  "dialog-alert",
                  "Registro actualizado correctamente.",
                );

                // Restaurar formulario
                idInscripcionAEditar = null;
                if (btnGuardarKardex) {
                  btnGuardarKardex.innerHTML =
                    '<i class="bi bi-check-lg"></i> Registrar';
                  btnGuardarKardex.classList.replace(
                    "btn-warning",
                    "btn-primary",
                  );
                }
              } else {
                // MODO CREACIÓN INDIVIDUAL
                const datos = {
                  id_alumno: alumnoSeleccionado.id_alumno,
                  id_periodo: acadPeriodo.value,
                  id_materia: acadMateria.value,
                  id_grupo_fk: acadGrupo.value,
                  calificacion_final: califNum,
                  estado_materia: estado,
                  tipo_acreditacion:
                    document.getElementById("acad-acreditacion").value,
                  ...comps, // <-- INYECCIÓN DE COMPETENCIAS A LA BD
                };

                await window.electronAPI.invoke(
                  "add-inscripcion-individual",
                  datos,
                );
                await window.electronAPI.invoke(
                  "dialog-alert",
                  "Calificación registrada correctamente.",
                );
              }

              acadCalificacion.value = "";
              cargarKardex(alumnoSeleccionado.id_alumno);
            } catch (error) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error: " + error.message,
              );
            }
          });
        }

        // =========================================================
        // ⚡ MOTOR DEL KÁRDEX: Switch y Calculadora por Competencias
        // =========================================================
        const acadSwitchMod = document.getElementById("acad-switch-modalidad");
        const acadLblMod = document.getElementById("acad-lbl-modalidad");
        const acadContComp = document.getElementById(
          "acad-container-competencias",
        );
        const acadInputFinal = document.getElementById("acad-calificacion");
        const acadInputsParciales = document.querySelectorAll(
          ".acad-input-parcial",
        );
        const acadSelectNumComp = document.getElementById(
          "acad-select-num-competencias",
        );

        if (acadSwitchMod) {
          acadSwitchMod.addEventListener("change", (e) => {
            const isCompetencias = e.target.checked;
            if (isCompetencias) {
              acadLblMod.textContent = "Captura por Competencias";
              acadContComp.classList.remove("d-none");
              acadInputFinal.readOnly = true;
              calcularPromedioKardex();
            } else {
              acadLblMod.textContent = "Captura Histórica (Final)";
              acadContComp.classList.add("d-none");
              acadInputFinal.readOnly = false;
              acadInputFinal.value = "";
              acadInputFinal.classList.remove("text-danger", "text-white");
            }
          });

          if (acadSelectNumComp) {
            acadSelectNumComp.addEventListener("change", (e) => {
              const num = parseInt(e.target.value);
              for (let i = 1; i <= 10; i++) {
                const inputCol = document
                  .getElementById(`acad-c${i}`)
                  .closest("div.col-3");
                if (i <= num) {
                  inputCol.classList.remove("d-none");
                } else {
                  inputCol.classList.add("d-none");
                  document.getElementById(`acad-c${i}`).value = "";
                  document
                    .getElementById(`acad-c${i}`)
                    .classList.remove("text-danger", "text-info");
                }
              }
              calcularPromedioKardex();
            });
            acadSelectNumComp.dispatchEvent(new Event("change"));
          }

          // REGLAS ESTRICTAS DE VALIDACIÓN
          acadInputsParciales.forEach((input) => {
            // Bloquear letras y signos
            input.addEventListener("keydown", (e) => {
              if (["e", "E", "+", "-", "."].includes(e.key)) e.preventDefault();
            });

            // Limitar a 100 y calcular mientras escribe
            input.addEventListener("input", (e) => {
              if (e.target.value !== "") {
                let val = parseInt(e.target.value);
                if (val > 100) e.target.value = 100;
                if (val < 0) e.target.value = 0;
              }
              calcularPromedioKardex();
            });

            // Regla de 70 = 0 (NA) al salir de la casilla
            input.addEventListener("blur", (e) => {
              if (e.target.value !== "") {
                let val = parseInt(e.target.value);
                if (val < 70) {
                  e.target.value = 0;
                }
                e.target.classList.remove("text-danger", "text-info");
                e.target.classList.add(
                  parseInt(e.target.value) < 70 ? "text-danger" : "text-info",
                );
                calcularPromedioKardex();
              }
            });
          });

          function calcularPromedioKardex() {
            if (!acadSwitchMod.checked) return;

            let suma = 0;
            let completadas = 0;
            let reprobada = false;
            const numCompetencias = parseInt(acadSelectNumComp.value);

            for (let i = 1; i <= numCompetencias; i++) {
              const valStr = document.getElementById(`acad-c${i}`).value;
              if (valStr !== "") {
                let val = parseFloat(valStr);
                suma += val;
                completadas++;
                if (val < 70) reprobada = true;
              }
            }

            if (completadas > 0) {
              let promedio = Math.round(suma / completadas);
              if (reprobada) {
                acadInputFinal.value = "NA";
                acadInputFinal.classList.remove("text-white");
                acadInputFinal.classList.add("text-danger", "fw-bold");
              } else {
                acadInputFinal.value = promedio;
                acadInputFinal.classList.remove("text-danger");
                acadInputFinal.classList.add("text-white", "fw-bold");
              }
            } else {
              acadInputFinal.value = "";
              acadInputFinal.classList.remove(
                "text-danger",
                "text-white",
                "fw-bold",
              );
            }
          }
        }

        // ==========================================
        //    PESTAÑA 2: SÁBANA GRUPAL (NUEVA LÓGICA DINÁMICA)
        // ==========================================
        const sabanaPeriodo = document.getElementById("sabana-periodo");
        const sabanaMateria = document.getElementById("sabana-materia");
        const sabanaGrupo = document.getElementById("sabana-grupo");
        const formSabana = document.getElementById("form-filtros-sabana");

        const sabanaEmptyState = document.getElementById("sabana-empty-state");
        const sabanaWorkspace = document.getElementById("sabana-workspace");
        const btnEmptyAddManual = document.getElementById(
          "btn-empty-add-manual",
        );

        const sabanaTituloMateria = document.getElementById(
          "sabana-titulo-materia",
        );
        const sabanaSubtitulo = document.getElementById("sabana-subtitulo");

        const theadSabana = document.getElementById("sabana-table-head");
        const tbodySabana = document.getElementById("sabana-table-body");

        // Controles Dinámicos
        const switchModalidad = document.getElementById("switch-modalidad");
        const containerCompetencias = document.getElementById(
          "container-competencias",
        );
        const selectNumCompetencias = document.getElementById(
          "select-num-competencias",
        );
        const lblBtnGuardar = document.getElementById("lbl-btn-guardar");
        const btnGuardarSabana = document.getElementById("btn-guardar-sabana");
        const sabanaStatusGuardado = document.getElementById(
          "sabana-status-guardado",
        );

        let alumnosEnSabana = [];
        window.cambiosSinGuardarSabana = false;
        let esListaNueva = true;

        // 1. Cargar Comboboxes iniciales
        sabanaPeriodo.innerHTML =
          '<option value="">Seleccione Periodo...</option>';
        periodos.forEach(
          (p) =>
            (sabanaPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`),
        );
        sabanaMateria.innerHTML =
          '<option value="">Seleccione Materia...</option>';
        materias.forEach(
          (m) =>
            (sabanaMateria.innerHTML += `<option value="${m.id_materia}">${m.nombre_materia} (Sem ${m.semestre_ideal})</option>`),
        );

        if (sabanaPeriodo) {
          sabanaPeriodo.addEventListener("change", async (e) => {
            const id_periodo = e.target.value;
            if (!id_periodo) {
              sabanaGrupo.innerHTML =
                '<option value="">Esperando Periodo...</option>';
              return;
            }
            sabanaGrupo.innerHTML = '<option value="">Cargando...</option>';
            try {
              const grupos = await window.electronAPI.invoke(
                "get-grupos-por-periodo",
                id_periodo,
              );
              sabanaGrupo.innerHTML =
                '<option value="">Seleccione Grupo...</option>';
              grupos.forEach(
                (g) =>
                  (sabanaGrupo.innerHTML += `<option value="${g.id_grupo}">${g.nombre_grupo}</option>`),
              );
            } catch (error) {
              console.error(error);
            }
          });
        }

        // 2. Toggle Switch (Competencias vs Final)
        switchModalidad.addEventListener("change", (e) => {
          const isCompetencias = e.target.checked;
          document.getElementById("lbl-modalidad").textContent = isCompetencias
            ? "Captura por Competencias"
            : "Captura Histórica (Final)";
          if (isCompetencias) {
            containerCompetencias.classList.remove("d-none");
          } else {
            containerCompetencias.classList.add("d-none");
          }
          renderizarSabanaDinamica(); // Redibujar tabla si cambian el switch
        });

        selectNumCompetencias.addEventListener("change", () =>
          renderizarSabanaDinamica(),
        );

        // 3. Cargar Lista (Submit del Formulario Superior)
        if (formSabana) {
          formSabana.addEventListener("submit", async (e) => {
            e.preventDefault();
            const id_periodo = sabanaPeriodo.value;
            const id_materia = sabanaMateria.value;
            const id_grupo_fk = sabanaGrupo.value;

            sabanaTituloMateria.textContent =
              sabanaMateria.options[sabanaMateria.selectedIndex].text;
            sabanaSubtitulo.textContent = `Grupo: ${sabanaGrupo.options[sabanaGrupo.selectedIndex].text} | Periodo: ${sabanaPeriodo.options[sabanaPeriodo.selectedIndex].text}`;

            try {
              // Bloquear pantalla visualmente mientras carga
              sabanaEmptyState.classList.add("d-none");
              sabanaWorkspace.classList.add("d-none");

              alumnosEnSabana = await window.electronAPI.invoke(
                "get-grupo-especifico",
                { id_periodo, id_materia, id_grupo_fk },
              );

              if (alumnosEnSabana.length === 0) {
                esListaNueva = true;
                sabanaEmptyState.classList.remove("d-none");
                sabanaEmptyState.classList.add("d-flex");
              } else {
                esListaNueva = false;
                sabanaWorkspace.classList.remove("d-none");

                // Inteligencia UX: Si el sistema detecta que los alumnos ya tienen captura en C1 o C2,
                // activa el switch de competencias automáticamente.
                const tieneCompetencias = alumnosEnSabana.some(
                  (a) => a.c1 !== null || a.c2 !== null,
                );
                if (tieneCompetencias && !switchModalidad.checked) {
                  switchModalidad.checked = true;
                  switchModalidad.dispatchEvent(new Event("change"));
                }
                renderizarSabanaDinamica();
              }
            } catch (error) {
              console.error(error);
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error al cargar el grupo.",
              );
            }
          });
        }

        // 4. Botón "Añadir Manualmente" desde el Empty State
        btnEmptyAddManual.addEventListener("click", () => {
          sabanaEmptyState.classList.add("d-none");
          sabanaEmptyState.classList.remove("d-flex");
          sabanaWorkspace.classList.remove("d-none");
          esListaNueva = true;
          renderizarSabanaDinamica();
          document.getElementById("btn-add-alumno-sabana").click(); // Abrir buscador automáticamente
        });

        // ==========================================
        // 4.5. MOTOR DE CLONACIÓN DE LISTAS
        // ==========================================
        const btnEmptyClonar = document.getElementById("btn-empty-clonar");
        const clonePeriodo = document.getElementById("clone-periodo");
        const cloneMateria = document.getElementById("clone-materia");
        const cloneGrupo = document.getElementById("clone-grupo");
        const clonePreview = document.getElementById("clone-preview");
        const btnEjecutarClonacion = document.getElementById(
          "btn-ejecutar-clonacion",
        );
        let modalClonar = null;
        let alumnosAClonar = [];

        if (btnEmptyClonar) {
          btnEmptyClonar.addEventListener("click", () => {
            if (!modalClonar)
              modalClonar = new bootstrap.Modal(
                document.getElementById("modalClonarLista"),
              );

            // Llenar los selects del modal usando los catálogos que ya tenemos en memoria
            clonePeriodo.innerHTML = sabanaPeriodo.innerHTML;
            cloneMateria.innerHTML = sabanaMateria.innerHTML;
            cloneGrupo.innerHTML =
              '<option value="">Seleccione Periodo...</option>';
            clonePreview.classList.add("d-none");
            btnEjecutarClonacion.disabled = true;

            modalClonar.show();
          });
        }

        // Cargar los grupos en el modal cuando eligen un periodo
        if (clonePeriodo) {
          clonePeriodo.addEventListener("change", async (e) => {
            const id_periodo = e.target.value;
            cloneGrupo.innerHTML = '<option value="">Cargando...</option>';
            if (!id_periodo) return;
            try {
              const grupos = await window.electronAPI.invoke(
                "get-grupos-por-periodo",
                id_periodo,
              );
              cloneGrupo.innerHTML =
                '<option value="">Seleccione Grupo...</option>';
              grupos.forEach(
                (g) =>
                  (cloneGrupo.innerHTML += `<option value="${g.id_grupo}">${g.nombre_grupo}</option>`),
              );
            } catch (error) {
              console.error(error);
            }
          });
        }

        // Verificar cuántos alumnos hay cada vez que cambian una opción en el modal
        const checkClonePreview = async () => {
          if (clonePeriodo.value && cloneMateria.value && cloneGrupo.value) {
            clonePreview.classList.remove("d-none");
            clonePreview.className =
              "alert alert-secondary py-2 small mb-0 text-center border-0";
            clonePreview.innerHTML =
              '<span class="spinner-border spinner-border-sm me-2"></span> Buscando...';

            alumnosAClonar = await window.electronAPI.invoke(
              "get-grupo-especifico",
              {
                id_periodo: clonePeriodo.value,
                id_materia: cloneMateria.value,
                id_grupo_fk: cloneGrupo.value,
              },
            );

            if (alumnosAClonar.length > 0) {
              clonePreview.innerHTML = `<i class="bi bi-check-circle-fill me-1"></i> Se encontraron <strong class="fs-6">${alumnosAClonar.length}</strong> alumnos listos para importar.`;
              clonePreview.className =
                "alert bg-success bg-opacity-25 text-success py-2 small mb-0 text-center border-0";
              btnEjecutarClonacion.disabled = false;
            } else {
              clonePreview.innerHTML =
                "Este grupo está vacío. No hay a quién clonar.";
              clonePreview.className =
                "alert bg-warning bg-opacity-25 text-warning py-2 small mb-0 text-center border-0";
              btnEjecutarClonacion.disabled = true;
            }
          }
        };

        clonePeriodo.addEventListener("change", checkClonePreview);
        cloneMateria.addEventListener("change", checkClonePreview);
        cloneGrupo.addEventListener("change", checkClonePreview);

        // EJECUTAR LA CLONACIÓN
        btnEjecutarClonacion.addEventListener("click", () => {
          // El truco maestro: Mapeamos a los alumnos y "vaciamos" sus datos históricos
          const nuevosAlumnosLimpios = alumnosAClonar.map((a) => {
            return {
              id_alumno_fk: a.id_alumno_fk || a.id_alumno,
              numero_control: a.numero_control,
              nombre: a.nombre,
              apellido_paterno: a.apellido_paterno,
              // DESTRUIMOS LA HISTORIA LOCAL PARA QUE SEAN REGISTROS NUEVOS
              id_inscripcion: null,
              c1: null,
              c2: null,
              c3: null,
              c4: null,
              c5: null,
              c6: null,
              c7: null,
              c8: null,
              c9: null,
              c10: null,
              calificacion_final: null,
              estado_materia: "Cursando",
              tipo_acreditacion: "CN",
            };
          });

          alumnosEnSabana = nuevosAlumnosLimpios;
          esListaNueva = true;

          modalClonar.hide();

          // Ocultar Empty State y Mostrar Área de Trabajo
          sabanaEmptyState.classList.add("d-none");
          sabanaEmptyState.classList.remove("d-flex");
          sabanaWorkspace.classList.remove("d-none");

          sabanaStatusGuardado.innerHTML =
            '<span class="text-warning fw-bold"><i class="bi bi-exclamation-triangle"></i> IMPORTANTE: Alumnos importados. Debes presionar "Guardar" para oficializar la lista.</span>';

          renderizarSabanaDinamica();
        });

        // 5. Motor de Renderizado Dinámico
        const renderizarSabanaDinamica = () => {
          const isCompetencias = switchModalidad.checked;
          const numComp = parseInt(selectNumCompetencias.value);

          // --- A. DIBUJAR ENCABEZADOS (THEAD) ---
          let theadHTML = `
            <th class="ps-4" style="width: 12%">N° Control</th>
            <th style="width: 25%">Alumno</th>
          `;

          if (isCompetencias) {
            for (let i = 1; i <= numComp; i++) {
              theadHTML += `<th class="text-center text-info" style="width: 6%">C${i}</th>`;
            }
          }

          theadHTML += `
            <th class="text-center text-warning" style="width: 10%">Prom. Final</th>
            <th class="text-center" style="width: 12%">Acreditación</th>
            <th class="text-center" style="width: 12%">Estatus</th>
            <th class="text-end pe-4" style="width: 8%">Quitar</th>
          `;
          theadSabana.innerHTML = theadHTML;

          // --- B. DIBUJAR ALUMNOS (TBODY) ---
          tbodySabana.innerHTML = "";

          // Comportamiento Camaleónico del Botón Guardar
          if (alumnosEnSabana.length > 0 && !esListaNueva) {
            btnGuardarSabana.classList.replace("btn-primary", "btn-warning");
            lblBtnGuardar.innerHTML = "Actualizar Lista Modificada";
          } else {
            btnGuardarSabana.classList.replace("btn-warning", "btn-primary");
            lblBtnGuardar.innerHTML = "Guardar Nueva Lista";
          }

          if (alumnosEnSabana.length === 0) {
            tbodySabana.innerHTML = `<tr><td colspan="15" class="text-center text-muted py-4">Añade alumnos para empezar a capturar...</td></tr>`;
            return;
          }

          alumnosEnSabana.forEach((a, index) => {
            const tr = document.createElement("tr");
            const id_alumno_real = a.id_alumno_fk || a.id_alumno;
            tr.dataset.id_alumno = id_alumno_real;
            // Si el alumno viene de la BD y ya tiene calificación guardada, traemos su ID de inscripción para el Upsert
            if (a.id_inscripcion) tr.dataset.id_inscripcion = a.id_inscripcion;

            let rowHTML = `
              <td class="ps-4 fw-bold text-muted">${a.numero_control}</td>
              <td class="fw-bold">${a.nombre} ${a.apellido_paterno}</td>
            `;

            if (isCompetencias) {
              for (let i = 1; i <= numComp; i++) {
                const val =
                  a[`c${i}`] !== null && a[`c${i}`] !== undefined
                    ? a[`c${i}`]
                    : "";
                rowHTML += `
                  <td class="text-center">
                    <input type="number" class="form-control form-control-sm text-center fw-bold input-parcial bg-dark text-info border-secondary" 
                           min="0" max="100" data-comp="c${i}" value="${val}" placeholder="--">
                  </td>
                `;
              }
            }

            const califFinal =
              a.calificacion_final !== null &&
              a.calificacion_final !== undefined
                ? a.calificacion_final
                : "";
            const readonlyAttr = isCompetencias ? "readonly" : "";
            const bgClass = isCompetencias
              ? "bg-secondary bg-opacity-25 border-0"
              : "bg-dark border-warning";

            // Regla visual: Si reprobó, pintar el texto de rojo
            let finalColorClass =
              califFinal !== "" && califFinal < 70
                ? "text-danger"
                : "text-white";

            rowHTML += `
              <td class="text-center">
                <input type="text" class="form-control form-control-sm text-center fw-bold input-final ${bgClass} ${finalColorClass}" 
                       ${readonlyAttr} value="${califFinal}" placeholder="--">
              </td>
              <td class="text-center">
                <select class="form-select form-select-sm select-acreditacion bg-dark text-white border-secondary">
                  <option value="CN" ${a.tipo_acreditacion === "CN" || !a.tipo_acreditacion ? "selected" : ""}>CN (Normal)</option>
                  <option value="SO" ${a.tipo_acreditacion === "SO" ? "selected" : ""}>SO (Segunda)</option>
                  <option value="CI" ${a.tipo_acreditacion === "CI" ? "selected" : ""}>CI (Verano)</option>
                  <option value="NA" ${a.tipo_acreditacion === "NA" ? "selected" : ""}>NA</option>
                </select>
              </td>
              <td class="text-center">
                <select class="form-select form-select-sm select-estado bg-dark text-white border-secondary">
                  <option value="Auto" ${a.estado_materia !== "Baja" ? "selected" : ""}>Automático</option>
                  <option value="Baja" ${a.estado_materia === "Baja" ? "selected" : ""}>Baja</option>
                </select>
              </td>
              <td class="text-end pe-4">
                <button type="button" class="btn btn-sm btn-outline-danger btn-quitar-sabana border-0" title="Eliminar por error de captura">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            `;

            tr.innerHTML = rowHTML;
            tbodySabana.appendChild(tr);
          });

          // --- C. LÓGICA DE CALCULADORA EN VIVO Y VALIDACIONES ---
          const inputs = tbodySabana.querySelectorAll("input"); // Tomamos todos (parciales y finales)

          inputs.forEach((input) => {
            // 1. Bloquear caracteres inválidos mientras teclea
            input.addEventListener("keydown", (e) => {
              if (["e", "E", "+", "-", "."].includes(e.key)) e.preventDefault();
            });

            // 2. Mientras escribe: Solo limitamos el tope máximo a 100 para no arruinar la UX
            input.addEventListener("input", (e) => {
              if (e.target.value !== "") {
                let val = parseInt(e.target.value);
                if (val > 100) e.target.value = 100;
                if (val < 0) e.target.value = 0;
              }

              sabanaStatusGuardado.innerHTML =
                '<span class="text-warning"><i class="bi bi-exclamation-triangle"></i> Cambios sin guardar</span>';
              window.cambiosSinGuardarSabana = true;

              // Solo calculamos promedio si es un input parcial
              if (e.target.classList.contains("input-parcial")) {
                calcularPromedioFila(e.target.closest("tr"));
              }
            });

            // 3. LA NUEVA MAGIA (blur): Al salir de la celda, aplicamos la regla estricta TecNM
            input.addEventListener("blur", (e) => {
              if (e.target.value !== "") {
                let val = parseInt(e.target.value);
                // Si la calificación es menor a 70, la aplastamos a 0
                if (val < 70) {
                  e.target.value = 0;
                }

                // Efecto visual: Pintar de rojo si es 0, blanco/info si aprobó
                if (e.target.classList.contains("input-final")) {
                  e.target.classList.remove("text-danger", "text-white");
                  e.target.classList.add(
                    e.target.value == 0 ? "text-danger" : "text-white",
                  );
                }

                if (e.target.classList.contains("input-parcial")) {
                  calcularPromedioFila(e.target.closest("tr"));
                }
              }
            });
          });

          // Detalle UX: Navegación rápida con tecla Enter
          inputs.forEach((input, index) => {
            input.addEventListener("keypress", (e) => {
              if (e.key === "Enter") {
                e.preventDefault();
                // Intentar bajar a la misma columna de la fila de abajo
                const row = input.closest("tr");
                const nextRow = row.nextElementSibling;
                if (nextRow) {
                  const indexInRow = Array.from(
                    row.querySelectorAll("input"),
                  ).indexOf(input);
                  const nextInput =
                    nextRow.querySelectorAll("input")[indexInRow];
                  if (nextInput) nextInput.focus();
                }
              }
            });
          });

          // Lógica del nuevo Bote de Basura Seguro
          document.querySelectorAll(".btn-quitar-sabana").forEach((btn) => {
            btn.addEventListener("click", async (e) => {
              const fila = e.target.closest("tr");
              const id = fila.dataset.id_alumno;

              if (
                await window.electronAPI.invoke(
                  "dialog-confirm",
                  "⚠️ ¿Estás seguro de quitar a este alumno de la lista?\n\nSolo usa esto para ERRORES DE CAPTURA. Si el alumno abandonó la materia a mitad del curso, usa el menú 'Estatus' para marcarlo como Baja.",
                )
              ) {
                alumnosEnSabana = alumnosEnSabana.filter(
                  (al) => (al.id_alumno_fk || al.id_alumno) != id,
                );
                sabanaStatusGuardado.innerHTML =
                  '<span class="text-warning"><i class="bi bi-exclamation-triangle"></i> Cambios sin guardar (Alumno removido)</span>';
                window.cambiosSinGuardarSabana = true;
                renderizarSabanaDinamica();
              }
            });
          });
        };

        // 6. Calculadora de Promedio con Regla TecNM ("NA")
        const calcularPromedioFila = (tr) => {
          const isCompetencias = switchModalidad.checked;
          const inputFinal = tr.querySelector(".input-final");

          if (!isCompetencias) return; // Si es captura histórica (manual), no calculamos

          const parciales = Array.from(tr.querySelectorAll(".input-parcial"));
          let suma = 0;
          let completadas = 0;
          let reprobada = false;

          parciales.forEach((p) => {
            if (p.value !== "") {
              const val = parseFloat(p.value);
              suma += val;
              completadas++;
              if (val < 70) reprobada = true; // Aplicamos la regla TecNM

              // Efecto visual en la celda del parcial
              p.classList.remove("text-info", "text-danger");
              p.classList.add(val < 70 ? "text-danger" : "text-info");
            } else {
              p.classList.remove("text-danger");
              p.classList.add("text-info");
            }
          });

          // Si hay al menos un número escrito...
          if (completadas > 0) {
            let promedio = Math.round(suma / completadas);
            if (reprobada) {
              inputFinal.value = "NA";
              inputFinal.classList.replace("text-white", "text-danger");
            } else {
              inputFinal.value = promedio;
              inputFinal.classList.replace("text-danger", "text-white");
            }
          } else {
            inputFinal.value = "";
            inputFinal.classList.replace("text-danger", "text-white");
          }
        };

        // 7. Buscador Dinámico de Alumnos (Reutilizado del código anterior)
        document
          .getElementById("btn-add-alumno-sabana")
          .addEventListener("click", () => {
            if (document.getElementById("sabana-search-container")) return;

            const container = document.createElement("div");
            container.id = "sabana-search-container";
            container.className = "mt-3 position-relative w-100";

            const inputBusqueda = document.createElement("input");
            inputBusqueda.type = "text";
            inputBusqueda.className =
              "form-control form-control-sm border-success shadow";
            inputBusqueda.placeholder =
              "🔍 Escribe nombre o control... (ESC para cancelar)";

            const resultsDiv = document.createElement("div");
            resultsDiv.className =
              "list-group shadow position-absolute w-100 start-0 mt-1 d-none";
            resultsDiv.style.zIndex = "1050";

            container.appendChild(inputBusqueda);
            container.appendChild(resultsDiv);

            const header = document.querySelector(
              "#sabana-workspace .card-header",
            );
            header.appendChild(container);
            inputBusqueda.focus();

            inputBusqueda.addEventListener("input", (e) => {
              const val = e.target.value.toLowerCase().trim();
              resultsDiv.innerHTML = "";
              if (!val) {
                resultsDiv.classList.add("d-none");
                return;
              }

              const filtrados = todosLosAlumnos
                .filter(
                  (a) =>
                    a.nombre.toLowerCase().includes(val) ||
                    a.apellido_paterno.toLowerCase().includes(val) ||
                    a.numero_control.includes(val),
                )
                .slice(0, 5);
              resultsDiv.classList.remove("d-none");

              if (filtrados.length > 0) {
                filtrados.forEach((a) => {
                  const btn = document.createElement("button");
                  btn.className =
                    "list-group-item list-group-item-action text-white bg-dark border-secondary small py-2";
                  btn.innerHTML = `<strong>${a.numero_control}</strong> - ${a.nombre} ${a.apellido_paterno}`;

                  btn.addEventListener("click", () => {
                    const yaExiste = alumnosEnSabana.some(
                      (al) => (al.id_alumno_fk || al.id_alumno) === a.id_alumno,
                    );
                    if (!yaExiste) {
                      // Agregar alumno nuevo a la vista
                      a.id_alumno_fk = a.id_alumno;
                      alumnosEnSabana.push(a);
                      window.cambiosSinGuardarSabana = true; //AQUI LA PUSEEEE
                      sabanaStatusGuardado.innerHTML =
                        '<span class="text-warning"><i class="bi bi-exclamation-triangle"></i> Cambios sin guardar (Alumno nuevo)</span>';
                      renderizarSabanaDinamica();
                      container.remove();
                    } else {
                      inputBusqueda.value =
                        "⚠️ Este alumno ya está en la lista";
                      inputBusqueda.classList.replace(
                        "border-success",
                        "border-danger",
                      );
                      inputBusqueda.classList.add("text-danger");
                      setTimeout(() => {
                        inputBusqueda.value = val;
                        inputBusqueda.classList.replace(
                          "border-danger",
                          "border-success",
                        );
                        inputBusqueda.classList.remove("text-danger");
                        inputBusqueda.focus();
                      }, 1500);
                    }
                  });
                  resultsDiv.appendChild(btn);
                });
              } else {
                resultsDiv.innerHTML =
                  '<div class="list-group-item text-muted bg-dark small py-2">❌ No se encontró.</div>';
              }
            });
            inputBusqueda.addEventListener("keydown", (e) => {
              if (e.key === "Escape") container.remove();
            });
          });

        // =========================================================
        // 7.5 IMPORTADOR INTELIGENTE DE CALIFICACIONES (Excel)
        // =========================================================
        const btnImportarCalif = document.getElementById(
          "btn-importar-calificaciones",
        );
        const inputExcelCalif = document.getElementById(
          "input-excel-calificaciones",
        );

        if (btnImportarCalif && inputExcelCalif) {
          // 1. Ya no bloqueamos si la lista está vacía. ¡Ahora la construimos!
          btnImportarCalif.addEventListener("click", () => {
            inputExcelCalif.click();
          });

          inputExcelCalif.addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
              const reader = new FileReader();
              reader.onload = async (evt) => {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: "binary" });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const filasRaw = XLSX.utils.sheet_to_json(worksheet, {
                  header: 1,
                });

                if (filasRaw.length < 2) return;

                // 2. Identificar columnas dinámicamente
                let idxControl = -1;
                let idxFinal = -1;
                let idxCompetencias = {};
                let filaHeaders = -1;

                for (let i = 0; i < Math.min(15, filasRaw.length); i++) {
                  const fila = filasRaw[i];
                  if (!fila) continue;

                  for (let j = 0; j < fila.length; j++) {
                    const celdaStr = String(fila[j] || "")
                      .toLowerCase()
                      .trim();
                    if (!celdaStr) continue;

                    if (
                      celdaStr.includes("control") ||
                      celdaStr.includes("matricula")
                    )
                      idxControl = j;
                    else if (
                      celdaStr.includes("promedio") ||
                      celdaStr.includes("calif")
                    )
                      idxFinal = j;

                    const matchC = celdaStr.match(/^(?:c|u)?\s*(\d+)$/);
                    if (matchC) {
                      const numComp = parseInt(matchC[1]);
                      if (numComp >= 1 && numComp <= 10)
                        idxCompetencias[numComp] = j;
                    }
                  }
                  if (idxControl !== -1) {
                    filaHeaders = i;
                    break;
                  }
                }

                if (idxControl === -1) {
                  await window.electronAPI.invoke(
                    "dialog-alert",
                    "No se encontró la columna de Número de Control en el Excel.",
                  );
                  inputExcelCalif.value = "";
                  return;
                }

                // 3. FASE DE CONSTRUCCIÓN: Cruzar Excel con nuestra Base de Datos
                const alumnosDB =
                  await window.electronAPI.invoke("get-alumnos");
                let alumnosAgregados = 0;
                let alumnosNoEncontrados = [];

                for (let i = filaHeaders + 1; i < filasRaw.length; i++) {
                  const fila = filasRaw[i];
                  if (!fila || !fila[idxControl]) continue;

                  const controlExcel = String(fila[idxControl])
                    .trim()
                    .toUpperCase();
                  if (!controlExcel) continue;

                  // Buscar si ese alumno del Excel existe en nuestro sistema
                  const alumnoDB = alumnosDB.find(
                    (a) =>
                      String(a.numero_control).trim().toUpperCase() ===
                      controlExcel,
                  );

                  if (!alumnoDB) {
                    alumnosNoEncontrados.push(controlExcel);
                    continue; // Lo ignoramos
                  }

                  // Verificar si ya estaba en la Sábana visual, si no, lo agregamos a la memoria
                  let yaEnSabana = alumnosEnSabana.find(
                    (a) => a.numero_control === controlExcel,
                  );
                  if (!yaEnSabana) {
                    alumnosEnSabana.push({
                      id_alumno_fk: alumnoDB.id_alumno,
                      numero_control: alumnoDB.numero_control,
                      nombre: alumnoDB.nombre,
                      apellido_paterno: alumnoDB.apellido_paterno,
                      id_inscripcion: null, // Porque es nuevo en esta materia
                      c1: null,
                      c2: null,
                      c3: null,
                      c4: null,
                      c5: null,
                      c6: null,
                      c7: null,
                      c8: null,
                      c9: null,
                      c10: null,
                      calificacion_final: null,
                      estado_materia: "Cursando",
                      tipo_acreditacion: "CN",
                    });
                    alumnosAgregados++;
                  }
                }

                // 4. Renderizamos la Sábana para que aparezcan visualmente los nuevos alumnos
                if (alumnosAgregados > 0) {
                  renderizarSabanaDinamica();
                }

                // 5. FASE DE INYECCIÓN DE CALIFICACIONES
                const isCompetencias = switchModalidad.checked;
                const numCompEsperadas = parseInt(selectNumCompetencias.value);
                let alumnosActualizados = 0;

                for (let i = filaHeaders + 1; i < filasRaw.length; i++) {
                  const fila = filasRaw[i];
                  if (!fila || !fila[idxControl]) continue;

                  const controlExcel = String(fila[idxControl])
                    .trim()
                    .toUpperCase();

                  const filasDOM = Array.from(
                    tbodySabana.querySelectorAll("tr"),
                  );
                  const filaAlumnoDOM = filasDOM.find((tr) => {
                    const tdControl = tr.querySelector("td.fw-bold.text-muted");
                    return (
                      tdControl &&
                      tdControl.textContent.trim().toUpperCase() ===
                        controlExcel
                    );
                  });

                  if (filaAlumnoDOM) {
                    let inyectado = false;
                    if (isCompetencias) {
                      for (let c = 1; c <= numCompEsperadas; c++) {
                        if (
                          idxCompetencias[c] !== undefined &&
                          fila[idxCompetencias[c]] !== undefined
                        ) {
                          let valStr = String(fila[idxCompetencias[c]]).trim();
                          let val =
                            valStr.toUpperCase() === "NA"
                              ? 0
                              : parseFloat(valStr);

                          if (!isNaN(val)) {
                            const inputDOM = filaAlumnoDOM.querySelector(
                              `.input-parcial[data-comp="c${c}"]`,
                            );
                            if (inputDOM) {
                              inputDOM.value = val;
                              inputDOM.dispatchEvent(
                                new Event("input", { bubbles: true }),
                              );
                              inputDOM.dispatchEvent(
                                new Event("blur", { bubbles: true }),
                              );
                              inyectado = true;
                            }
                          }
                        }
                      }
                    } else {
                      if (idxFinal !== -1 && fila[idxFinal] !== undefined) {
                        let valStr = String(fila[idxFinal]).trim();
                        let val =
                          valStr.toUpperCase() === "NA"
                            ? 0
                            : parseFloat(valStr);

                        if (!isNaN(val)) {
                          const inputDOM =
                            filaAlumnoDOM.querySelector(`.input-final`);
                          if (inputDOM) {
                            inputDOM.value = val;
                            inputDOM.dispatchEvent(
                              new Event("input", { bubbles: true }),
                            );
                            inputDOM.dispatchEvent(
                              new Event("blur", { bubbles: true }),
                            );
                            inyectado = true;
                          }
                        }
                      }
                    }
                    if (inyectado) alumnosActualizados++;
                  }
                }

                window.cambiosSinGuardarSabana = true;
                sabanaStatusGuardado.innerHTML =
                  '<span class="text-warning fw-bold"><i class="bi bi-exclamation-triangle"></i> Excel Importado. Revisa y haz clic en Guardar.</span>';

                let mensajeFinal = `¡Éxito! Se agregaron ${alumnosAgregados} alumnos a la lista y se inyectaron las calificaciones de ${alumnosActualizados} alumnos.\n\nRevisa la tabla en pantalla y presiona "Guardar Lista" cuando estés listo.`;

                if (alumnosNoEncontrados.length > 0) {
                  mensajeFinal += `\n\n⚠️ ATENCIÓN: Se ignoraron ${alumnosNoEncontrados.length} alumnos del Excel porque no están registrados en el sistema (Ej: ${alumnosNoEncontrados.slice(0, 3).join(", ")}...).`;
                }

                await window.electronAPI.invoke("dialog-alert", mensajeFinal);
              };
              reader.readAsBinaryString(file);
            } catch (e) {
              console.error(e);
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error al procesar el archivo Excel.",
              );
            }
            inputExcelCalif.value = "";
          });
        }

        // ==========================================
        // PILAR 7: ÁNGEL DE LA GUARDA (Unsaved Changes)
        // ==========================================
        const tabGrupal = document.getElementById("grupal-tab");
        tabGrupal.addEventListener("hide.bs.tab", async (e) => {
          if (window.cambiosSinGuardarSabana) {
            e.preventDefault(); // Detenemos el cambio de pestaña
            const confirmar = await window.electronAPI.invoke(
              "dialog-confirm",
              "⚠️ Tienes calificaciones capturadas sin guardar.\n\nSi cambias de pestaña, perderás este progreso. ¿Deseas salir y PERDER los cambios?",
            );
            if (confirmar) {
              window.cambiosSinGuardarSabana = false;
              // Forzamos el cambio a la pestaña que quería ir
              const tab = new bootstrap.Tab(e.relatedTarget);
              tab.show();
            }
          }
        });

        // Aplicamos la misma protección al botón "Cerrar Lista"
        const btnLimpiarSabana = document.getElementById("btn-limpiar-sabana");
        // Quitamos el evento viejo reemplazando el botón consigo mismo
        const nuevoBtnLimpiar = btnLimpiarSabana.cloneNode(true);
        btnLimpiarSabana.parentNode.replaceChild(
          nuevoBtnLimpiar,
          btnLimpiarSabana,
        );

        nuevoBtnLimpiar.addEventListener("click", async () => {
          if (window.cambiosSinGuardarSabana) {
            const confirmar = await window.electronAPI.invoke(
              "dialog-confirm",
              "⚠️ Tienes calificaciones capturadas sin guardar.\n\n¿Estás seguro de cerrar la lista y PERDER los cambios?",
            );
            if (!confirmar) return;
          }
          window.cambiosSinGuardarSabana = false;
          sabanaWorkspace.classList.add("d-none");

          // ¡Aquí estaba el error! Hay que REMOVER el d-none y agregar el d-flex para que vuelva a verse
          const emptyState = document.getElementById("sabana-empty-state");
          emptyState.classList.remove("d-none");
          emptyState.classList.add("d-flex");

          alumnosEnSabana = [];

          // Opcional: Limpiamos los selects superiores para que se vea como nuevo
          document.getElementById("form-filtros-sabana").reset();
        });

        // ==========================================
        // 8. GUARDAR SÁBANA (Preparación del JSON y envío)
        // ==========================================
        if (btnGuardarSabana) {
          btnGuardarSabana.addEventListener("click", async () => {
            const filas = document.querySelectorAll("#sabana-table-body tr");
            if (filas.length === 0) return;

            const periodoId = sabanaPeriodo.value;
            const materiaId = sabanaMateria.value;
            const grupoId = sabanaGrupo.value;

            const alumnosToSave = [];

            filas.forEach((tr) => {
              const idAlumno = parseInt(tr.dataset.id_alumno);
              const idInscripcion = tr.dataset.id_inscripcion
                ? parseInt(tr.dataset.id_inscripcion)
                : null;

              const selectAcreditacion = tr.querySelector(
                ".select-acreditacion",
              );
              const valAcreditacion = selectAcreditacion
                ? selectAcreditacion.value
                : "CN";

              const selectEstado = tr.querySelector(".select-estado");
              const valEstadoManual = selectEstado
                ? selectEstado.value
                : "Auto";

              const alumnoData = {
                id_inscripcion: idInscripcion,
                id_alumno_fk: idAlumno,
                c1: null,
                c2: null,
                c3: null,
                c4: null,
                c5: null,
                c6: null,
                c7: null,
                c8: null,
                c9: null,
                c10: null,
                calificacion_final: null,
                estado_materia: "Cursando",
                tipo_acreditacion: valAcreditacion,
              };

              // Extraer calificaciones parciales
              for (let i = 1; i <= 10; i++) {
                const inp = tr.querySelector(
                  `.input-parcial[data-comp="c${i}"]`,
                );
                if (inp && inp.value !== "") {
                  alumnoData[`c${i}`] = parseFloat(inp.value);
                }
              }

              // Extraer calificación final y aplicar estatus
              const inFinal = tr.querySelector(".input-final");
              if (inFinal && inFinal.value !== "" && inFinal.value !== "NA") {
                alumnoData.calificacion_final = parseFloat(inFinal.value);
                alumnoData.estado_materia =
                  alumnoData.calificacion_final >= 70
                    ? "Aprobada"
                    : "Reprobada";
              } else if (inFinal && inFinal.value === "NA") {
                alumnoData.calificacion_final = 0;
                alumnoData.estado_materia = "Reprobada";
              }

              if (valEstadoManual === "Baja") {
                alumnoData.estado_materia = "Baja";
              }

              alumnosToSave.push(alumnoData);
            });

            try {
              const textOrig = btnGuardarSabana.innerHTML;
              btnGuardarSabana.innerHTML =
                '<span class="spinner-border spinner-border-sm me-2"></span> Guardando...';
              btnGuardarSabana.disabled = true;

              const payload = {
                id_periodo: periodoId,
                id_materia: materiaId,
                id_grupo: grupoId,
                alumnos: alumnosToSave,
              };

              const res = await window.electronAPI.invoke(
                "save-calificaciones-masivas",
                payload,
              );

              if (res.success) {
                window.cambiosSinGuardarSabana = false;
                sabanaStatusGuardado.innerHTML =
                  '<span class="text-success fw-bold"><i class="bi bi-check-circle-fill"></i> Lista Guardada Correctamente</span>';
                await window.electronAPI.invoke(
                  "dialog-alert",
                  "¡Lista guardada con éxito!",
                );
                formSabana.dispatchEvent(new Event("submit")); // Recargar UI
              }

              btnGuardarSabana.innerHTML = textOrig;
              btnGuardarSabana.disabled = false;
            } catch (err) {
              console.error(err);
              window.electronAPI.invoke(
                "dialog-alert",
                "Error al guardar: " + err.message,
              );
              btnGuardarSabana.disabled = false;
            }
          });
        }
      }

      // ==========================================
      //    LÓGICA: TITULACIÓN (FINAL)
      // ==========================================
      async function setupTitulacion() {
        const searchInput = document.getElementById("tit-search");
        const resultsList = document.getElementById("tit-results");

        const cardAlumno = document.getElementById("tit-alumno-card");
        const lblNombre = document.getElementById("tit-alumno-nombre");
        const lblControl = document.getElementById("tit-alumno-control");
        const lblStatus = document.getElementById("tit-alumno-status");
        const hiddenId = document.getElementById("tit-selected-id");

        const formTitulacion = document.getElementById("form-titulacion");
        const instructionMsg = document.getElementById("tit-instruction");
        const tableBody = document.getElementById("titulados-table-body");
        const lblTotal = document.getElementById("total-titulados");

        const cargarTitulados = async () => {
          tableBody.innerHTML =
            '<tr><td colspan="6" class="text-center">Cargando...</td></tr>';
          try {
            const lista = await window.electronAPI.invoke("get-titulados");
            tableBody.innerHTML = "";
            lblTotal.textContent = `${lista.length} Registros`;

            if (lista.length === 0) {
              tableBody.innerHTML =
                '<tr><td colspan="6" class="text-center text-muted py-4">No hay actas registradas.<br><small>Utiliza el formulario para titular alumnos.</small></td></tr>';
              return;
            }

            lista.forEach((t) => {
              const folioDisplay = t.folio_acta
                ? `<span class="text-warning font-monospace">${t.folio_acta}</span>`
                : '<span class="badge bg-secondary opacity-50">En Trámite</span>';

              // Badge de Mención Honorífica
              const mencionBadge =
                t.mencion_honorifica === 1
                  ? '<i class="bi bi-star-fill text-warning ms-1" title="Mención Honorífica"></i>'
                  : "";

              const row = document.createElement("tr");
              row.innerHTML = `
                <td class="ps-4">${folioDisplay}</td>
                <td class="fw-bold">
                    ${t.nombre} ${t.apellido_paterno}
                    <div class="small text-muted font-monospace">${t.numero_control}</div>
                </td>
                <td class="text-center">
                    <span class="fw-bold text-white">${t.promedio}</span>
                    ${mencionBadge}
                </td>
                <td><span class="badge bg-dark border border-secondary">${t.modalidad}</span></td>
                <td class="small text-muted">${t.fecha_titulacion}</td>
                <td class="text-end pe-4">
                   <button class="btn btn-sm btn-outline-danger btn-borrar-titulacion border-0" data-id="${t.id_titulacion}">
                     <i class="bi bi-trash"></i>
                   </button>
                </td>
              `;
              tableBody.appendChild(row);
            });
          } catch (e) {
            console.error(e);
          }
        };

        await cargarTitulados();

        let todosLosAlumnos = [];
        try {
          todosLosAlumnos = await window.electronAPI.invoke("get-alumnos");
        } catch (e) {}

        searchInput.addEventListener("input", (e) => {
          const texto = e.target.value.toLowerCase();
          resultsList.innerHTML = "";

          if (texto.length < 2) {
            resultsList.classList.add("d-none");
            return;
          }

          const filtrados = todosLosAlumnos.filter(
            (a) =>
              a.nombre.toLowerCase().includes(texto) ||
              a.apellido_paterno.toLowerCase().includes(texto) ||
              a.numero_control.toLowerCase().includes(texto),
          );

          if (filtrados.length > 0) {
            resultsList.classList.remove("d-none");
            filtrados.slice(0, 5).forEach((alumno) => {
              const item = document.createElement("button");
              item.className =
                "list-group-item list-group-item-action list-group-item-dark d-flex justify-content-between align-items-center";

              const statusBadge =
                alumno.status === "Titulado"
                  ? '<span class="badge bg-success ms-2"><i class="bi bi-check-circle"></i> Titulado</span>'
                  : "";

              item.innerHTML = `
                <div>
                  <strong class="text-primary">${alumno.numero_control}</strong> - ${alumno.nombre} ${alumno.apellido_paterno}
                </div>
                ${statusBadge}
              `;

              item.onclick = () => seleccionarAlumno(alumno);
              resultsList.appendChild(item);
            });
          } else {
            resultsList.classList.add("d-none");
          }
        });

        const seleccionarAlumno = (alumno) => {
          searchInput.value = "";
          resultsList.classList.add("d-none");

          instructionMsg.classList.add("d-none");
          cardAlumno.classList.remove("d-none");

          lblNombre.textContent = `${alumno.nombre} ${alumno.apellido_paterno} ${alumno.apellido_materno || ""}`;
          lblControl.textContent = alumno.numero_control;
          lblStatus.textContent = alumno.status;

          if (alumno.status === "Titulado")
            lblStatus.className = "badge bg-success";
          else if (alumno.status === "Egresado")
            lblStatus.className = "badge bg-info text-dark";
          else lblStatus.className = "badge bg-secondary";

          hiddenId.value = alumno.id_alumno;

          if (alumno.status === "Titulado") {
            formTitulacion.classList.add("d-none");
            window.electronAPI.invoke(
              "dialog-alert",
              "Este alumno ya cuenta con acta de titulación.",
            );
          } else {
            formTitulacion.classList.remove("d-none");
            document.getElementById("tit-folio").focus();
          }
        };

        formTitulacion.addEventListener("submit", async (e) => {
          e.preventDefault();
          const idAlumno = hiddenId.value;
          const folio = document
            .getElementById("tit-folio")
            .value.trim()
            .toUpperCase();
          const modalidad = document.getElementById("tit-modalidad").value;
          const fecha = document.getElementById("tit-fecha").value;
          const promedio = document.getElementById("tit-promedio").value;
          const mencion = document.getElementById("tit-mencion").checked
            ? 1
            : 0;

          if (!idAlumno || !fecha || !modalidad || !promedio) return;

          const confirmado = await window.electronAPI.invoke(
            "dialog-confirm",
            "¿Confirmar titulación? Verifica que los datos del acta sean correctos.",
          );

          if (confirmado) {
            try {
              const res = await window.electronAPI.invoke("titular-alumno", {
                id_alumno: idAlumno,
                fecha,
                modalidad,
                folio,
                promedio,
                mencion,
              });

              if (res.success) {
                await window.electronAPI.invoke(
                  "dialog-alert",
                  "¡Acta registrada exitosamente!",
                );

                formTitulacion.reset();
                formTitulacion.classList.add("d-none");
                cardAlumno.classList.add("d-none");
                instructionMsg.classList.remove("d-none");

                todosLosAlumnos =
                  await window.electronAPI.invoke("get-alumnos");
                await cargarTitulados();
              }
            } catch (error) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error: " + error.message,
              );
            }
          }
        });

        tableBody.addEventListener("click", async (e) => {
          const btn = e.target.closest(".btn-borrar-titulacion");
          if (!btn) return;

          const confirmar = await window.electronAPI.invoke(
            "dialog-confirm",
            "¿Eliminar acta? El alumno dejará de estar titulado.",
          );

          if (confirmar) {
            try {
              await window.electronAPI.invoke(
                "delete-titulacion",
                btn.dataset.id,
              );
              todosLosAlumnos = await window.electronAPI.invoke("get-alumnos");
              await cargarTitulados();
            } catch (error) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error: " + error.message,
              );
            }
          }
        });
      }
