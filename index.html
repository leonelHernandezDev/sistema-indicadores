<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="script-src 'self' 'unsafe-inline';"
    />
    <title>Sistema de Indicadores</title>

    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap-icons/font/bootstrap-icons.css"
    />

    <style>
      /* === 1. RESET Y ESTRUCTURA BASE (La base del scroll) === */
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; /* IMPORTANTE: La ventana nunca hace scroll */
        background-color: #050505;
        color: #e5e5e5;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      /* === 2. LAYOUT PRINCIPAL === */
      .main-container {
        display: flex;
        height: 100vh; /* 100% de la ventana */
        width: 100vw;
        overflow: hidden;
      }

      .sidebar {
        width: 260px;
        flex-shrink: 0;
        background-color: #0a0a0a;
        border-right: 1px solid #262626;
        display: flex;
        flex-direction: column;
        padding-top: 1.5rem;
        z-index: 10;
      }

      .content-area {
        flex: 1; /* Ocupa el resto del ancho */
        height: 100%; /* Ocupa todo el alto */
        overflow: hidden;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
      }

      /* === 3. EL ESLABÓN PERDIDO (CONTENEDOR DE PÁGINAS) === */
      #main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%; /* Forzamos altura */
        min-height: 0; /* Permite encogerse */
        overflow: hidden;
      }

      /* === 4. CLASES DE TUS PANTALLAS (Workspace) === */
      .workspace-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      /* === 5. REPARACIÓN DE BOOTSTRAP (TABS Y GRID) === */
      /* Esto arregla el "rompimiento" de la cadena de altura en config-periodos */

      .tab-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      .tab-pane {
        width: 100%;
        height: 100%; /* Forzamos altura */
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        display: none;
      }

      .tab-pane.active {
        display: flex !important; /* Forzamos flex */
      }

      /* Hacemos que las filas y columnas de bootstrap ocupen altura completa */
      .h-100 {
        height: 100% !important;
      }
      .row.h-100 {
        flex: 1;
        min-height: 0;
      }

      /* === 6. TARJETAS Y PANELES === */
      .card {
        background-color: #141414;
        border: 1px solid #262626;
        display: flex;
        flex-direction: column;
      }

      /* Si la tarjeta tiene h-100 o panel-fill, aseguramos flex */
      .card.h-100,
      .card.panel-fill {
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .card-header {
        background-color: transparent;
        border-bottom: 1px solid #262626;
        flex-shrink: 0; /* El título nunca se aplasta */
      }

      .panel-fill {
        flex: 1;
        display: flex !important;
        flex-direction: column !important;
        min-height: 0 !important;
        overflow: hidden !important;
      }

      /* === 7. EL SCROLL (LA JOYA DE LA CORONA) === */
      .scroll-container {
        flex: 1 1 auto;
        height: 0px; /* TRUCO: Altura 0 fuerza a flexbox a calcular el espacio real */
        min-height: 0;
        overflow-y: auto; /* ACTIVA EL SCROLL */
        overflow-x: hidden;
        display: block;
      }

      /* === ESTILOS VISUALES === */
      .table {
        color: #e5e5e5;
        margin-bottom: 0;
      }
      .table thead th {
        background-color: #1a1a1a;
        color: #a3a3a3;
        position: sticky;
        top: 0;
        z-index: 5;
        border-bottom: 1px solid #262626;
        box-shadow: 0 1px 0 #262626;
      }
      .table-hover tbody tr:hover {
        background-color: #1f1f1f;
      }

      /* Inputs */
      .form-control,
      .form-select {
        background-color: #0a0a0a;
        border: 1px solid #262626;
        color: white;
      }
      .form-control:focus {
        background-color: #0a0a0a;
        border-color: #4361ee;
        color: white;
        box-shadow: none;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }

      /* Sidebar Links */
      .sidebar .nav-link {
        color: #a3a3a3;
        margin: 0.2rem 1rem;
      }
      .sidebar .nav-link.active {
        background-color: #4361ee;
        color: white;
      }
      .sidebar .nav-link:hover:not(.active) {
        background-color: #1f1f1f;
        color: white;
      }

      /* Badges Semestres */
      .badge-sem-1 {
        background-color: #06b6d4;
        color: #000;
      }
      .badge-sem-2 {
        background-color: #f97316;
        color: #fff;
      }
      .badge-sem-3 {
        background-color: #eab308;
        color: #000;
      }
      .badge-sem-4 {
        background-color: #22c55e;
        color: #000;
      }
      .badge-sem-5 {
        background-color: #3b82f6;
        color: #fff;
      }
      .badge-sem-6 {
        background-color: #6366f1;
        color: #fff;
      }
      .badge-sem-7 {
        background-color: #a855f7;
        color: #fff;
      }
      .badge-sem-8 {
        background-color: #ec4899;
        color: #fff;
      }
      .badge-sem-9 {
        background-color: #f43f5e;
        color: #fff;
      }
    </style>
  </head>

  <body>
    <div class="main-container">
      <div class="sidebar">
        <h4 class="px-3 mb-4 text-white">Sistema Académico</h4>

        <ul class="nav nav-pills flex-column mb-auto" id="main-nav">
          <li class="nav-item">
            <a
              href="#"
              class="nav-link active"
              id="nav-inicio"
              data-page="inicio"
            >
              <i class="bi bi-house-door-fill me-2"></i> Inicio
            </a>
          </li>
          <li class="nav-item">
            <a
              href="#"
              class="nav-link"
              id="nav-alumnos"
              data-page="gestion-alumnos"
            >
              <i class="bi bi-person-fill me-2"></i> Alumnos
            </a>
          </li>
          <li class="nav-item">
            <a
              href="#"
              class="nav-link"
              id="nav-academico"
              data-page="academico"
            >
              <i class="bi bi-journal-bookmark-fill me-2"></i> Académico
            </a>
          </li>
          <li class="nav-item">
            <a
              href="#"
              class="nav-link"
              id="nav-titulacion"
              data-page="titulacion"
            >
              <i class="bi bi-mortarboard-fill me-2"></i> Titulación
            </a>
          </li>
          <li class="nav-item">
            <a href="#" class="nav-link" id="nav-reportes" data-page="reportes">
              <i class="bi bi-bar-chart-fill me-2"></i> Reportes
            </a>
          </li>
          <li class="nav-item">
            <a
              href="#"
              class="nav-link"
              id="nav-config"
              data-page="config-periodos"
            >
              <i class="bi bi-gear-fill me-2"></i> Configuración
            </a>
          </li>
        </ul>
      </div>

      <div class="content-area">
        <div id="main-content"></div>
      </div>
    </div>

    <script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./node_modules/chart.js/dist/chart.umd.js"></script>

    <script>
      const mainContent = document.getElementById("main-content");
      const navLinks = document.querySelectorAll("#main-nav a.nav-link");

      async function loadContent(pageName, data = null) {
        if (!pageName || pageName === "reportes") {
          mainContent.innerHTML =
            '<div class="d-flex flex-column align-items-center justify-content-center h-100 text-muted">' +
            '<h1><i class="bi bi-cone-striped display-1"></i></h1>' +
            "<h3>En Construcción</h3>" +
            "<p>Esta sección estará disponible próximamente.</p></div>";
          return;
        }

        try {
          const response = await fetch(`./pantallas/${pageName}.html`);
          if (!response.ok) throw new Error("Página no encontrada");
          const html = await response.text();
          mainContent.innerHTML = html;

          if (pageName === "gestion-alumnos") {
            await cargarAlumnos();
            conectarBotonesAlumnos();
          } else if (pageName === "inicio") {
            // <--- AGREGAR ESTO
            await setupInicio(); // <--- AGREGAR ESTO
          } else if (pageName === "form-alumno") {
            await conectarBotonesFormAlumno(data);
          } else if (pageName === "config-periodos") {
            await setupConfigPeriodos();
          } else if (pageName === "academico") {
            await setupAcademico();
          } else if (pageName === "titulacion") {
            await setupTitulacion();
          }
        } catch (error) {
          console.error("Error al cargar la página:", error);
          mainContent.innerHTML = "<h1>Error al cargar</h1>";
        }
      }

      function handleNavClick(e) {
        e.preventDefault();
        navLinks.forEach((link) => link.classList.remove("active"));
        const clickedLink = e.currentTarget;
        clickedLink.classList.add("active");
        const pageToLoad = clickedLink.dataset.page;
        loadContent(pageToLoad);
      }
      navLinks.forEach((link) =>
        link.addEventListener("click", handleNavClick),
      );

      loadContent("inicio");

      // ==========================================
      //    LÓGICA: DASHBOARD (INICIO)
      // ==========================================
      // Variables globales para poder destruir las gráficas al actualizar
      let chartGauss, chartAprobacion, chartTopMaterias, chartRegulares;

      async function setupInicio() {
        // Configuramos el color global de Chart.js para que combine con el Dark Mode
        Chart.defaults.color = "#a3a3a3";
        Chart.defaults.borderColor = "#262626";

        const selectPeriodo = document.getElementById("dash-filtro-periodo");
        const selectSemestre = document.getElementById("dash-filtro-semestre");
        const btnAnalizar = document.getElementById("btn-analizar-periodo");

        // 1. Cargar el catálogo de periodos en el filtro
        try {
          const periodos = await window.electronAPI.invoke("get-periodos");
          selectPeriodo.innerHTML =
            '<option value="">Seleccione Periodo...</option>';
          periodos.forEach(
            (p) =>
              (selectPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`),
          );

          // Seleccionar el periodo más reciente por defecto
          if (periodos.length > 0) selectPeriodo.value = periodos[0].id_periodo;
        } catch (e) {
          console.error(e);
        }

        // 2. Evento del Botón Analizar
        btnAnalizar.addEventListener("click", async () => {
          const id_periodo = selectPeriodo.value;
          const semestre = selectSemestre.value;
          if (!id_periodo)
            return window.electronAPI.invoke(
              "dialog-alert",
              "Por favor, selecciona un Periodo Escolar.",
            );

          try {
            const originalText = btnAnalizar.innerHTML;
            btnAnalizar.innerHTML =
              '<span class="spinner-border spinner-border-sm me-2"></span> Calculando...';
            btnAnalizar.disabled = true;

            const res = await window.electronAPI.invoke("get-dashboard-zona2", {
              id_periodo,
              semestre,
            });

            // --- A. ACTUALIZAR KPIs GIGANTES ---
            document.getElementById("kpi-inscritos-periodo").textContent =
              res.kpis.total_alumnos || 0;
            document.getElementById("kpi-promedio-periodo").textContent = res
              .kpis.promedio_general
              ? parseFloat(res.kpis.promedio_general).toFixed(1)
              : "--";

            const totalMat = res.kpis.total_materias || 0;
            const reprobadas = res.kpis.reprobadas || 0;
            const indiceRep =
              totalMat > 0 ? ((reprobadas / totalMat) * 100).toFixed(1) : 0;
            document.getElementById("kpi-reprobacion-periodo").textContent =
              `${indiceRep}%`;

            // --- B. DESTRUIR GRÁFICAS VIEJAS (Evita que se encimen) ---
            if (chartGauss) chartGauss.destroy();
            if (chartAprobacion) chartAprobacion.destroy();
            if (chartTopMaterias) chartTopMaterias.destroy();
            if (chartRegulares) chartRegulares.destroy();

            // --- C. DIBUJAR GRÁFICAS ---

            // 1. Campana de Gauss (Barras)
            chartGauss = new Chart(
              document.getElementById("chart-campana-gauss"),
              {
                type: "bar",
                data: {
                  labels: [
                    "NA (<70)",
                    "Regular (70-79)",
                    "Bueno (80-89)",
                    "Excelente (90-100)",
                  ],
                  datasets: [
                    {
                      label: "Materias",
                      data: [
                        res.gauss.na || 0,
                        res.gauss.regular || 0,
                        res.gauss.bueno || 0,
                        res.gauss.excelente || 0,
                      ],
                      backgroundColor: [
                        "#dc3545",
                        "#fd7e14",
                        "#0dcaf0",
                        "#198754",
                      ],
                      borderRadius: 4,
                    },
                  ],
                },
                options: {
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                },
              },
            );

            // 2. Aprobación vs Reprobación (Pastel)
            const aprobadas = totalMat - reprobadas;
            chartAprobacion = new Chart(
              document.getElementById("chart-aprobacion-periodo"),
              {
                type: "pie",
                data: {
                  labels: ["Aprobadas", "Reprobadas (NA)"],
                  datasets: [
                    {
                      data: [aprobadas, reprobadas],
                      backgroundColor: ["#198754", "#dc3545"],
                      borderWidth: 0,
                    },
                  ],
                },
                options: { maintainAspectRatio: false },
              },
            );

            // 3. Top Materias (Barras Horizontales)
            const nombresMaterias = res.topMaterias.map(
              (m) => m.nombre_materia,
            );
            const conteoMaterias = res.topMaterias.map((m) => m.reprobados);
            chartTopMaterias = new Chart(
              document.getElementById("chart-top-materias"),
              {
                type: "bar",
                data: {
                  labels:
                    nombresMaterias.length > 0
                      ? nombresMaterias
                      : ["No hay materias reprobadas"],
                  datasets: [
                    {
                      label: "Alumnos Reprobados",
                      data: conteoMaterias.length > 0 ? conteoMaterias : [0],
                      backgroundColor: "#dc3545",
                      borderRadius: 4,
                    },
                  ],
                },
                options: {
                  indexAxis: "y", // La vuelve horizontal
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                },
              },
            );

            // 4. Regulares vs Irregulares (Dona)
            chartRegulares = new Chart(
              document.getElementById("chart-regulares"),
              {
                type: "doughnut",
                data: {
                  labels: [
                    "Limpios (Regulares)",
                    "Deben 1 o más (Irregulares)",
                  ],
                  datasets: [
                    {
                      data: [
                        res.regIrreg.regulares || 0,
                        res.regIrreg.irregulares || 0,
                      ],
                      backgroundColor: ["#0dcaf0", "#ffc107"],
                      borderWidth: 0,
                      cutout: "70%", // Hace el agujero del centro más grande
                    },
                  ],
                },
                options: { maintainAspectRatio: false },
              },
            );

            // Restaurar botón
            btnAnalizar.innerHTML =
              '<i class="bi bi-play-fill"></i> Analizar Periodo';
            btnAnalizar.disabled = false;
          } catch (error) {
            console.error(error);
            await window.electronAPI.invoke(
              "dialog-alert",
              "Error al procesar datos: " + error.message,
            );
            btnAnalizar.innerHTML =
              '<i class="bi bi-play-fill"></i> Analizar Periodo';
            btnAnalizar.disabled = false;
          }
        });

        // Autodisparar el cálculo si hay un periodo cargado
        if (selectPeriodo.value) {
          btnAnalizar.click();
        }
      }

      // ==========================================
      //    LÓGICA: CONFIGURACIÓN
      // ==========================================
      async function setupConfigPeriodos() {
        // Variables globales de la vista
        const selectGrupoPeriodo = document.getElementById("grupo_periodo");

        // Función HOISTED: Para que cualquier pestaña pueda actualizar la lista de grupos
        async function cargarPeriodosEnGrupos() {
          if (!selectGrupoPeriodo) return;
          const valorActual = selectGrupoPeriodo.value; // Guardar lo que estaba seleccionado
          try {
            const periodos = await window.electronAPI.invoke("get-periodos");
            selectGrupoPeriodo.innerHTML =
              '<option value="">Seleccione un periodo...</option>';
            periodos.forEach((p) => {
              selectGrupoPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`;
            });
            if (valorActual) selectGrupoPeriodo.value = valorActual; // Restaurar selección
          } catch (e) {
            console.error(e);
          }
        }

        // --- 1. PERIODOS ---
        const formPeriodo = document.getElementById("form-periodo");
        const inputNombrePeriodo = document.getElementById("nombre_periodo");
        const tablePeriodos = document.getElementById("periodos-table-body");

        const listarPeriodos = async () => {
          tablePeriodos.innerHTML =
            '<tr><td colspan="2" class="text-center">Cargando...</td></tr>';
          try {
            const periodos = await window.electronAPI.invoke("get-periodos");
            tablePeriodos.innerHTML = "";
            if (periodos.length === 0)
              tablePeriodos.innerHTML =
                '<tr><td colspan="2" class="text-center text-muted">Sin registros</td></tr>';
            periodos.forEach((p) => {
              const row = document.createElement("tr");
              row.innerHTML = `
              <td class="ps-4 fw-bold">${p.nombre}</td>
              <td class="text-end pe-4">
                <button class="btn btn-sm btn-outline-danger btn-borrar-periodo border-0" data-id="${p.id_periodo}"><i class="bi bi-trash"></i></button>
              </td>`;
              tablePeriodos.appendChild(row);
            });
          } catch (e) {
            console.error(e);
          }
        };
        await listarPeriodos();

        if (formPeriodo) {
          formPeriodo.addEventListener("submit", async (e) => {
            e.preventDefault();
            const nombre = inputNombrePeriodo.value.trim().toUpperCase();
            if (!/^\d{4}-[1-3]$/.test(nombre)) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Formato inválido. Usa AAAA-P (Ej: 2026-1 para Normal, 2026-3 para Intersemestral)",
              );
              return;
            }
            try {
              const res = await window.electronAPI.invoke(
                "add-periodo",
                nombre,
              );
              if (res.success) {
                inputNombrePeriodo.value = "";
                await listarPeriodos();
                await cargarPeriodosEnGrupos(); // ¡PARCHE DE REACTIVIDAD!
                inputNombrePeriodo.focus();
              }
            } catch (error) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error: " + error.message,
              );
            }
          });
        }

        if (tablePeriodos) {
          tablePeriodos.addEventListener("click", async (e) => {
            const btn = e.target.closest(".btn-borrar-periodo");
            if (!btn) return;
            if (
              await window.electronAPI.invoke(
                "dialog-confirm",
                "¿Eliminar este periodo?",
              )
            ) {
              try {
                await window.electronAPI.invoke(
                  "delete-periodo",
                  btn.dataset.id,
                );
                await listarPeriodos();
                await cargarPeriodosEnGrupos(); // ¡PARCHE DE REACTIVIDAD!
              } catch (error) {
                await window.electronAPI.invoke(
                  "dialog-alert",
                  "Error: " + error.message,
                );
              }
            }
          });
        }

        // --- 2. MATERIAS (CON CRÉDITOS INTEGRADOS) ---
        const formMateria = document.getElementById("form-materia");
        const inputNombreMateria = document.getElementById("nombre_materia");
        const inputSemestre = document.getElementById("semestre_materia");
        const inputCreditos = document.getElementById("creditos_materia");
        const tableMaterias = document.getElementById("materias-table-body");
        let idMateriaAEditar = null;
        const btnGuardarMateria = formMateria
          ? formMateria.querySelector('button[type="submit"]')
          : null;

        const obtenerBadgeSemestre = (semestre) => {
          const indice = ((semestre - 1) % 9) + 1;
          return `<span class="badge badge-sem-${indice} px-3 py-1 rounded-pill shadow-sm" style="min-width: 100px;">${semestre}° Semestre</span>`;
        };

        const listarMaterias = async () => {
          if (!tableMaterias) return;
          tableMaterias.innerHTML =
            '<tr><td colspan="4" class="text-center">Cargando...</td></tr>';
          try {
            const materias = await window.electronAPI.invoke("get-materias");
            tableMaterias.innerHTML = "";
            if (materias.length === 0)
              tableMaterias.innerHTML =
                '<tr><td colspan="4" class="text-center text-muted">Sin registros</td></tr>';

            materias.forEach((m) => {
              const row = document.createElement("tr");
              row.innerHTML = `
              <td class="ps-4">${obtenerBadgeSemestre(m.semestre_ideal)}</td>
              <td class="fw-bold">${m.nombre_materia}</td>
              <td class="text-center"><span class="badge bg-secondary">${m.creditos || 0}</span></td>
              <td class="text-end pe-4">
                <button class="btn btn-sm btn-outline-warning btn-editar-materia border-0 me-1" 
                  data-id="${m.id_materia}" data-nombre="${m.nombre_materia}" data-semestre="${m.semestre_ideal}" data-creditos="${m.creditos || 0}">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger btn-borrar-materia border-0" data-id="${m.id_materia}">
                  <i class="bi bi-trash"></i>
                </button>
              </td>`;
              tableMaterias.appendChild(row);
            });
          } catch (e) {
            console.error(e);
          }
        };
        await listarMaterias();

        if (formMateria) {
          formMateria.addEventListener("submit", async (e) => {
            e.preventDefault();
            const nombre = inputNombreMateria.value.trim();
            const semestre = inputSemestre.value;
            const creditos = inputCreditos.value;

            try {
              let res;
              if (idMateriaAEditar) {
                res = await window.electronAPI.invoke("update-materia", {
                  id: idMateriaAEditar,
                  nombre,
                  semestre,
                  creditos,
                });
              } else {
                res = await window.electronAPI.invoke("add-materia", {
                  nombre,
                  semestre,
                  creditos,
                });
              }
              if (res.success) {
                inputNombreMateria.value = "";
                inputSemestre.value = 1;
                inputCreditos.value = 5;
                idMateriaAEditar = null;
                btnGuardarMateria.innerHTML =
                  '<i class="bi bi-save me-2"></i> Guardar Materia';
                btnGuardarMateria.classList.replace(
                  "btn-warning",
                  "btn-success",
                );
                await listarMaterias();
                inputNombreMateria.focus();
              }
            } catch (error) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error: " + error.message,
              );
            }
          });
        }

        if (tableMaterias) {
          tableMaterias.addEventListener("click", async (e) => {
            const btnEditar = e.target.closest(".btn-editar-materia");
            if (btnEditar) {
              idMateriaAEditar = btnEditar.dataset.id;
              inputNombreMateria.value = btnEditar.dataset.nombre;
              inputSemestre.value = btnEditar.dataset.semestre;
              inputCreditos.value = btnEditar.dataset.creditos;

              btnGuardarMateria.innerHTML =
                '<i class="bi bi-pencil-square me-2"></i> Actualizar';
              btnGuardarMateria.classList.replace("btn-success", "btn-warning");
              inputNombreMateria.focus();
              return;
            }
            const btnBorrar = e.target.closest(".btn-borrar-materia");
            if (btnBorrar) {
              if (
                await window.electronAPI.invoke(
                  "dialog-confirm",
                  "¿Eliminar esta materia?",
                )
              ) {
                try {
                  await window.electronAPI.invoke(
                    "delete-materia",
                    btnBorrar.dataset.id,
                  );
                  if (idMateriaAEditar == btnBorrar.dataset.id) {
                    formMateria.reset();
                    inputCreditos.value = 5;
                    idMateriaAEditar = null;
                    btnGuardarMateria.innerHTML =
                      '<i class="bi bi-save me-2"></i> Guardar Materia';
                    btnGuardarMateria.classList.replace(
                      "btn-warning",
                      "btn-success",
                    );
                  }
                  await listarMaterias();
                } catch (error) {
                  await window.electronAPI.invoke(
                    "dialog-alert",
                    "Error: " + error.message,
                  );
                }
              }
            }
          });
        }

        // --- 3. GRUPOS (NUEVO MÓDULO ACTUALIZADO) ---
        const formGrupo = document.getElementById("form-grupo");
        const inputNombreGrupo = document.getElementById("nombre_grupo");
        const tableGrupos = document.getElementById("grupos-table-body");
        let idGrupoAEditar = null; // Variable para saber si estamos editando
        const btnGuardarGrupo = formGrupo
          ? formGrupo.querySelector('button[type="submit"]')
          : null;

        // Cargar periodos al inicio
        await cargarPeriodosEnGrupos();

        const listarGrupos = async () => {
          const id_periodo = selectGrupoPeriodo.value;
          if (!id_periodo) {
            tableGrupos.innerHTML =
              '<tr><td colspan="2" class="text-center text-muted">Selecciona un periodo a la izquierda para ver sus grupos</td></tr>';
            return;
          }

          tableGrupos.innerHTML =
            '<tr><td colspan="2" class="text-center">Cargando...</td></tr>';
          try {
            const grupos = await window.electronAPI.invoke(
              "get-grupos-por-periodo",
              id_periodo,
            );
            tableGrupos.innerHTML = "";

            if (grupos.length === 0) {
              tableGrupos.innerHTML =
                '<tr><td colspan="2" class="text-center text-muted">Aún no hay grupos creados para este periodo</td></tr>';
              return;
            }

            grupos.forEach((g) => {
              const row = document.createElement("tr");
              row.innerHTML = `
                <td class="ps-4 fw-bold text-primary">Grupo ${g.nombre_grupo}</td>
                <td class="text-end pe-4">
                  <button class="btn btn-sm btn-outline-warning btn-editar-grupo border-0 me-1" 
                    data-id="${g.id_grupo}" data-nombre="${g.nombre_grupo}">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger btn-borrar-grupo border-0" data-id="${g.id_grupo}">
                    <i class="bi bi-trash"></i>
                  </button>
                </td>
              `;
              tableGrupos.appendChild(row);
            });
          } catch (e) {
            console.error(e);
          }
        };

        if (selectGrupoPeriodo) {
          selectGrupoPeriodo.addEventListener("change", () => {
            // Si cambias de periodo, cancelamos la edición
            idGrupoAEditar = null;
            inputNombreGrupo.value = "";
            if (btnGuardarGrupo) {
              btnGuardarGrupo.innerHTML =
                '<i class="bi bi-plus-lg"></i> Agregar Grupo';
              btnGuardarGrupo.classList.replace("btn-warning", "btn-primary");
            }
            listarGrupos();
          });
        }

        if (formGrupo) {
          formGrupo.addEventListener("submit", async (e) => {
            e.preventDefault();
            const id_periodo = selectGrupoPeriodo.value;
            const nombre_grupo = inputNombreGrupo.value.trim().toUpperCase();

            if (!id_periodo) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Por favor, selecciona un Periodo Escolar primero.",
              );
              return;
            }

            try {
              let res;
              // Lógica: Si hay ID es Update, si no es Add
              if (idGrupoAEditar) {
                res = await window.electronAPI.invoke("update-grupo", {
                  id_grupo: idGrupoAEditar,
                  nombre_grupo,
                });
              } else {
                res = await window.electronAPI.invoke("add-grupo", {
                  nombre_grupo,
                  id_periodo,
                });
              }

              if (res.success) {
                inputNombreGrupo.value = "";
                idGrupoAEditar = null;
                btnGuardarGrupo.innerHTML =
                  '<i class="bi bi-plus-lg"></i> Agregar Grupo';
                btnGuardarGrupo.classList.replace("btn-warning", "btn-primary");
                await listarGrupos();
                inputNombreGrupo.focus();
              }
            } catch (error) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error: " + error.message,
              );
            }
          });
        }

        if (tableGrupos) {
          tableGrupos.addEventListener("click", async (e) => {
            // Click en Editar
            const btnEditar = e.target.closest(".btn-editar-grupo");
            if (btnEditar) {
              idGrupoAEditar = btnEditar.dataset.id;
              inputNombreGrupo.value = btnEditar.dataset.nombre;

              btnGuardarGrupo.innerHTML =
                '<i class="bi bi-pencil-square me-2"></i> Actualizar Grupo';
              btnGuardarGrupo.classList.replace("btn-primary", "btn-warning");
              inputNombreGrupo.focus();
              return;
            }

            // Click en Borrar
            const btnBorrar = e.target.closest(".btn-borrar-grupo");
            if (btnBorrar) {
              if (
                await window.electronAPI.invoke(
                  "dialog-confirm",
                  "¿Estás seguro de eliminar este grupo? \n(Asegúrate de no tener alumnos inscritos en él)",
                )
              ) {
                try {
                  await window.electronAPI.invoke(
                    "delete-grupo",
                    btnBorrar.dataset.id,
                  );
                  if (idGrupoAEditar == btnBorrar.dataset.id) {
                    formGrupo.reset();
                    idGrupoAEditar = null;
                    btnGuardarGrupo.innerHTML =
                      '<i class="bi bi-plus-lg"></i> Agregar Grupo';
                    btnGuardarGrupo.classList.replace(
                      "btn-warning",
                      "btn-primary",
                    );
                  }
                  await listarGrupos();
                } catch (error) {
                  await window.electronAPI.invoke(
                    "dialog-alert",
                    "Error al borrar: " + error.message,
                  );
                }
              }
            }
          });
        }
      }

      // ==========================================
      //    LÓGICA: ALUMNOS
      // ==========================================
      async function cargarAlumnos() {
        const tableBody = document.getElementById("alumnos-table-body");
        if (!tableBody) return;
        tableBody.innerHTML =
          '<tr><td colspan="5" class="text-center">Cargando...</td></tr>';
        try {
          const alumnos = await window.electronAPI.invoke("get-alumnos");
          tableBody.innerHTML = "";
          if (alumnos.length === 0) {
            tableBody.innerHTML =
              '<tr><td colspan="5" class="text-center text-muted">Sin alumnos registrados.</td></tr>';
            return;
          }
          alumnos.forEach((alumno) => {
            const row = document.createElement("tr");
            row.innerHTML = `
            <td class="ps-4 fw-bold font-monospace text-primary">${alumno.numero_control}</td>
            <td>${alumno.apellido_paterno} ${alumno.apellido_materno} ${alumno.nombre}</td>
            <td>${alumno.periodo_ingreso_nombre || "N/A"}</td>
            <td><span class="badge ${alumno.status === "Activo" ? "bg-success" : "bg-secondary"}">${alumno.status}</span></td>
            <td class="text-end pe-4">
              <button class="btn btn-sm btn-outline-warning btn-editar-alumno border-0 me-1" data-id="${alumno.id_alumno}"><i class="bi bi-pencil"></i></button>
              <button class="btn btn-sm btn-outline-danger btn-eliminar-alumno border-0" data-id="${alumno.id_alumno}"><i class="bi bi-trash"></i></button>
            </td>`;
            tableBody.appendChild(row);
          });
        } catch (error) {
          console.error(error);
        }
      }

      async function eliminarAlumno(id) {
        if (
          await window.electronAPI.invoke("dialog-confirm", "¿Eliminar alumno?")
        ) {
          try {
            const resultado = await window.electronAPI.invoke(
              "delete-alumno",
              id,
            );
            if (resultado.success) cargarAlumnos();
          } catch (error) {
            await window.electronAPI.invoke(
              "dialog-alert",
              "Error: " + error.message,
            );
          }
        }
      }

      function conectarBotonesAlumnos() {
        const btnNuevo = document.getElementById("btn-nuevo-alumno");
        if (btnNuevo)
          btnNuevo.addEventListener("click", () => loadContent("form-alumno"));
        const searchInput = document.getElementById("search-alumnos");
        if (searchInput) {
          searchInput.addEventListener("input", (e) => {
            const texto = e.target.value.toLowerCase();
            const filas = document.querySelectorAll("#alumnos-table-body tr");
            filas.forEach((fila) => {
              const contenido = fila.textContent.toLowerCase();
              fila.style.display = contenido.includes(texto) ? "" : "none";
            });
          });
        }
        const tableBody = document.getElementById("alumnos-table-body");
        if (tableBody) {
          tableBody.addEventListener("click", async (e) => {
            const btnEliminar = e.target.closest(".btn-eliminar-alumno");
            const btnEditar = e.target.closest(".btn-editar-alumno");
            if (btnEliminar) await eliminarAlumno(btnEliminar.dataset.id);
            if (btnEditar) loadContent("form-alumno", btnEditar.dataset.id);
          });
        }
      }

      async function conectarBotonesFormAlumno(idAlumnoAEditar = null) {
        const form = document.getElementById("form-alumno");
        if (!form) return;
        const btnVolver = document.getElementById("btn-volver-alumnos");
        const selectPeriodos = document.getElementById("id_periodo_ingreso_fk");
        const messageDiv = document.getElementById("form-message");
        const tituloPagina = document.querySelector("h1");
        const btnGuardar = form.querySelector('button[type="submit"]');

        try {
          const periodos = await window.electronAPI.invoke("get-periodos");
          if (periodos.length === 0) {
            selectPeriodos.innerHTML =
              '<option value="" disabled>Sin periodos.</option>';
          } else {
            selectPeriodos.innerHTML =
              '<option value="" selected disabled>Selecciona...</option>';
            periodos.forEach((p) => {
              selectPeriodos.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`;
            });
          }
        } catch (e) {
          console.error(e);
        }

        if (idAlumnoAEditar) {
          tituloPagina.innerHTML =
            '<i class="bi bi-pencil-square"></i> Editar Alumno';
          btnGuardar.innerHTML = '<i class="bi bi-save-fill"></i> Actualizar';
          try {
            const alumno = await window.electronAPI.invoke(
              "get-alumno-by-id",
              idAlumnoAEditar,
            );
            document.getElementById("numero_control").value =
              alumno.numero_control;
            document.getElementById("nombre").value = alumno.nombre;
            document.getElementById("apellido_paterno").value =
              alumno.apellido_paterno;
            document.getElementById("apellido_materno").value =
              alumno.apellido_materno;
            document.getElementById("genero").value = alumno.genero;
            document.getElementById("fecha_nacimiento").value =
              alumno.fecha_nacimiento;
            document.getElementById("status").value = alumno.status;
            if (alumno.id_periodo_ingreso_fk)
              selectPeriodos.value = alumno.id_periodo_ingreso_fk;
          } catch (error) {
            console.error(error);
          }
        }

        btnVolver.addEventListener("click", () =>
          loadContent("gestion-alumnos"),
        );

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const alumnoData = {
            id_alumno: idAlumnoAEditar,
            numero_control: document.getElementById("numero_control").value,
            nombre: document.getElementById("nombre").value,
            apellido_paterno: document.getElementById("apellido_paterno").value,
            apellido_materno: document.getElementById("apellido_materno").value,
            genero: document.getElementById("genero").value,
            fecha_nacimiento: document.getElementById("fecha_nacimiento").value,
            status: document.getElementById("status").value,
            id_periodo_ingreso_fk: document.getElementById(
              "id_periodo_ingreso_fk",
            ).value,
          };

          if (!alumnoData.id_periodo_ingreso_fk) {
            if (messageDiv) {
              messageDiv.textContent = "Selecciona un periodo.";
              messageDiv.classList.remove("d-none");
            } else {
              alert("Selecciona un periodo");
            }
            return;
          }

          try {
            let response;
            if (idAlumnoAEditar)
              response = await window.electronAPI.invoke(
                "update-alumno",
                alumnoData,
              );
            else
              response = await window.electronAPI.invoke(
                "add-alumno",
                alumnoData,
              );

            if (response.success) loadContent("gestion-alumnos");
          } catch (error) {
            if (messageDiv) {
              messageDiv.textContent = `Error: ${error.message}`;
              messageDiv.className = "alert alert-danger mt-3";
              messageDiv.classList.remove("d-none");
            }
          }
        });
      }

      // ==========================================
      //    LÓGICA: CONTROL ACADÉMICO (KÁRDEX Y SÁBANA)
      // ==========================================
      async function setupAcademico() {
        // 1. Cargar catálogos compartidos
        let todosLosAlumnos = [];
        let periodos = [];
        let materias = [];
        try {
          todosLosAlumnos = await window.electronAPI.invoke("get-alumnos");
          periodos = await window.electronAPI.invoke("get-periodos");
          materias = await window.electronAPI.invoke("get-materias");
        } catch (error) {
          console.error("Error cargando catálogos:", error);
        }

        // ==========================================
        //    PESTAÑA 1: CAPTURA INDIVIDUAL (KÁRDEX)
        // ==========================================
        const acadSearch = document.getElementById("acad-search");
        const acadResults = document.getElementById("acad-results");
        const acadWorkspace = document.getElementById("acad-workspace");
        const acadAlumnoNombre = document.getElementById("acad-alumno-nombre");
        const acadAlumnoControl = document.getElementById(
          "acad-alumno-control",
        );
        const acadAlumnoStatus = document.getElementById("acad-alumno-status");

        const acadPeriodo = document.getElementById("acad-periodo");
        const acadMateria = document.getElementById("acad-materia");
        const acadGrupo = document.getElementById("acad-grupo");
        const acadCalificacion = document.getElementById("acad-calificacion");
        const formAcademico = document.getElementById("form-academico");
        const kardexTableBody = document.getElementById("kardex-table-body");

        // ¡NUEVAS VARIABLES PARA CONTROLAR LA EDICIÓN!
        let alumnoSeleccionado = null;
        let idInscripcionAEditar = null;
        const btnGuardarKardex = formAcademico
          ? formAcademico.querySelector('button[type="submit"]')
          : null;

        // Llenar selectores iniciales
        acadPeriodo.innerHTML = '<option value="">Seleccione...</option>';
        periodos.forEach(
          (p) =>
            (acadPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`),
        );
        acadMateria.innerHTML = '<option value="">Seleccione...</option>';
        materias.forEach(
          (m) =>
            (acadMateria.innerHTML += `<option value="${m.id_materia}">${m.nombre_materia} (Sem ${m.semestre_ideal})</option>`),
        );

        if (acadPeriodo) {
          acadPeriodo.addEventListener("change", async (e) => {
            const id_periodo = e.target.value;
            if (!id_periodo) {
              acadGrupo.innerHTML =
                '<option value="">Seleccione Periodo primero...</option>';
              return;
            }
            acadGrupo.innerHTML = '<option value="">Cargando...</option>';
            try {
              const grupos = await window.electronAPI.invoke(
                "get-grupos-por-periodo",
                id_periodo,
              );
              acadGrupo.innerHTML =
                '<option value="">Seleccione Grupo...</option>';
              if (grupos.length === 0)
                acadGrupo.innerHTML =
                  '<option value="">No hay grupos creados</option>';
              grupos.forEach(
                (g) =>
                  (acadGrupo.innerHTML += `<option value="${g.id_grupo}">${g.nombre_grupo}</option>`),
              );
            } catch (error) {
              console.error(error);
            }
          });
        }

        if (acadSearch) {
          acadSearch.addEventListener("input", (e) => {
            const val = e.target.value.toLowerCase().trim();
            acadResults.innerHTML = "";
            if (!val) {
              acadResults.classList.add("d-none");
              return;
            }

            const filtrados = todosLosAlumnos
              .filter(
                (a) =>
                  a.nombre.toLowerCase().includes(val) ||
                  a.apellido_paterno.toLowerCase().includes(val) ||
                  a.numero_control.includes(val),
              )
              .slice(0, 5);

            if (filtrados.length > 0) {
              acadResults.classList.remove("d-none");
              filtrados.forEach((a) => {
                const btn = document.createElement("button");
                btn.className =
                  "list-group-item list-group-item-action text-white bg-dark border-secondary";
                btn.innerHTML = `<strong>${a.numero_control}</strong> - ${a.nombre} ${a.apellido_paterno}`;
                btn.addEventListener("click", () =>
                  seleccionarAlumnoIndividual(a),
                );
                acadResults.appendChild(btn);
              });
            } else {
              acadResults.classList.add("d-none");
            }
          });
        }

        const seleccionarAlumnoIndividual = (alumno) => {
          alumnoSeleccionado = alumno;
          acadSearch.value = "";
          acadResults.classList.add("d-none");

          acadAlumnoNombre.textContent = `${alumno.nombre} ${alumno.apellido_paterno} ${alumno.apellido_materno || ""}`;
          acadAlumnoControl.textContent = alumno.numero_control;

          // PILAR 6: Control del Botón Desplegable de Estatus
          const btnStatus = document.getElementById("acad-alumno-status-btn");
          btnStatus.textContent = alumno.status;
          btnStatus.className = `btn btn-sm dropdown-toggle text-white border-0 ${alumno.status === "Activo" ? "bg-success" : alumno.status === "Baja Temporal" ? "bg-warning text-dark" : alumno.status === "Egresado" ? "bg-info text-dark" : "bg-danger"}`;
          btnStatus.disabled = false;

          acadWorkspace.style.opacity = "1";
          acadWorkspace.style.pointerEvents = "auto";

          formAcademico.reset();
          idInscripcionAEditar = null;
          if (btnGuardarKardex) {
            btnGuardarKardex.innerHTML =
              '<i class="bi bi-check-lg"></i> Registrar';
            btnGuardarKardex.classList.replace("btn-warning", "btn-primary");
          }

          cargarKardex(alumno.id_alumno);
        };

        // PILAR 6: Listener para guardar el nuevo estatus en la BD al hacer clic
        document.querySelectorAll(".status-option").forEach((item) => {
          item.addEventListener("click", async (e) => {
            e.preventDefault();
            if (!alumnoSeleccionado) return;
            const nuevoStatus = e.target.closest("a").dataset.status;

            if (
              await window.electronAPI.invoke(
                "dialog-confirm",
                `¿Cambiar el estatus global del alumno a "${nuevoStatus}"?`,
              )
            ) {
              try {
                await window.electronAPI.invoke("update-alumno-status", {
                  id_alumno: alumnoSeleccionado.id_alumno,
                  status: nuevoStatus,
                });
                alumnoSeleccionado.status = nuevoStatus; // Actualizamos en memoria
                seleccionarAlumnoIndividual(alumnoSeleccionado); // Recargamos la UI visual
                // Actualizamos la base global oculta para el buscador
                const indexGlobal = todosLosAlumnos.findIndex(
                  (a) => a.id_alumno === alumnoSeleccionado.id_alumno,
                );
                if (indexGlobal > -1)
                  todosLosAlumnos[indexGlobal].status = nuevoStatus;
              } catch (error) {
                await window.electronAPI.invoke(
                  "dialog-alert",
                  "Error al cambiar estatus: " + error.message,
                );
              }
            }
          });
        });

        const cargarKardex = async (id_alumno) => {
          kardexTableBody.innerHTML =
            '<tr><td colspan="6" class="text-center text-muted py-4"><span class="spinner-border spinner-border-sm me-2"></span>Cargando historial...</td></tr>';

          try {
            const historial = await window.electronAPI.invoke(
              "get-historial-alumno",
              id_alumno,
            );
            kardexTableBody.innerHTML = "";

            if (historial.length === 0) {
              kardexTableBody.innerHTML =
                '<tr><td colspan="6" class="text-center text-muted py-4">Este alumno aún no tiene calificaciones registradas.</td></tr>';
              return;
            }

            // 1. AUTO-DETECCIÓN DE RECURSES (Inteligencia de Negocio)
            const conteoIntentos = {};
            historial.forEach((reg) => {
              if (!conteoIntentos[reg.id_materia_fk])
                conteoIntentos[reg.id_materia_fk] = 0;
              conteoIntentos[reg.id_materia_fk]++;
              reg.numero_intento = conteoIntentos[reg.id_materia_fk];
            });

            // Invertimos el arreglo para mostrar los más recientes arriba
            const historialDesc = historial.reverse();

            historialDesc.forEach((reg) => {
              const row = document.createElement("tr");

              // Colores de estado
              let badgeClass = "bg-secondary";
              if (reg.estado_materia === "Aprobada") badgeClass = "bg-success";
              else if (reg.estado_materia === "Reprobada")
                badgeClass = "bg-danger";
              else if (reg.estado_materia === "Cursando")
                badgeClass = "bg-warning text-dark";

              let colorCalificacion =
                reg.calificacion_final !== null && reg.calificacion_final < 70
                  ? "text-danger"
                  : "text-white";
              const califMostrar =
                reg.calificacion_final !== null ? reg.calificacion_final : "--";

              // Etiqueta de Acreditación (CN, SO, CI) y Recurse
              let etiquetaAcreditacion = `<span class="badge border border-secondary text-muted ms-1">${reg.tipo_acreditacion || "CN"}</span>`;
              if (reg.numero_intento === 2)
                etiquetaAcreditacion += `<span class="badge bg-danger ms-1 opacity-75">RECURSE</span>`;
              if (reg.numero_intento >= 3)
                etiquetaAcreditacion += `<span class="badge bg-danger ms-1">ESPECIAL</span>`;

              // ¿Tiene competencias capturadas?
              const tieneParciales =
                reg.c1 !== null ||
                reg.c2 !== null ||
                reg.c3 !== null ||
                reg.c4 !== null;
              const idCollapse = `collapse-${reg.id_inscripcion}`;
              const btnExpandir = tieneParciales
                ? `<button class="btn btn-sm btn-link text-info p-0 me-2" data-bs-toggle="collapse" data-bs-target="#${idCollapse}"><i class="bi bi-plus-square"></i></button>`
                : `<span class="d-inline-block me-4" style="width:16px;"></span>`; // Espacio vacío para alinear

              row.innerHTML = `
                <td class="ps-4 text-muted small">${reg.nombre_periodo}</td>
                <td class="fw-bold">
                  ${btnExpandir}
                  ${reg.nombre_materia} <br>
                  <span class="badge bg-light text-dark border fw-normal mt-1 ms-4">Semestre ${reg.semestre_ideal} • ${reg.creditos} Créditos</span>
                  ${etiquetaAcreditacion}
                </td>
                <td class="text-muted">${reg.nombre_grupo}</td>
                <td class="text-center fw-bold fs-5 ${colorCalificacion}">${califMostrar}</td>
                <td class="text-center"><span class="badge ${badgeClass}">${reg.estado_materia}</span></td>
                <td class="text-end pe-4">
                  <button class="btn btn-sm btn-outline-danger btn-borrar-inscripcion border-0" data-id="${reg.id_inscripcion}" title="Eliminar registro">
                    <i class="bi bi-trash"></i>
                  </button>
                </td>
              `;
              kardexTableBody.appendChild(row);

              // Si tiene parciales, inyectamos la fila oculta (Acordeón)
              if (tieneParciales) {
                const rowDetalle = document.createElement("tr");
                rowDetalle.className = "collapse bg-dark bg-opacity-50";
                rowDetalle.id = idCollapse;

                let desglose = `<div class="d-flex gap-3 justify-content-center py-2 text-muted small font-monospace">`;
                for (let i = 1; i <= 8; i++) {
                  const c = reg[`c${i}`];
                  if (c !== null) {
                    const color = c < 70 ? "text-danger fw-bold" : "text-info";
                    desglose += `<span>C${i}: <span class="${color}">${c}</span></span>`;
                  }
                }
                desglose += `</div>`;

                rowDetalle.innerHTML = `<td colspan="6" class="p-0 border-0">${desglose}</td>`;
                kardexTableBody.appendChild(rowDetalle);
              }
            });
          } catch (error) {
            console.error(error);
            kardexTableBody.innerHTML =
              '<tr><td colspan="6" class="text-center text-danger py-4"><i class="bi bi-exclamation-triangle me-2"></i>Error al cargar el historial.</td></tr>';
          }
        };

        // ESCUCHADOR DE CLICS EN LA TABLA (EDITAR Y BORRAR)
        if (kardexTableBody) {
          kardexTableBody.addEventListener("click", async (e) => {
            // Lógica: Clic en EDITAR
            const btnEditar = e.target.closest(".btn-editar-inscripcion");
            if (btnEditar) {
              idInscripcionAEditar = btnEditar.dataset.id;
              acadPeriodo.value = btnEditar.dataset.periodo;
              acadMateria.value = btnEditar.dataset.materia;

              // Como acadGrupo depende de acadPeriodo, lo cargamos "a mano"
              acadGrupo.innerHTML = '<option value="">Cargando...</option>';
              try {
                const grupos = await window.electronAPI.invoke(
                  "get-grupos-por-periodo",
                  btnEditar.dataset.periodo,
                );
                acadGrupo.innerHTML =
                  '<option value="">Seleccione Grupo...</option>';
                grupos.forEach((g) => {
                  const selected =
                    g.id_grupo == btnEditar.dataset.grupo ? "selected" : "";
                  acadGrupo.innerHTML += `<option value="${g.id_grupo}" ${selected}>${g.nombre_grupo}</option>`;
                });
              } catch (error) {
                console.error(error);
              }

              acadCalificacion.value = btnEditar.dataset.calif;

              // Cambiar aspecto del botón principal
              if (btnGuardarKardex) {
                btnGuardarKardex.innerHTML =
                  '<i class="bi bi-pencil-square me-2"></i> Actualizar';
                btnGuardarKardex.classList.replace(
                  "btn-primary",
                  "btn-warning",
                );
              }
              acadCalificacion.focus();
              return;
            }

            // Lógica: Clic en BORRAR
            const btnBorrar = e.target.closest(".btn-borrar-inscripcion");
            if (btnBorrar) {
              if (
                await window.electronAPI.invoke(
                  "dialog-confirm",
                  "¿Estás seguro de eliminar esta calificación del historial?",
                )
              ) {
                try {
                  await window.electronAPI.invoke(
                    "delete-inscripcion",
                    btnBorrar.dataset.id,
                  );

                  // Si el usuario borra la materia que justo estaba editando, limpiamos el formulario para evitar errores
                  if (idInscripcionAEditar == btnBorrar.dataset.id) {
                    formAcademico.reset();
                    idInscripcionAEditar = null;
                    if (btnGuardarKardex) {
                      btnGuardarKardex.innerHTML =
                        '<i class="bi bi-check-lg"></i> Registrar';
                      btnGuardarKardex.classList.replace(
                        "btn-warning",
                        "btn-primary",
                      );
                    }
                  }
                  if (alumnoSeleccionado)
                    cargarKardex(alumnoSeleccionado.id_alumno);
                } catch (error) {
                  await window.electronAPI.invoke(
                    "dialog-alert",
                    "Error al eliminar: " + error.message,
                  );
                }
              }
            }
          });
        }

        // GUARDAR O ACTUALIZAR (SUBMIT DEL FORMULARIO)
        if (formAcademico) {
          formAcademico.addEventListener("submit", async (e) => {
            e.preventDefault();
            if (!alumnoSeleccionado) return;

            const califNum = acadCalificacion.value
              ? parseFloat(acadCalificacion.value)
              : null;
            let estado = "Cursando";
            if (califNum !== null)
              estado = califNum >= 70 ? "Aprobada" : "Reprobada";

            try {
              if (idInscripcionAEditar) {
                // MODO EDICIÓN INDIVIDUAL
                await window.electronAPI.invoke("update-inscripcion", {
                  id_inscripcion: idInscripcionAEditar,
                  id_periodo_fk: acadPeriodo.value,
                  id_materia_fk: acadMateria.value,
                  id_grupo_fk: acadGrupo.value,
                  calificacion_final: califNum, // Campo de la nueva base de datos
                  estado_materia: estado,
                });
                await window.electronAPI.invoke(
                  "dialog-alert",
                  "Registro actualizado correctamente.",
                );

                // Restaurar formulario
                idInscripcionAEditar = null;
                if (btnGuardarKardex) {
                  btnGuardarKardex.innerHTML =
                    '<i class="bi bi-check-lg"></i> Registrar';
                  btnGuardarKardex.classList.replace(
                    "btn-warning",
                    "btn-primary",
                  );
                }
              } else {
                // MODO CREACIÓN INDIVIDUAL
                const datos = {
                  id_alumno: alumnoSeleccionado.id_alumno,
                  id_periodo: acadPeriodo.value,
                  id_materia: acadMateria.value,
                  id_grupo_fk: acadGrupo.value,
                  calificacion_final: califNum, // Campo de la nueva base de datos
                  estado_materia: estado,
                };
                // Usamos el canal seguro e individual, ¡No el masivo de la sábana!
                await window.electronAPI.invoke(
                  "add-inscripcion-individual",
                  datos,
                );
                await window.electronAPI.invoke(
                  "dialog-alert",
                  "Calificación registrada correctamente.",
                );
              }

              acadCalificacion.value = "";
              cargarKardex(alumnoSeleccionado.id_alumno);
            } catch (error) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error: " + error.message,
              );
            }
          });
        }

        // ==========================================
        //    PESTAÑA 2: SÁBANA GRUPAL (NUEVA LÓGICA DINÁMICA)
        // ==========================================
        const sabanaPeriodo = document.getElementById("sabana-periodo");
        const sabanaMateria = document.getElementById("sabana-materia");
        const sabanaGrupo = document.getElementById("sabana-grupo");
        const formSabana = document.getElementById("form-filtros-sabana");

        const sabanaEmptyState = document.getElementById("sabana-empty-state");
        const sabanaWorkspace = document.getElementById("sabana-workspace");
        const btnEmptyAddManual = document.getElementById(
          "btn-empty-add-manual",
        );

        const sabanaTituloMateria = document.getElementById(
          "sabana-titulo-materia",
        );
        const sabanaSubtitulo = document.getElementById("sabana-subtitulo");

        const theadSabana = document.getElementById("sabana-table-head");
        const tbodySabana = document.getElementById("sabana-table-body");

        // Controles Dinámicos
        const switchModalidad = document.getElementById("switch-modalidad");
        const containerCompetencias = document.getElementById(
          "container-competencias",
        );
        const selectNumCompetencias = document.getElementById(
          "select-num-competencias",
        );
        const lblBtnGuardar = document.getElementById("lbl-btn-guardar");
        const btnGuardarSabana = document.getElementById("btn-guardar-sabana");
        const sabanaStatusGuardado = document.getElementById(
          "sabana-status-guardado",
        );

        let alumnosEnSabana = [];
        window.cambiosSinGuardarSabana = false;
        let esListaNueva = true;

        // 1. Cargar Comboboxes iniciales
        sabanaPeriodo.innerHTML =
          '<option value="">Seleccione Periodo...</option>';
        periodos.forEach(
          (p) =>
            (sabanaPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`),
        );
        sabanaMateria.innerHTML =
          '<option value="">Seleccione Materia...</option>';
        materias.forEach(
          (m) =>
            (sabanaMateria.innerHTML += `<option value="${m.id_materia}">${m.nombre_materia} (Sem ${m.semestre_ideal})</option>`),
        );

        if (sabanaPeriodo) {
          sabanaPeriodo.addEventListener("change", async (e) => {
            const id_periodo = e.target.value;
            if (!id_periodo) {
              sabanaGrupo.innerHTML =
                '<option value="">Esperando Periodo...</option>';
              return;
            }
            sabanaGrupo.innerHTML = '<option value="">Cargando...</option>';
            try {
              const grupos = await window.electronAPI.invoke(
                "get-grupos-por-periodo",
                id_periodo,
              );
              sabanaGrupo.innerHTML =
                '<option value="">Seleccione Grupo...</option>';
              grupos.forEach(
                (g) =>
                  (sabanaGrupo.innerHTML += `<option value="${g.id_grupo}">${g.nombre_grupo}</option>`),
              );
            } catch (error) {
              console.error(error);
            }
          });
        }

        // 2. Toggle Switch (Competencias vs Final)
        switchModalidad.addEventListener("change", (e) => {
          const isCompetencias = e.target.checked;
          document.getElementById("lbl-modalidad").textContent = isCompetencias
            ? "Captura por Competencias"
            : "Captura Histórica (Final)";
          if (isCompetencias) {
            containerCompetencias.classList.remove("d-none");
          } else {
            containerCompetencias.classList.add("d-none");
          }
          renderizarSabanaDinamica(); // Redibujar tabla si cambian el switch
        });

        selectNumCompetencias.addEventListener("change", () =>
          renderizarSabanaDinamica(),
        );

        // 3. Cargar Lista (Submit del Formulario Superior)
        if (formSabana) {
          formSabana.addEventListener("submit", async (e) => {
            e.preventDefault();
            const id_periodo = sabanaPeriodo.value;
            const id_materia = sabanaMateria.value;
            const id_grupo_fk = sabanaGrupo.value;

            sabanaTituloMateria.textContent =
              sabanaMateria.options[sabanaMateria.selectedIndex].text;
            sabanaSubtitulo.textContent = `Grupo: ${sabanaGrupo.options[sabanaGrupo.selectedIndex].text} | Periodo: ${sabanaPeriodo.options[sabanaPeriodo.selectedIndex].text}`;

            try {
              // Bloquear pantalla visualmente mientras carga
              sabanaEmptyState.classList.add("d-none");
              sabanaWorkspace.classList.add("d-none");

              alumnosEnSabana = await window.electronAPI.invoke(
                "get-grupo-especifico",
                { id_periodo, id_materia, id_grupo_fk },
              );

              if (alumnosEnSabana.length === 0) {
                esListaNueva = true;
                sabanaEmptyState.classList.remove("d-none");
                sabanaEmptyState.classList.add("d-flex");
              } else {
                esListaNueva = false;
                sabanaWorkspace.classList.remove("d-none");

                // Inteligencia UX: Si el sistema detecta que los alumnos ya tienen captura en C1 o C2,
                // activa el switch de competencias automáticamente.
                const tieneCompetencias = alumnosEnSabana.some(
                  (a) => a.c1 !== null || a.c2 !== null,
                );
                if (tieneCompetencias && !switchModalidad.checked) {
                  switchModalidad.checked = true;
                  switchModalidad.dispatchEvent(new Event("change"));
                }
                renderizarSabanaDinamica();
              }
            } catch (error) {
              console.error(error);
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error al cargar el grupo.",
              );
            }
          });
        }

        // 4. Botón "Añadir Manualmente" desde el Empty State
        btnEmptyAddManual.addEventListener("click", () => {
          sabanaEmptyState.classList.add("d-none");
          sabanaEmptyState.classList.remove("d-flex");
          sabanaWorkspace.classList.remove("d-none");
          esListaNueva = true;
          renderizarSabanaDinamica();
          document.getElementById("btn-add-alumno-sabana").click(); // Abrir buscador automáticamente
        });

        // ==========================================
        // 4.5. MOTOR DE CLONACIÓN DE LISTAS
        // ==========================================
        const btnEmptyClonar = document.getElementById("btn-empty-clonar");
        const clonePeriodo = document.getElementById("clone-periodo");
        const cloneMateria = document.getElementById("clone-materia");
        const cloneGrupo = document.getElementById("clone-grupo");
        const clonePreview = document.getElementById("clone-preview");
        const btnEjecutarClonacion = document.getElementById(
          "btn-ejecutar-clonacion",
        );
        let modalClonar = null;
        let alumnosAClonar = [];

        if (btnEmptyClonar) {
          btnEmptyClonar.addEventListener("click", () => {
            if (!modalClonar)
              modalClonar = new bootstrap.Modal(
                document.getElementById("modalClonarLista"),
              );

            // Llenar los selects del modal usando los catálogos que ya tenemos en memoria
            clonePeriodo.innerHTML = sabanaPeriodo.innerHTML;
            cloneMateria.innerHTML = sabanaMateria.innerHTML;
            cloneGrupo.innerHTML =
              '<option value="">Seleccione Periodo...</option>';
            clonePreview.classList.add("d-none");
            btnEjecutarClonacion.disabled = true;

            modalClonar.show();
          });
        }

        // Cargar los grupos en el modal cuando eligen un periodo
        if (clonePeriodo) {
          clonePeriodo.addEventListener("change", async (e) => {
            const id_periodo = e.target.value;
            cloneGrupo.innerHTML = '<option value="">Cargando...</option>';
            if (!id_periodo) return;
            try {
              const grupos = await window.electronAPI.invoke(
                "get-grupos-por-periodo",
                id_periodo,
              );
              cloneGrupo.innerHTML =
                '<option value="">Seleccione Grupo...</option>';
              grupos.forEach(
                (g) =>
                  (cloneGrupo.innerHTML += `<option value="${g.id_grupo}">${g.nombre_grupo}</option>`),
              );
            } catch (error) {
              console.error(error);
            }
          });
        }

        // Verificar cuántos alumnos hay cada vez que cambian una opción en el modal
        const checkClonePreview = async () => {
          if (clonePeriodo.value && cloneMateria.value && cloneGrupo.value) {
            clonePreview.classList.remove("d-none");
            clonePreview.className =
              "alert alert-secondary py-2 small mb-0 text-center border-0";
            clonePreview.innerHTML =
              '<span class="spinner-border spinner-border-sm me-2"></span> Buscando...';

            alumnosAClonar = await window.electronAPI.invoke(
              "get-grupo-especifico",
              {
                id_periodo: clonePeriodo.value,
                id_materia: cloneMateria.value,
                id_grupo_fk: cloneGrupo.value,
              },
            );

            if (alumnosAClonar.length > 0) {
              clonePreview.innerHTML = `<i class="bi bi-check-circle-fill me-1"></i> Se encontraron <strong class="fs-6">${alumnosAClonar.length}</strong> alumnos listos para importar.`;
              clonePreview.className =
                "alert bg-success bg-opacity-25 text-success py-2 small mb-0 text-center border-0";
              btnEjecutarClonacion.disabled = false;
            } else {
              clonePreview.innerHTML =
                "Este grupo está vacío. No hay a quién clonar.";
              clonePreview.className =
                "alert bg-warning bg-opacity-25 text-warning py-2 small mb-0 text-center border-0";
              btnEjecutarClonacion.disabled = true;
            }
          }
        };

        clonePeriodo.addEventListener("change", checkClonePreview);
        cloneMateria.addEventListener("change", checkClonePreview);
        cloneGrupo.addEventListener("change", checkClonePreview);

        // EJECUTAR LA CLONACIÓN
        btnEjecutarClonacion.addEventListener("click", () => {
          // El truco maestro: Mapeamos a los alumnos y "vaciamos" sus datos históricos
          const nuevosAlumnosLimpios = alumnosAClonar.map((a) => {
            return {
              id_alumno_fk: a.id_alumno_fk || a.id_alumno,
              numero_control: a.numero_control,
              nombre: a.nombre,
              apellido_paterno: a.apellido_paterno,
              // DESTRUIMOS LA HISTORIA LOCAL PARA QUE SEAN REGISTROS NUEVOS
              id_inscripcion: null,
              c1: null,
              c2: null,
              c3: null,
              c4: null,
              c5: null,
              c6: null,
              c7: null,
              c8: null,
              calificacion_final: null,
              estado_materia: "Cursando",
              tipo_acreditacion: "CN",
            };
          });

          alumnosEnSabana = nuevosAlumnosLimpios;
          esListaNueva = true;

          modalClonar.hide();

          // Ocultar Empty State y Mostrar Área de Trabajo
          sabanaEmptyState.classList.add("d-none");
          sabanaEmptyState.classList.remove("d-flex");
          sabanaWorkspace.classList.remove("d-none");

          sabanaStatusGuardado.innerHTML =
            '<span class="text-warning fw-bold"><i class="bi bi-exclamation-triangle"></i> IMPORTANTE: Alumnos importados. Debes presionar "Guardar" para oficializar la lista.</span>';

          renderizarSabanaDinamica();
        });

        // 5. Motor de Renderizado Dinámico
        const renderizarSabanaDinamica = () => {
          const isCompetencias = switchModalidad.checked;
          const numComp = parseInt(selectNumCompetencias.value);

          // --- A. DIBUJAR ENCABEZADOS (THEAD) ---
          let theadHTML = `
            <th class="ps-4" style="width: 12%">N° Control</th>
            <th style="width: 25%">Alumno</th>
          `;

          if (isCompetencias) {
            for (let i = 1; i <= numComp; i++) {
              theadHTML += `<th class="text-center text-info" style="width: 6%">C${i}</th>`;
            }
          }

          theadHTML += `
            <th class="text-center text-warning" style="width: 10%">Prom. Final</th>
            <th class="text-center" style="width: 12%">Acreditación</th>
            <th class="text-center" style="width: 12%">Estatus</th>
            <th class="text-end pe-4" style="width: 8%">Quitar</th>
          `;
          theadSabana.innerHTML = theadHTML;

          // --- B. DIBUJAR ALUMNOS (TBODY) ---
          tbodySabana.innerHTML = "";

          // Comportamiento Camaleónico del Botón Guardar
          if (alumnosEnSabana.length > 0 && !esListaNueva) {
            btnGuardarSabana.classList.replace("btn-primary", "btn-warning");
            lblBtnGuardar.innerHTML = "Actualizar Lista Modificada";
          } else {
            btnGuardarSabana.classList.replace("btn-warning", "btn-primary");
            lblBtnGuardar.innerHTML = "Guardar Nueva Lista";
          }

          if (alumnosEnSabana.length === 0) {
            tbodySabana.innerHTML = `<tr><td colspan="15" class="text-center text-muted py-4">Añade alumnos para empezar a capturar...</td></tr>`;
            return;
          }

          alumnosEnSabana.forEach((a, index) => {
            const tr = document.createElement("tr");
            const id_alumno_real = a.id_alumno_fk || a.id_alumno;
            tr.dataset.id_alumno = id_alumno_real;
            // Si el alumno viene de la BD y ya tiene calificación guardada, traemos su ID de inscripción para el Upsert
            if (a.id_inscripcion) tr.dataset.id_inscripcion = a.id_inscripcion;

            let rowHTML = `
              <td class="ps-4 fw-bold text-muted">${a.numero_control}</td>
              <td class="fw-bold">${a.nombre} ${a.apellido_paterno}</td>
            `;

            if (isCompetencias) {
              for (let i = 1; i <= numComp; i++) {
                const val =
                  a[`c${i}`] !== null && a[`c${i}`] !== undefined
                    ? a[`c${i}`]
                    : "";
                rowHTML += `
                  <td class="text-center">
                    <input type="number" class="form-control form-control-sm text-center fw-bold input-parcial bg-dark text-info border-secondary" 
                           min="0" max="100" data-comp="c${i}" value="${val}" placeholder="--">
                  </td>
                `;
              }
            }

            const califFinal =
              a.calificacion_final !== null &&
              a.calificacion_final !== undefined
                ? a.calificacion_final
                : "";
            const readonlyAttr = isCompetencias ? "readonly" : "";
            const bgClass = isCompetencias
              ? "bg-secondary bg-opacity-25 border-0"
              : "bg-dark border-warning";

            // Regla visual: Si reprobó, pintar el texto de rojo
            let finalColorClass =
              califFinal !== "" && califFinal < 70
                ? "text-danger"
                : "text-white";

            rowHTML += `
              <td class="text-center">
                <input type="text" class="form-control form-control-sm text-center fw-bold input-final ${bgClass} ${finalColorClass}" 
                       ${readonlyAttr} value="${califFinal}" placeholder="--">
              </td>
              <td class="text-center">
                <select class="form-select form-select-sm select-acreditacion bg-dark text-white border-secondary">
                  <option value="CN" ${a.tipo_acreditacion === "CN" || !a.tipo_acreditacion ? "selected" : ""}>CN (Normal)</option>
                  <option value="SO" ${a.tipo_acreditacion === "SO" ? "selected" : ""}>SO (Segunda)</option>
                  <option value="CI" ${a.tipo_acreditacion === "CI" ? "selected" : ""}>CI (Verano)</option>
                </select>
              </td>
              <td class="text-center">
                <select class="form-select form-select-sm select-estado bg-dark text-white border-secondary">
                  <option value="Auto" ${a.estado_materia !== "Baja" ? "selected" : ""}>Automático</option>
                  <option value="Baja" ${a.estado_materia === "Baja" ? "selected" : ""}>Baja</option>
                </select>
              </td>
              <td class="text-end pe-4">
                <button type="button" class="btn btn-sm btn-outline-danger btn-quitar-sabana border-0" title="Eliminar por error de captura">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            `;

            tr.innerHTML = rowHTML;
            tbodySabana.appendChild(tr);
          });

          // --- C. LÓGICA DE CALCULADORA EN VIVO Y VALIDACIONES ---
          const inputs = tbodySabana.querySelectorAll("input[type='number']");

          inputs.forEach((input) => {
            // Detalle Senior: Bloquear teclas no numéricas (e, +, -) y limitar el máximo a 100
            input.addEventListener("keydown", (e) => {
              if (["e", "E", "+", "-", "."].includes(e.key)) e.preventDefault();
