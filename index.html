<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="script-src 'self' 'unsafe-inline';"
    />
    <title>Sistema de Indicadores</title>

    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap-icons/font/bootstrap-icons.css"
    />

    <style>
      /* === 1. RESET Y ESTRUCTURA BASE (La base del scroll) === */
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; /* IMPORTANTE: La ventana nunca hace scroll */
        background-color: #050505;
        color: #e5e5e5;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      /* === 2. LAYOUT PRINCIPAL === */
      .main-container {
        display: flex;
        height: 100vh; /* 100% de la ventana */
        width: 100vw;
        overflow: hidden;
      }

      .sidebar {
        width: 260px;
        flex-shrink: 0;
        background-color: #0a0a0a;
        border-right: 1px solid #262626;
        display: flex;
        flex-direction: column;
        padding-top: 1.5rem;
        z-index: 10;
      }

      .content-area {
        flex: 1; /* Ocupa el resto del ancho */
        height: 100%; /* Ocupa todo el alto */
        overflow: hidden;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
      }

      /* === 3. EL ESLABÓN PERDIDO (CONTENEDOR DE PÁGINAS) === */
      #main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%; /* Forzamos altura */
        min-height: 0; /* Permite encogerse */
        overflow: hidden;
      }

      /* === 4. CLASES DE TUS PANTALLAS (Workspace) === */
      .workspace-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      /* === 5. REPARACIÓN DE BOOTSTRAP (TABS Y GRID) === */
      /* Esto arregla el "rompimiento" de la cadena de altura en config-periodos */

      .tab-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        overflow-y: auto; /* EL SCROLL NACE AQUÍ */
        overflow-x: hidden;
      }

      .tab-pane {
        width: 100%;
        height: 100%;
        flex-direction: column;
        min-height: 0;
        overflow-y: auto; /* EL SCROLL VIVE AQUÍ */
        overflow-x: hidden;
        display: none;
      }

      .tab-pane.active {
        display: flex !important; /* Forzamos flex */
      }

      /* Hacemos que las filas y columnas de bootstrap ocupen altura completa */
      .h-100 {
        height: 100% !important;
      }
      .row.h-100 {
        flex: 1;
        min-height: 0;
      }

      /* === 6. TARJETAS Y PANELES === */
      .card {
        background-color: #141414;
        border: 1px solid #262626;
        display: flex;
        flex-direction: column;
      }

      /* Si la tarjeta tiene h-100 o panel-fill, aseguramos flex */
      .card.h-100,
      .card.panel-fill {
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .card-header {
        background-color: transparent;
        border-bottom: 1px solid #262626;
        flex-shrink: 0; /* El título nunca se aplasta */
      }

      .panel-fill {
        flex: 1;
        display: flex !important;
        flex-direction: column !important;
        min-height: 0 !important;
        overflow: hidden !important;
      }

      /* === 7. EL SCROLL (LA JOYA DE LA CORONA) === */
      .scroll-container {
        flex: 1 1 auto;
        height: 0px; /* TRUCO: Altura 0 fuerza a flexbox a calcular el espacio real */
        min-height: 0;
        overflow-y: auto; /* ACTIVA EL SCROLL */
        overflow-x: hidden;
        display: block;
      }

      /* === ESTILOS VISUALES === */
      .table {
        color: #e5e5e5;
        margin-bottom: 0;
      }
      .table thead th {
        background-color: #1a1a1a;
        color: #a3a3a3;
        position: sticky;
        top: 0;
        z-index: 5;
        border-bottom: 1px solid #262626;
        box-shadow: 0 1px 0 #262626;
      }
      .table-hover tbody tr:hover {
        background-color: #1f1f1f;
      }

      /* Inputs */
      .form-control,
      .form-select {
        background-color: #0a0a0a;
        border: 1px solid #262626;
        color: white;
      }
      .form-control:focus {
        background-color: #0a0a0a;
        border-color: #4361ee;
        color: white;
        box-shadow: none;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }

      /* Sidebar Links */
      .sidebar .nav-link {
        color: #a3a3a3;
        margin: 0.2rem 1rem;
      }
      .sidebar .nav-link.active {
        background-color: #4361ee;
        color: white;
      }
      .sidebar .nav-link:hover:not(.active) {
        background-color: #1f1f1f;
        color: white;
      }

      /* Badges Semestres */
      .badge-sem-1 {
        background-color: #06b6d4;
        color: #000;
      }
      .badge-sem-2 {
        background-color: #f97316;
        color: #fff;
      }
      .badge-sem-3 {
        background-color: #eab308;
        color: #000;
      }
      .badge-sem-4 {
        background-color: #22c55e;
        color: #000;
      }
      .badge-sem-5 {
        background-color: #3b82f6;
        color: #fff;
      }
      .badge-sem-6 {
        background-color: #6366f1;
        color: #fff;
      }
      .badge-sem-7 {
        background-color: #a855f7;
        color: #fff;
      }
      .badge-sem-8 {
        background-color: #ec4899;
        color: #fff;
      }
      .badge-sem-9 {
        background-color: #f43f5e;
        color: #fff;
      }

      /* === 8. COLLAPSIBLE SIDEBAR === */
      .sidebar {
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: visible; /* Para el botón */
      }
      .sidebar.collapsed {
        width: 80px;
      }
      .sidebar.collapsed .sidebar-text {
        display: none;
      }
      .sidebar.collapsed .nav-link {
        text-align: center;
        padding-left: 0;
        padding-right: 0;
        display: flex;
        justify-content: center;
      }
      .sidebar.collapsed .nav-link i {
        margin-right: 0 !important;
        font-size: 1.3rem;
      }
      .logo-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.2rem;
        margin-bottom: 2rem;
        height: 40px;
      }
      /* Efecto hover suave en el toggle */
      #btn-toggle-sidebar {
        transition: transform 0.2s;
      }
      #btn-toggle-sidebar:hover {
        transform: scale(1.1);
      }
    </style>
  </head>

  <body>
    <div class="main-container">
      <div class="sidebar">
        <div class="logo-container">
          <div class="sidebar-text">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 150 40"
              width="150"
              height="40"
            >
              <defs>
                <linearGradient
                  id="gradLogo"
                  x1="0%"
                  y1="0%"
                  x2="100%"
                  y2="100%"
                >
                  <stop
                    offset="0%"
                    style="stop-color: #4361ee; stop-opacity: 1"
                  />
                  <stop
                    offset="100%"
                    style="stop-color: #0dcaf0; stop-opacity: 1"
                  />
                </linearGradient>
              </defs>
              <rect width="30" height="30" rx="8" y="5" fill="url(#gradLogo)" />
              <path
                d="M10 15 L20 10 L30 15 L20 20 Z"
                fill="#ffffff"
                opacity="0.9"
              />
              <path
                d="M10 20 L20 25 L30 20"
                fill="none"
                stroke="#ffffff"
                stroke-width="2"
                opacity="0.6"
              />
              <text
                x="40"
                y="28"
                font-family="'Segoe UI', sans-serif"
                font-weight="800"
                font-size="20"
                fill="#ffffff"
                letter-spacing="1"
              >
                ACAD
                <span fill="#4361ee">X</span>
              </text>
            </svg>
          </div>
          <button
            id="btn-toggle-sidebar"
            class="btn btn-link text-muted p-0 shadow-none border-0"
          >
            <i class="bi bi-list fs-3"></i>
          </button>
        </div>

        <ul class="nav nav-pills flex-column mb-auto" id="main-nav">
          <li class="nav-item">
            <a
              href="#"
              class="nav-link active"
              id="nav-inicio"
              data-page="inicio"
            >
              <i class="bi bi-house-door-fill me-2"></i>
              <span class="sidebar-text">Inicio</span>
            </a>
          </li>
          <li class="nav-item">
            <a
              href="#"
              class="nav-link"
              id="nav-alumnos"
              data-page="gestion-alumnos"
            >
              <i class="bi bi-person-fill me-2"></i>
              <span class="sidebar-text">Alumnos</span>
            </a>
          </li>
          <li class="nav-item">
            <a
              href="#"
              class="nav-link"
              id="nav-academico"
              data-page="academico"
            >
              <i class="bi bi-journal-bookmark-fill me-2"></i>
              <span class="sidebar-text">Académico</span>
            </a>
          </li>
          <li class="nav-item">
            <a
              href="#"
              class="nav-link"
              id="nav-titulacion"
              data-page="titulacion"
            >
              <i class="bi bi-mortarboard-fill me-2"></i>
              <span class="sidebar-text">Titulación</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="#" class="nav-link" id="nav-reportes" data-page="reportes">
              <i class="bi bi-bar-chart-fill me-2"></i>
              <span class="sidebar-text">Reportes</span>
            </a>
          </li>
          <li class="nav-item">
            <a
              href="#"
              class="nav-link"
              id="nav-config"
              data-page="config-periodos"
            >
              <i class="bi bi-gear-fill me-2"></i>
              <span class="sidebar-text">Configuración</span>
            </a>
          </li>
        </ul>
      </div>

      <div class="content-area">
        <div id="main-content"></div>
      </div>
    </div>

    <script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./node_modules/chart.js/dist/chart.umd.js"></script>

    <script src="./node_modules/xlsx/dist/xlsx.full.min.js"></script>
    <script src="./node_modules/jspdf/dist/jspdf.umd.min.js"></script>
    <script src="./node_modules/jspdf-autotable/dist/jspdf.plugin.autotable.min.js"></script>

    <script>
      const mainContent = document.getElementById("main-content");
      const navLinks = document.querySelectorAll("#main-nav a.nav-link");

      async function loadContent(pageName, data = null) {
        if (!pageName) {
          mainContent.innerHTML =
            '<div class="d-flex flex-column align-items-center justify-content-center h-100 text-muted">' +
            '<h1><i class="bi bi-cone-striped display-1"></i></h1>' +
            "<h3>En Construcción</h3>" +
            "<p>Esta sección estará disponible próximamente.</p></div>";
          return;
        }

        try {
          const response = await fetch(`./pantallas/${pageName}.html`);
          if (!response.ok) throw new Error("Página no encontrada");
          const html = await response.text();
          mainContent.innerHTML = html;

          if (pageName === "gestion-alumnos") {
            await cargarAlumnos();
            conectarBotonesAlumnos();
          } else if (pageName === "inicio") {
            // <--- AGREGAR ESTO
            await setupInicio(); // <--- AGREGAR ESTO
          } else if (pageName === "form-alumno") {
            await conectarBotonesFormAlumno(data);
          } else if (pageName === "config-periodos") {
            await setupConfigPeriodos();
          } else if (pageName === "academico") {
            await setupAcademico();
          } else if (pageName === "titulacion") {
            await setupTitulacion();
          } else if (pageName === "reportes") {
            // AQUÍ INICIAREMOS LA MAGIA DE EXPORTACIÓN
            await setupReportes();
          }
        } catch (error) {
          console.error("Error al cargar la página:", error);
          mainContent.innerHTML = "<h1>Error al cargar</h1>";
        }
      }

      function handleNavClick(e) {
        e.preventDefault();
        navLinks.forEach((link) => link.classList.remove("active"));
        const clickedLink = e.currentTarget;
        clickedLink.classList.add("active");
        const pageToLoad = clickedLink.dataset.page;
        loadContent(pageToLoad);
      }
      navLinks.forEach((link) =>
        link.addEventListener("click", handleNavClick),
      );

      loadContent("inicio");

      // ==========================================
      //    LÓGICA: DASHBOARD (INICIO)
      // ==========================================
      // Variables globales para poder destruir las gráficas al actualizar
      let chartGauss, chartAprobacion, chartTopMaterias, chartRegulares;

      async function setupInicio() {
        Chart.defaults.color = "#a3a3a3";
        Chart.defaults.borderColor = "#262626";

        // Inicializar Tooltips de Bootstrap (Los signos de interrogación)
        const tooltipTriggerList = document.querySelectorAll(
          '[data-bs-toggle="tooltip"]',
        );
        [...tooltipTriggerList].map(
          (tooltipTriggerEl) => new bootstrap.Tooltip(tooltipTriggerEl),
        );

        // ==========================================
        // LAZY LOADING: ZONA 1 (GLOBAL)
        // ==========================================
        let chartEvolucion,
          chartEvPromedio,
          chartCaptacion, // <-- NUEVA VARIABLE
          chartDemografia,
          chartModalidades,
          chartDesercion;
        let zona1Cargada = false;

        const cargarZona1 = async () => {
          const filtroAnos = document.getElementById("dash-filtro-anos").value;
          try {
            const res = await window.electronAPI.invoke(
              "get-dashboard-zona1",
              filtroAnos,
            );

            document.getElementById("kpi-matricula-viva").textContent =
              res.kpis.matricula_viva || 0;
            document.getElementById("kpi-egresados-historico").textContent =
              res.kpis.egresados || 0;
            document.getElementById("kpi-promedio-historico").textContent = res
              .kpis.promedio_historico
              ? parseFloat(res.kpis.promedio_historico).toFixed(1)
              : "--";

            if (chartEvolucion) chartEvolucion.destroy();
            if (chartEvPromedio) chartEvPromedio.destroy();
            if (chartCaptacion) chartCaptacion.destroy(); // <-- DESTRUIR LA NUEVA
            if (chartDemografia) chartDemografia.destroy();
            if (chartModalidades) chartModalidades.destroy();
            if (chartDesercion) chartDesercion.destroy();

            // ---> INYECCIÓN A.1: DIBUJAR GRÁFICA DE CAPTACIÓN <---
            chartCaptacion = new Chart(
              document.getElementById("chart-captacion-ingresos"),
              {
                type: "bar",
                data: {
                  labels: res.captacion.map((e) => e.periodo),
                  datasets: [
                    {
                      label: "Nuevos Ingresos",
                      data: res.captacion.map((e) => e.nuevos_ingresos),
                      backgroundColor: "#20c997", // Verde azulado
                      borderRadius: 4,
                    },
                  ],
                },
                options: {
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                },
              },
            );

            chartEvolucion = new Chart(
              document.getElementById("chart-evolucion-matricula"),
              {
                type: "line",
                data: {
                  labels: res.evolucion.map((e) => e.periodo),
                  datasets: [
                    {
                      label: "Alumnos Inscritos",
                      data: res.evolucion.map((e) => e.total_inscritos),
                      borderColor: "#4361ee",
                      backgroundColor: "rgba(67, 97, 238, 0.2)",
                      tension: 0.3,
                      fill: true,
                    },
                  ],
                },
                options: { maintainAspectRatio: false },
              },
            );

            chartEvPromedio = new Chart(
              document.getElementById("chart-evolucion-promedio"),
              {
                type: "line",
                data: {
                  labels: res.evolucionPromedio.map((e) => e.periodo),
                  datasets: [
                    {
                      label: "Promedio General",
                      data: res.evolucionPromedio.map((e) => e.promedio),
                      borderColor: "#198754",
                      backgroundColor: "rgba(25, 135, 84, 0.1)",
                      tension: 0.3,
                      fill: true,
                    },
                  ],
                },
                options: { maintainAspectRatio: false },
              },
            );

            chartDemografia = new Chart(
              document.getElementById("chart-demografia"),
              {
                type: "doughnut",
                data: {
                  labels: res.demografia.map((d) => d.genero || "N/A"),
                  datasets: [
                    {
                      data: res.demografia.map((d) => d.total),
                      backgroundColor: ["#ec4899", "#3b82f6", "#8b5cf6"],
                      borderWidth: 0,
                    },
                  ],
                },
                options: { maintainAspectRatio: false },
              },
            );

            chartModalidades = new Chart(
              document.getElementById("chart-modalidades"),
              {
                type: "pie",
                data: {
                  labels: res.modalidades.map((d) => d.modalidad || "N/A"),
                  datasets: [
                    {
                      data: res.modalidades.map((d) => d.total),
                      backgroundColor: [
                        "#f59e0b",
                        "#0ea5e9",
                        "#10b981",
                        "#8b5cf6",
                      ],
                      borderWidth: 0,
                    },
                  ],
                },
                options: {
                  maintainAspectRatio: false,
                  plugins: { legend: { position: "bottom" } },
                },
              },
            );

            chartDesercion = new Chart(
              document.getElementById("chart-desercion"),
              {
                type: "doughnut",
                data: {
                  labels: res.desercion.map((d) => d.categoria),
                  datasets: [
                    {
                      data: res.desercion.map((d) => d.total),
                      backgroundColor: ["#dc3545", "#198754", "#0dcaf0"],
                      borderWidth: 0,
                    },
                  ],
                },
                options: {
                  maintainAspectRatio: false,
                  plugins: { legend: { position: "bottom" } },
                },
              },
            );

            zona1Cargada = true;
          } catch (error) {
            console.error(error);
          }
        };

        document
          .getElementById("tab-global")
          .addEventListener("shown.bs.tab", () => {
            if (!zona1Cargada) cargarZona1();
          });
        document
          .getElementById("btn-refresh-global")
          .addEventListener("click", cargarZona1);
        cargarZona1();

        // ==========================================
        // LAZY LOADING: ZONA 2 (PERIODO) - Intacta
        // ==========================================
        let chartGauss, chartAprobacion, chartTopMaterias, chartRegulares;
        const selectPeriodo = document.getElementById("dash-filtro-periodo");
        const selectSemestre = document.getElementById("dash-filtro-semestre");
        const btnAnalizar = document.getElementById("btn-analizar-periodo");

        window.electronAPI.invoke("get-periodos").then((periodos) => {
          selectPeriodo.innerHTML =
            '<option value="">Seleccione Periodo...</option>';
          periodos.forEach(
            (p) =>
              (selectPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`),
          );
          if (periodos.length > 0) selectPeriodo.value = periodos[0].id_periodo;
        });

        btnAnalizar.addEventListener("click", async () => {
          const id_periodo = selectPeriodo.value;
          const semestre = selectSemestre.value;
          if (!id_periodo) return;

          try {
            const originalText = btnAnalizar.innerHTML;
            btnAnalizar.innerHTML =
              '<span class="spinner-border spinner-border-sm me-2"></span> Calculando...';
            const res = await window.electronAPI.invoke("get-dashboard-zona2", {
              id_periodo,
              semestre,
            });

            document.getElementById("kpi-inscritos-periodo").textContent =
              res.kpis.total_alumnos || 0;
            document.getElementById("kpi-promedio-periodo").textContent = res
              .kpis.promedio_general
              ? parseFloat(res.kpis.promedio_general).toFixed(1)
              : "--";
            const totalMat = res.kpis.total_materias || 0;
            const reprobadas = res.kpis.reprobadas || 0;
            document.getElementById("kpi-reprobacion-periodo").textContent =
              totalMat > 0
                ? `${((reprobadas / totalMat) * 100).toFixed(1)}%`
                : "0%";

            if (chartGauss) chartGauss.destroy();
            if (chartAprobacion) chartAprobacion.destroy();
            if (chartTopMaterias) chartTopMaterias.destroy();
            if (chartRegulares) chartRegulares.destroy();

            chartGauss = new Chart(
              document.getElementById("chart-campana-gauss"),
              {
                type: "bar",
                data: {
                  labels: [
                    "NA (<70)",
                    "Regular (70-79)",
                    "Bueno (80-89)",
                    "Excelente (90-100)",
                  ],
                  datasets: [
                    {
                      label: "Materias",
                      data: [
                        res.gauss.na || 0,
                        res.gauss.regular || 0,
                        res.gauss.bueno || 0,
                        res.gauss.excelente || 0,
                      ],
                      backgroundColor: [
                        "#dc3545",
                        "#fd7e14",
                        "#0dcaf0",
                        "#198754",
                      ],
                      borderRadius: 4,
                    },
                  ],
                },
                options: {
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                },
              },
            );
            chartAprobacion = new Chart(
              document.getElementById("chart-aprobacion-periodo"),
              {
                type: "pie",
                data: {
                  labels: ["Aprobadas", "Reprobadas (NA)"],
                  datasets: [
                    {
                      data: [totalMat - reprobadas, reprobadas],
                      backgroundColor: ["#198754", "#dc3545"],
                      borderWidth: 0,
                    },
                  ],
                },
                options: { maintainAspectRatio: false },
              },
            );
            chartTopMaterias = new Chart(
              document.getElementById("chart-top-materias"),
              {
                type: "bar",
                data: {
                  labels:
                    res.topMaterias.length > 0
                      ? res.topMaterias.map((m) => m.nombre_materia)
                      : ["No hay materias reprobadas"],
                  datasets: [
                    {
                      label: "Alumnos Reprobados",
                      data:
                        res.topMaterias.length > 0
                          ? res.topMaterias.map((m) => m.reprobados)
                          : [0],
                      backgroundColor: "#dc3545",
                      borderRadius: 4,
                    },
                  ],
                },
                options: {
                  indexAxis: "y",
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                },
              },
            );
            chartRegulares = new Chart(
              document.getElementById("chart-regulares"),
              {
                type: "doughnut",
                data: {

                  options: {

                },
              );

              // PROCESAMIENTO DE DATOS EN VIVO (Gauss Grupal y Listas)
              let na = 0,
                reg = 0,
                bno = 0,

              let topHtml = "",
                bottomHtml = "";

              res.alumnos.forEach((a, index) => {

                if (c < 70) na++;

                if (index < 5 && c >= 70) {
                  topHtml += `<li class="list-group-item bg-transparent text-white px-0 d-flex justify-content-between"><span class="small text-truncate w-75">${a.nombre} ${a.apellido_paterno}</span> <span class="badge bg-success rounded-pill">${c}</span></li>`;

              const reprobadosArr = res.alumnos.filter(

                    datasets: [

                        data: [na, reg, bno, exc],

                          "#198754",
                        ],
                      },

                  },
                  options: {

                    plugins: { legend: { display: false } },

                    datasets: [
                      {

                  },
                  options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { position: "bottom" } },
                  },
                },
              );

              // ---> INYECCIÓN A.4: TERMÓMETRO DOCENTE (GRUPOS) <---
              chartMicroComparativa = new Chart(
                document.getElementById("chart-micro-comparativa"),
                {
                  type: "bar",
                  data: {
                    labels:
                      res.comparativaGrupos.length > 0
                        ? res.comparativaGrupos.map((g) => g.nombre_grupo)
                        : ["Sin Grupos"],
                    datasets: [
                      {
                        label: "% Reprobación",
                        data:
                          res.comparativaGrupos.length > 0
                            ? res.comparativaGrupos.map((g) =>

                                  ? (g.reprobados / g.total_alumnos) * 100
                                  : 0,

                        backgroundColor: "#fd7e14",

                  },
                  options: {

                      },
                    },
                    scales: {

              // ---> INYECCIÓN A.5: HISTÓRICO DE DIFICULTAD <---

                            ? res.historicoMateria.map(

                              )
                            : [0],
                        borderColor: "#dc3545",
                        backgroundColor: "rgba(220, 53, 69, 0.2)",

                      },

                  },

                        callbacks: {

                        ticks: {
                          callback: function (value) {
                            return value + "%";

                      },
                    },
                  },

            } catch (error) {
              console.error(error);
            }
          });

      // ==========================================
      //    LÓGICA: CONFIGURACIÓN
      // ==========================================
      async function setupConfigPeriodos() {
        // Variables globales de la vista
        const selectGrupoPeriodo = document.getElementById("grupo_periodo");

        // Función HOISTED: Para que cualquier pestaña pueda actualizar la lista de grupos
        async function cargarPeriodosEnGrupos() {
          if (!selectGrupoPeriodo) return;
          const valorActual = selectGrupoPeriodo.value; // Guardar lo que estaba seleccionado
          try {
            const periodos = await window.electronAPI.invoke("get-periodos");
            selectGrupoPeriodo.innerHTML =
              '<option value="">Seleccione un periodo...</option>';
            periodos.forEach((p) => {
              selectGrupoPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`;
            });
            if (valorActual) selectGrupoPeriodo.value = valorActual; // Restaurar selección
          } catch (e) {
            console.error(e);
          }
        }

        // --- 1. PERIODOS ---
        const formPeriodo = document.getElementById("form-periodo");
        const inputNombrePeriodo = document.getElementById("nombre_periodo");
        const tablePeriodos = document.getElementById("periodos-table-body");

        const listarPeriodos = async () => {
          tablePeriodos.innerHTML =
            '<tr><td colspan="2" class="text-center">Cargando...</td></tr>';
          try {
            const periodos = await window.electronAPI.invoke("get-periodos");
            tablePeriodos.innerHTML = "";
            if (periodos.length === 0)
              tablePeriodos.innerHTML =
                '<tr><td colspan="2" class="text-center text-muted">Sin registros</td></tr>';
            periodos.forEach((p) => {
              const row = document.createElement("tr");
              row.innerHTML = `
              <td class="ps-4 fw-bold">${p.nombre}</td>
              <td class="text-end pe-4">
                <button class="btn btn-sm btn-outline-danger btn-borrar-periodo border-0" data-id="${p.id_periodo}"><i class="bi bi-trash"></i></button>
              </td>`;
              tablePeriodos.appendChild(row);
            });
          } catch (e) {
            console.error(e);
          }
        };
        await listarPeriodos();

        if (formPeriodo) {
          formPeriodo.addEventListener("submit", async (e) => {
            e.preventDefault();
            const nombre = inputNombrePeriodo.value.trim().toUpperCase();
            if (!/^\d{4}-[1-3]$/.test(nombre)) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Formato inválido. Usa AAAA-P (Ej: 2026-1 para Normal, 2026-3 para Intersemestral)",
              );
              return;
            }
            try {
              const res = await window.electronAPI.invoke(
                "add-periodo",
                nombre,
              );
              if (res.success) {
                inputNombrePeriodo.value = "";
                await listarPeriodos();
                await cargarPeriodosEnGrupos(); // ¡PARCHE DE REACTIVIDAD!
                inputNombrePeriodo.focus();
              }
            } catch (error) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error: " + error.message,
              );
            }
          });
        }

        if (tablePeriodos) {
          tablePeriodos.addEventListener("click", async (e) => {
            const btn = e.target.closest(".btn-borrar-periodo");
            if (!btn) return;
            if (
              await window.electronAPI.invoke(
                "dialog-confirm",
                "¿Eliminar este periodo?",
              )
            ) {
              try {
                await window.electronAPI.invoke(
                  "delete-periodo",
                  btn.dataset.id,
                );
                await listarPeriodos();
                await cargarPeriodosEnGrupos(); // ¡PARCHE DE REACTIVIDAD!
              } catch (error) {
                await window.electronAPI.invoke(
                  "dialog-alert",
                  "Error: " + error.message,
                );
              }
            }
          });
        }

        // --- 2. MATERIAS (CON CRÉDITOS INTEGRADOS) ---
        const formMateria = document.getElementById("form-materia");
        const inputNombreMateria = document.getElementById("nombre_materia");
        const inputSemestre = document.getElementById("semestre_materia");
        const inputCreditos = document.getElementById("creditos_materia");
        const tableMaterias = document.getElementById("materias-table-body");
        let idMateriaAEditar = null;
        const btnGuardarMateria = formMateria
          ? formMateria.querySelector('button[type="submit"]')
          : null;

        const obtenerBadgeSemestre = (semestre) => {
          const indice = ((semestre - 1) % 9) + 1;
          return `<span class="badge badge-sem-${indice} px-3 py-1 rounded-pill shadow-sm" style="min-width: 100px;">${semestre}° Semestre</span>`;
        };

        const listarMaterias = async () => {
          if (!tableMaterias) return;
          tableMaterias.innerHTML =
            '<tr><td colspan="4" class="text-center">Cargando...</td></tr>';
          try {
            const materias = await window.electronAPI.invoke("get-materias");
            tableMaterias.innerHTML = "";
            if (materias.length === 0)
              tableMaterias.innerHTML =
                '<tr><td colspan="4" class="text-center text-muted">Sin registros</td></tr>';

            materias.forEach((m) => {
              const row = document.createElement("tr");
              row.innerHTML = `
              <td class="ps-4">${obtenerBadgeSemestre(m.semestre_ideal)}</td>
              <td class="fw-bold">${m.nombre_materia}</td>
              <td class="text-center"><span class="badge bg-secondary">${m.creditos || 0}</span></td>
              <td class="text-end pe-4">
                <button class="btn btn-sm btn-outline-warning btn-editar-materia border-0 me-1" 
                  data-id="${m.id_materia}" data-nombre="${m.nombre_materia}" data-semestre="${m.semestre_ideal}" data-creditos="${m.creditos || 0}">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger btn-borrar-materia border-0" data-id="${m.id_materia}">
                  <i class="bi bi-trash"></i>
                </button>
              </td>`;
              tableMaterias.appendChild(row);
            });
          } catch (e) {
            console.error(e);
          }
        };
        await listarMaterias();

        if (formMateria) {
          formMateria.addEventListener("submit", async (e) => {
            e.preventDefault();
            const nombre = inputNombreMateria.value.trim();
            const semestre = inputSemestre.value;
            const creditos = inputCreditos.value;

            // --- NUEVA VALIDACIÓN DE MATERIA ---
            const regexLetrasMateria = /^[a-zA-ZÁÉÍÓÚáéíóúÑñ\s]+$/;
            if (!regexLetrasMateria.test(nombre)) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "El nombre de la asignatura solo debe contener letras.",
              );
              return;
            }

            try {
              let res;
              if (idMateriaAEditar) {
                res = await window.electronAPI.invoke("update-materia", {
                  id: idMateriaAEditar,
                  nombre,
                  semestre,
                  creditos,
                });
              } else {
                res = await window.electronAPI.invoke("add-materia", {
                  nombre,
                  semestre,
                  creditos,
                });
              }
              if (res.success) {
                inputNombreMateria.value = "";
                inputSemestre.value = 1;
                inputCreditos.value = 5;
                idMateriaAEditar = null;
                btnGuardarMateria.innerHTML =
                  '<i class="bi bi-save me-2"></i> Guardar Materia';
                btnGuardarMateria.classList.replace(
                  "btn-warning",
                  "btn-success",
                );
                await listarMaterias();
                inputNombreMateria.focus();
              }
            } catch (error) {
              await window.electronAPI.invoke(
                "dialog-alert",
                "Error: " + error.message,
              );
            }
          });
        }

        if (tableMaterias) {
          tableMaterias.addEventListener("click", async (e) => {
            const btnEditar = e.target.closest(".btn-editar-materia");
            if (btnEditar) {
              idMateriaAEditar = btnEditar.dataset.id;
              inputNombreMateria.value = btnEditar.dataset.nombre;
              inputSemestre.value = btnEditar.dataset.semestre;
              inputCreditos.value = btnEditar.dataset.creditos;

              btnGuardarMateria.innerHTML =
                '<i class="bi bi-pencil-square me-2"></i> Actualizar';
              btnGuardarMateria.classList.replace("btn-success", "btn-warning");
              inputNombreMateria.focus();
              return;
            }
            const btnBorrar = e.target.closest(".btn-borrar-materia");
            if (btnBorrar) {
              if (
                await window.electronAPI.invoke(
                  "dialog-confirm",
                  "¿Eliminar esta materia?",
                )
              ) {
                try {
                  await window.electronAPI.invoke(
                    "delete-materia",
                    btnBorrar.dataset.id,
                  );

      function conectarBotonesAlumnos() {
        const btnNuevo = document.getElementById("btn-nuevo-alumno");

          });
        }

        const tableBody = document.getElementById("alumnos-table-body");
        if (tableBody) {
          tableBody.addEventListener("click", async (e) => {
            const btnEliminar = e.target.closest(".btn-eliminar-alumno");
            const btnEditar = e.target.closest(".btn-editar-alumno");
            if (btnEliminar) await eliminarAlumno(btnEliminar.dataset.id);
            if (btnEditar) loadContent("form-alumno", btnEditar.dataset.id);
          });
        }

        // ==========================================
        // LÓGICA DEL IMPORTADOR DE EXCEL
        // ==========================================
        const btnImportar = document.getElementById("btn-importar-excel");
        const inputExcel = document.getElementById("input-excel-alumnos");

        if (btnImportar && inputExcel) {
          btnImportar.addEventListener("click", () => inputExcel.click());

          inputExcel.addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 1. Mostrar la ventana Modal (Sala de espera)
            const modalImportar = new bootstrap.Modal(
              document.getElementById("modalImportarAlumnos"),
            );
            const tbodyImport = document.getElementById("import-table-body");
            const btnGuardarImport = document.getElementById(
              "btn-guardar-importacion",
            );
            const masterPeriodo = document.getElementById(
              "import-master-periodo",
            );

            tbodyImport.innerHTML =
              '<tr><td colspan="7" class="text-center py-4"><span class="spinner-border spinner-border-sm me-2"></span> Leyendo archivo Excel...</td></tr>';
            btnGuardarImport.disabled = true;
            modalImportar.show();

            try {
              // 2. Traer catálogos (Alumnos existentes y Periodos)
              const alumnosDB = await window.electronAPI.invoke("get-alumnos");
              const controlesDB = alumnosDB.map((a) =>
                String(a.numero_control).trim().toUpperCase(),
              );

              const periodos = await window.electronAPI.invoke("get-periodos");
              masterPeriodo.innerHTML =
                '<option value="">Seleccione Periodo...</option>';
              periodos.forEach((p) => {
                masterPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`;
              });

              // 3. Leer el archivo Excel con SheetJS
              const reader = new FileReader();
              reader.onload = async (evt) => {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: "binary" });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];

                // Convertir a JSON (arreglo de arreglos para buscar columnas sin importar el nombre exacto)
                const filasRaw = XLSX.utils.sheet_to_json(worksheet, {
                  header: 1,
                });

                if (filasRaw.length < 2) {
                  tbodyImport.innerHTML =
                    '<tr><td colspan="7" class="text-center text-danger">El archivo parece estar vacío.</td></tr>';
                  return;
                }

                // 4. Inteligencia: Buscar columnas separadas (Soporta 1, 2 o 3 columnas de nombres)
                let idxControl = -1,
                  idxNombre = -1,
                  idxApellidos = -1,
                  idxPaterno = -1,
                  idxMaterno = -1;
                let filaHeaders = 0;

                for (let i = 0; i < Math.min(10, filasRaw.length); i++) {
                  const fila = filasRaw[i];
                  if (!fila) continue;

                  for (let j = 0; j < fila.length; j++) {
                    const celda = String(fila[j] || "")
                      .toLowerCase()
                      .trim();
                    if (!celda) continue;

                    if (
                      celda.includes("control") ||
                      celda.includes("matricula")
                    )
                      idxControl = j;
                    else if (
                      celda.includes("paterno") ||
                      celda.includes("1er apellido") ||
                      celda.includes("primer apellido")
                    )
                      idxPaterno = j;
                    else if (
                      celda.includes("materno") ||
                      celda.includes("2do apellido") ||
                      celda.includes("segundo apellido")
                    )
                      idxMaterno = j;
                    else if (
                      celda === "apellidos" ||
                      celda === "apellido" ||
                      celda.includes("apellidos")
                    )
                      idxApellidos = j;
                    else if (
                      celda.includes("nombre") ||
                      celda.includes("alumno") ||
                      celda.includes("estudiante")
                    )
                      idxNombre = j;
                  }

                  if (idxControl !== -1 && idxNombre !== -1) {
                    filaHeaders = i;
                    break;
                  }
                }

                if (idxControl === -1 || idxNombre === -1) {
                  tbodyImport.innerHTML =
                    '<tr><td colspan="7" class="text-center text-danger"><i class="bi bi-exclamation-triangle"></i> No se encontró "Número de Control" o "Nombre" en el Excel.</td></tr>';
                  return;
                }

                // 5. Procesar Alumnos
                tbodyImport.innerHTML = "";
                let nuevosEncontrados = 0;

                for (let i = filaHeaders + 1; i < filasRaw.length; i++) {
                  const fila = filasRaw[i];
                  if (!fila || !fila[idxControl]) continue;

                  const controlRaw = String(fila[idxControl])
                    .trim()
                    .toUpperCase();
                  if (!controlRaw) continue; // Si la celda de control está vacía, saltar

                  const yaExiste = controlesDB.includes(controlRaw);
                  if (!yaExiste) nuevosEncontrados++;

                  let n = "",
                    p = "",
                    m = "";
                  const valNombre =
                    idxNombre !== -1 && fila[idxNombre]
                      ? String(fila[idxNombre]).trim()
                      : "";

                  // ¿Están separados por columnas o viene todo amontonado?
                  if (idxPaterno !== -1 || idxMaterno !== -1) {
                    // MODO 3 COLUMNAS (Nombre | Paterno | Materno)
                    n = valNombre;
                    p =
                      idxPaterno !== -1 && fila[idxPaterno]
                        ? String(fila[idxPaterno]).trim()
                        : "";
                    m =
                      idxMaterno !== -1 && fila[idxMaterno]
                        ? String(fila[idxMaterno]).trim()
                        : "";
                  } else if (idxApellidos !== -1) {
                    // MODO 2 COLUMNAS (Nombre | Apellidos) <-- ¡AQUÍ ENTRARÁ TU ARCHIVO ACTUAL!
                    n = valNombre;
                    const valApellidos = fila[idxApellidos]
                      ? String(fila[idxApellidos]).trim()
                      : "";
                    const partesAp = valApellidos.split(/\s+/);
                    if (partesAp.length === 1) {
                      p = partesAp[0];
                    } else if (partesAp.length >= 2) {
                      m = partesAp.pop(); // La última palabra es el materno
                      p = partesAp.join(" "); // El resto es el paterno (Cubre casos como "De La Cruz")
                    }
                  } else {
                    // MODO 1 COLUMNA (Todo amontonado en "Nombre" o "Alumno")
                    const partes = valNombre.split(/\s+/);
                    if (partes.length === 1) {
                      n = partes[0];
                    } else if (partes.length === 2) {
                      p = partes[0];
                      n = partes[1];
                    } else if (partes.length >= 3) {
                      p = partes.shift(); // La 1ra palabra es el Paterno
                      m = partes.shift(); // La 2da palabra es el Materno
                      n = partes.join(" "); // Todo lo que sobra es el Nombre(s)
                    }
                  }

                  // Generar la fila (Si ya existe, se bloquea y se pinta gris)
                  const tr = document.createElement("tr");
                  if (yaExiste) {
                    tr.className =
                      "opacity-50 text-decoration-line-through bg-black";
                    tr.innerHTML = `
                       <td>${controlRaw}</td>
                       <td colspan="6" class="text-muted"><i class="bi bi-info-circle"></i> Ya registrado en el sistema.</td>
                     `;
                  } else {
                    tr.className = "alumno-import-row";
                    tr.innerHTML = `
                       <td class="font-monospace text-primary fw-bold" data-val="${controlRaw}">${controlRaw}</td>
                       <td><input type="text" class="form-control form-control-sm bg-dark text-white border-secondary val-nombre" value="${n}"></td>
                       <td><input type="text" class="form-control form-control-sm bg-dark text-white border-secondary val-paterno" value="${p}"></td>
                       <td><input type="text" class="form-control form-control-sm bg-dark text-white border-secondary val-materno" value="${m}"></td>
                       <td>
                         <select class="form-select form-select-sm bg-dark text-white border-secondary val-genero">
                           <option value="Masculino">M</option>
                           <option value="Femenino">F</option>
                         </select>
                       </td>
                       <td>
                         <select class="form-select form-select-sm bg-dark text-white border-secondary val-periodo">
                           <option value="">...</option>
                           ${periodos.map((per) => `<option value="${per.id_periodo}">${per.nombre}</option>`).join("")}
                         </select>
                       </td>
                       <td>
                         <select class="form-select form-select-sm bg-dark text-white border-secondary val-status">
                           <option value="Activo">Activo</option>
                           <option value="Baja Temporal">Baja T.</option>
                         </select>
                       </td>
                     `;
                  }
                  tbodyImport.appendChild(tr);
                }

                document.getElementById("import-stats").innerHTML =
                  `Se encontraron <strong class="text-white">${nuevosEncontrados}</strong> alumnos nuevos listos para importar.`;
                if (nuevosEncontrados > 0) btnGuardarImport.disabled = false;
              };
              reader.readAsBinaryString(file);
            } catch (e) {
              console.error(e);
              tbodyImport.innerHTML =
                '<tr><td colspan="7" class="text-center text-danger">Error al procesar el archivo.</td></tr>';
            }

            // Limpiar input para poder volver a subir el mismo archivo si hay error
            inputExcel.value = "";
          });

          // 6. Controles Maestros (Aplicar a todos)
          document
            .getElementById("btn-aplicar-maestros")
            .addEventListener("click", () => {
              const valPeriodo = document.getElementById(
                "import-master-periodo",
              ).value;
              const valStatus = document.getElementById(
                "import-master-status",
              ).value;

              if (!valPeriodo) {
                window.electronAPI.invoke(
                  "dialog-alert",
                  "Selecciona un periodo maestro primero.",
                );
                return;
              }

              const filasNuevas =
                document.querySelectorAll(".alumno-import-row");
              filasNuevas.forEach((fila) => {
                fila.querySelector(".val-periodo").value = valPeriodo;
                fila.querySelector(".val-status").value = valStatus;
              });
            });

          // 7. Guardar en Base de Datos
          document
            .getElementById("btn-guardar-importacion")
            .addEventListener("click", async (e) => {
              const filasNuevas =
                document.querySelectorAll(".alumno-import-row");
              const payload = [];
              let hayErrores = false;

              filasNuevas.forEach((fila) => {
                const idPeriodo = fila.querySelector(".val-periodo").value;
                if (!idPeriodo) hayErrores = true;

                payload.push({
                  numero_control: fila.querySelector("td").dataset.val,
                  nombre: fila
                    .querySelector(".val-nombre")
                    .value.trim()
                    .toUpperCase(),
                  apellido_paterno: fila
                    .querySelector(".val-paterno")
                    .value.trim()
                    .toUpperCase(),
                  apellido_materno: fila
                    .querySelector(".val-materno")
                    .value.trim()
                    .toUpperCase(),
                  genero: fila.querySelector(".val-genero").value,
                  status: fila.querySelector(".val-status").value,
                  id_periodo_ingreso_fk: idPeriodo || null,
                });
              });

              if (hayErrores) {
                window.electronAPI.invoke(
                  "dialog-alert",
                  "ERROR: Todos los alumnos nuevos deben tener asignado un Periodo de Ingreso.",
                );
                return;
              }

              try {
                const btn = e.target;
                const originalText = btn.innerHTML;
                btn.innerHTML =
                  '<span class="spinner-border spinner-border-sm me-2"></span> Guardando...';
                btn.disabled = true;

                // Enviar al Backend Masivo
                await window.electronAPI.invoke("add-alumnos-masivo", payload);

                // Recargar tabla principal y cerrar modal
                await cargarAlumnos();
                bootstrap.Modal.getInstance(
                  document.getElementById("modalImportarAlumnos"),
                ).hide();

                window.electronAPI.invoke(
                  "dialog-alert",
                  "¡Importación exitosa!",
                );
              } catch (error) {
                console.error(error);
                window.electronAPI.invoke(
                  "dialog-alert",
                  "Error al importar: " + error.message,
                );
                e.target.disabled = false;
              }
            });
        }
      }

          if (periodos.length === 0) {
            selectPeriodos.innerHTML =
              '<option value="" disabled>Sin periodos.</option>';
          } else {
            selectPeriodos.innerHTML =
              '<option value="" selected disabled>Selecciona...</option>';
            periodos.forEach((p) => {
              selectPeriodos.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`;
            });
          }
        } catch (e) {
          console.error(e);
        }

        if (idAlumnoAEditar) {
          tituloPagina.innerHTML =
            '<i class="bi bi-pencil-square"></i> Editar Alumno';
          btnGuardar.innerHTML = '<i class="bi bi-save-fill"></i> Actualizar';
          try {
            const alumno = await window.electronAPI.invoke(
              "get-alumno-by-id",
              idAlumnoAEditar,
            );
            document.getElementById("numero_control").value =
              alumno.numero_control;
            document.getElementById("nombre").value = alumno.nombre;
            document.getElementById("apellido_paterno").value =
              alumno.apellido_paterno;
            document.getElementById("apellido_materno").value =
              alumno.apellido_materno;
            document.getElementById("genero").value = alumno.genero;
            document.getElementById("fecha_nacimiento").value =
              alumno.fecha_nacimiento;
            document.getElementById("status").value = alumno.status;
            if (alumno.id_periodo_ingreso_fk)
              selectPeriodos.value = alumno.id_periodo_ingreso_fk;
          } catch (error) {
            console.error(error);
          }
        }

        btnVolver.addEventListener("click", () =>
          loadContent("gestion-alumnos"),
        );

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const alumnoData = {
            id_alumno: idAlumnoAEditar,
            numero_control: document.getElementById("numero_control").value,
            nombre: document.getElementById("nombre").value,
            apellido_paterno: document.getElementById("apellido_paterno").value,
            apellido_materno: document.getElementById("apellido_materno").value,
            genero: document.getElementById("genero").value,
            fecha_nacimiento: document.getElementById("fecha_nacimiento").value,
            status: document.getElementById("status").value,
            id_periodo_ingreso_fk: document.getElementById(
              "id_periodo_ingreso_fk",
            ).value,
          };

          // --- NUEVAS VALIDACIONES DE ALUMNO ---
          const regexControl = /^\d{1,9}$/; // Solo números, entre 1 y 9 dígitos
          const regexLetras = /^[a-zA-ZÁÉÍÓÚáéíóúÑñ\s]+$/; // Solo letras y espacios

          if (!regexControl.test(alumnoData.numero_control)) {
            if (messageDiv) {
              messageDiv.textContent =
                "El número de control debe contener solo números (máximo 9).";
              messageDiv.className = "alert alert-danger mt-3";
              messageDiv.classList.remove("d-none");
            } else {
              alert(
                "El número de control debe contener solo números (máximo 8).",
              );
            }
            return;
          }

          if (
            !regexLetras.test(alumnoData.nombre) ||
            !regexLetras.test(alumnoData.apellido_paterno) ||
            (alumnoData.apellido_materno &&
              !regexLetras.test(alumnoData.apellido_materno))
          ) {
            if (messageDiv) {
              messageDiv.textContent =
                "El nombre y los apellidos solo deben contener letras.";
              messageDiv.className = "alert alert-danger mt-3";
              messageDiv.classList.remove("d-none");
            } else {
              alert("El nombre y los apellidos solo deben contener letras.");
            }
            return;
          }
          // -------------------------------------

          if (!alumnoData.id_periodo_ingreso_fk) {
            if (messageDiv) {
              messageDiv.textContent = "Selecciona un periodo.";
              messageDiv.classList.remove("d-none");
            } else {
              alert("Selecciona un periodo");
            }
            return;
          }

          try {
            let response;
            if (idAlumnoAEditar)
              response = await window.electronAPI.invoke(
                "update-alumno",
                alumnoData,
              );
            else
              response = await window.electronAPI.invoke(
                "add-alumno",
                alumnoData,
              );

            if (response.success) loadContent("gestion-alumnos");
          } catch (error) {
            if (messageDiv) {
              messageDiv.textContent = `Error: ${error.message}`;
              messageDiv.className = "alert alert-danger mt-3";
              messageDiv.classList.remove("d-none");
            }
          }
        });
      }

      // ==========================================
      //    LÓGICA: CONTROL ACADÉMICO (KÁRDEX Y SÁBANA)
      // ==========================================
      async function setupAcademico() {
        // 1. Cargar catálogos compartidos
        let todosLosAlumnos = [];
        let periodos = [];
        let materias = [];
        try {
          todosLosAlumnos = await window.electronAPI.invoke("get-alumnos");
          periodos = await window.electronAPI.invoke("get-periodos");
          materias = await window.electronAPI.invoke("get-materias");
        } catch (error) {
          console.error("Error cargando catálogos:", error);
        }

        // ==========================================
        //    PESTAÑA 1: CAPTURA INDIVIDUAL (KÁRDEX)
        // ==========================================
        const acadSearch = document.getElementById("acad-search");
        const acadResults = document.getElementById("acad-results");
        const acadWorkspace = document.getElementById("acad-workspace");
        const acadAlumnoNombre = document.getElementById("acad-alumno-nombre");
        const acadAlumnoControl = document.getElementById(
          "acad-alumno-control",
        );
        const acadAlumnoStatus = document.getElementById("acad-alumno-status");

        const acadPeriodo = document.getElementById("acad-periodo");
        const acadMateria = document.getElementById("acad-materia");
        const acadGrupo = document.getElementById("acad-grupo");
        const acadCalificacion = document.getElementById("acad-calificacion");
        const formAcademico = document.getElementById("form-academico");
        const kardexTableBody = document.getElementById("kardex-table-body");

        // ¡NUEVAS VARIABLES PARA CONTROLAR LA EDICIÓN!
        let alumnoSeleccionado = null;
        let idInscripcionAEditar = null;
        const btnGuardarKardex = formAcademico
          ? formAcademico.querySelector('button[type="submit"]')
          : null;

        // Llenar selectores iniciales
        acadPeriodo.innerHTML = '<option value="">Seleccione...</option>';
        periodos.forEach(
          (p) =>
            (acadPeriodo.innerHTML += `<option value="${p.id_periodo}">${p.nombre}</option>`),
        );
        acadMateria.innerHTML = '<option value="">Seleccione...</option>';
        materias.forEach(
          (m) =>
            (acadMateria.innerHTML += `<option value="${m.id_materia}">${m.nombre_materia} (Sem ${m.semestre_ideal})</option>`),
        );

        if (acadPeriodo) {
          acadPeriodo.addEventListener("change", async (e) => {
            const id_periodo = e.target.value;
            if (!id_periodo) {
              acadGrupo.innerHTML =
                '<option value="">Seleccione Periodo primero...</option>';
              return;
            }
            acadGrupo.innerHTML = '<option value="">Cargando...</option>';
            try {
              const grupos = await window.electronAPI.invoke(
                "get-grupos-por-periodo",
                id_periodo,
              );
              acadGrupo.innerHTML =
                '<option value="">Seleccione Grupo...</option>';
              if (grupos.length === 0)
                acadGrupo.innerHTML =
                  '<option value="">No hay grupos creados</option>';
              grupos.forEach(
                (g) =>
                  (acadGrupo.innerHTML += `<option value="${g.id_grupo}">${g.nombre_grupo}</option>`),
              );
            } catch (error) {
              console.error(error);
            }
          });
        }

        // --- NUEVO: INTELIGENCIA PARA AUTO-DETECTAR COMPETENCIAS DEL GRUPO ---
        if (acadGrupo) {
          acadGrupo.addEventListener("change", async (e) => {
            const id_grupo = e.target.value;
            const id_materia = acadMateria.value;
            const id_periodo = acadPeriodo.value;
            if (!id_grupo || !id_materia || !id_periodo) return;

            try {
              const alumnosGrupo = await window.electronAPI.invoke(
                "get-grupo-especifico",
                { id_periodo, id_materia, id_grupo_fk: id_grupo },
              );

              const numCompSelect = document.getElementById(
                "acad-select-num-competencias",
              );

              if (alumnosGrupo.length > 0) {
                const sample = alumnosGrupo.find(
                  (a) => a.c1 !== null || a.c2 !== null,
                );
                if (sample) {
                  let maxC = 0;
                  for (let i = 10; i >= 1; i--) {
                    if (sample[`c${i}`] !== null) {
                      maxC = i;
                      break;
                    }
                  }
                  if (maxC > 0) {
                    const switchMod = document.getElementById(
                      "acad-switch-modalidad",
                    );
                    switchMod.checked = true;
                    switchMod.dispatchEvent(new Event("change"));

                    numCompSelect.value = Math.max(maxC, 4);
                    numCompSelect.dispatchEvent(new Event("change"));

                    // ¡EL CANDADO! Bloquea el select para no arruinar el grupo
                    numCompSelect.disabled = true;
                  }
                } else {
                  const switchMod = document.getElementById(
                    "acad-switch-modalidad",
                  );
                  switchMod.checked = false;
                  switchMod.dispatchEvent(new Event("change"));
                  numCompSelect.disabled = false;
                }
              } else {
                numCompSelect.disabled = false; // Grupo nuevo = sin candado
              }
            } catch (error) {
              console.error("Error auto-detectando grupo:", error);
            }
          });
        }

        if (acadSearch) {
          acadSearch.addEventListener("input", (e) => {
            const val = e.target.value.toLowerCase().trim();
            acadResults.innerHTML = "";
            if (!val) {
              acadResults.classList.add("d-none");
              return;
            }

            const filtrados = todosLosAlumnos
              .filter(
                (a) =>
                  a.nombre.toLowerCase().includes(val) ||
                  a.apellido_paterno.toLowerCase().includes(val) ||
                  a.numero_control.includes(val),
              )
              .slice(0, 5);

            if (filtrados.length > 0) {
              acadResults.classList.remove("d-none");
              filtrados.forEach((a) => {
                const btn = document.createElement("button");
                btn.className =
                  "list-group-item list-group-item-action text-white bg-dark border-secondary";
                btn.innerHTML = `<strong>${a.numero_control}</strong> - ${a.nombre} ${a.apellido_paterno}`;
                btn.addEventListener("click", () =>
                  seleccionarAlumnoIndividual(a),
                );
                acadResults.appendChild(btn);
              });
            } else {
              acadResults.classList.add("d-none");
            }
          });
        }

        const seleccionarAlumnoIndividual = (alumno) => {
          alumnoSeleccionado = alumno;
          acadSearch.value = "";
          acadResults.classList.add("d-none");

          acadAlumnoNombre.textContent = `${alumno.nombre} ${alumno.apellido_paterno} ${alumno.apellido_materno || ""}`;
          acadAlumnoControl.textContent = alumno.numero_control;

          // PILAR 6: Control del Botón Desplegable de Estatus
          const btnStatus = document.getElementById("acad-alumno-status-btn");
          btnStatus.innerHTML = alumno.status;
          btnStatus.className = `btn btn-sm dropdown-toggle text-white border-0 shadow-sm ${alumno.status === "Activo" ? "bg-success" : alumno.status === "Baja Temporal" ? "bg-warning text-dark" : alumno.status === "Egresado" ? "bg-info text-dark" : "bg-danger"}`;
          btnStatus.setAttribute("data-bs-toggle", "dropdown");
          btnStatus.disabled = false;

          // FUERZA BRUTA: Le quitamos el control automático a Bootstrap y lo forzamos a abrir por código
          btnStatus.onclick = function (e) {
            e.preventDefault();
            try {
              const bsDropdown =
                bootstrap.Dropdown.getOrCreateInstance(btnStatus);
              bsDropdown.toggle();
            } catch (err) {
              console.error("Error forzando Bootstrap:", err);
            }
          };

          acadWorkspace.style.opacity = "1";
          acadWorkspace.style.pointerEvents = "auto";

          formAcademico.reset();
          idInscripcionAEditar = null;
          // ---> INYECCIÓN <---
          document.getElementById("acad-acreditacion").value = "CN";
          if (btnGuardarKardex) {
            btnGuardarKardex.innerHTML =
              '<i class="bi bi-check-lg"></i> Registrar';
            btnGuardarKardex.classList.replace("btn-warning", "btn-primary");
          }

          cargarKardex(alumno.id_alumno);
        };

        // PILAR 6: Listener para guardar el nuevo estatus en la BD al hacer clic
        document.querySelectorAll(".status-option").forEach((item) => {
          item.addEventListener("click", async (e) => {
            e.preventDefault();
            if (!alumnoSeleccionado) return;
            const nuevoStatus = e.target.closest("a").dataset.status;

            if (
              await window.electronAPI.invoke(
                "dialog-confirm",
                `¿Cambiar el estatus global del alumno a "${nuevoStatus}"?`,
              )
            ) {
              try {
                await window.electronAPI.invoke("update-alumno-status", {
                  id_alumno: alumnoSeleccionado.id_alumno,
                  status: nuevoStatus,
                });
                alumnoSeleccionado.status = nuevoStatus; // Actualizamos en memoria
                seleccionarAlumnoIndividual(alumnoSeleccionado); // Recargamos la UI visual
                // Actualizamos la base global oculta para el buscador
                const indexGlobal = todosLosAlumnos.findIndex(
                  (a) => a.id_alumno === alumnoSeleccionado.id_alumno,
                );
                if (indexGlobal > -1)
                  todosLosAlumnos[indexGlobal].status = nuevoStatus;
              } catch (error) {
                await window.electronAPI.invoke(
                  "dialog-alert",
                  "Error al cambiar estatus: " + error.message,
                );
              }
            }
          });
        });

        const cargarKardex = async (id_alumno) => {
          kardexTableBody.innerHTML =
            '<tr><td colspan="6" class="text-center text-muted py-4"><span class="spinner-border spinner-border-sm me-2"></span>Cargando historial...</td></tr>';

          try {
            const historial = await window.electronAPI.invoke(
              "get-historial-alumno",
              id_alumno,
            );
            kardexTableBody.innerHTML = "";

            if (historial.length === 0) {
              kardexTableBody.innerHTML =
                '<tr><td colspan="6" class="text-center text-muted py-4">Este alumno aún no tiene calificaciones registradas.</td></tr>';
              return;
            }

            // 1. AUTO-DETECCIÓN DE RECURSES (Inteligencia de Negocio)
            const conteoIntentos = {};
            historial.forEach((reg) => {
              if (!conteoIntentos[reg.id_materia_fk])
                conteoIntentos[reg.id_materia_fk] = 0;
              conteoIntentos[reg.id_materia_fk]++;
              reg.numero_intento = conteoIntentos[reg.id_materia_fk];
            });

            // Invertimos el arreglo para mostrar los más recientes arriba
            const historialDesc = historial.reverse();

            historialDesc.forEach((reg) => {
              const row = document.createElement("tr");

              // Colores de estado
              let badgeClass = "bg-secondary";
              if (reg.estado_materia === "Aprobada") badgeClass = "bg-success";
              else if (reg.estado_materia === "Reprobada")
                badgeClass = "bg-danger";
              else if (reg.estado_materia === "Cursando")
                badgeClass = "bg-warning text-dark";

              let colorCalificacion =
                reg.calificacion_final !== null && reg.calificacion_final < 70
                  ? "text-danger"
                  : "text-white";
              const califMostrar =
                reg.calificacion_final !== null ? reg.calificacion_final : "--";

              // Etiqueta de Acreditación (CN, SO, CI) y Recurse
              let etiquetaAcreditacion = `<span class="badge border border-secondary text-muted ms-1">${reg.tipo_acreditacion || "CN"}</span>`;
              if (reg.numero_intento === 2)
                etiquetaAcreditacion += `<span class="badge bg-danger ms-1 opacity-75">RECURSE</span>`;
              if (reg.numero_intento >= 3)
                etiquetaAcreditacion += `<span class="badge bg-danger ms-1">ESPECIAL</span>`;

              // ¿Tiene competencias capturadas?
              const tieneParciales =
                reg.c1 !== null ||
                reg.c2 !== null ||
                reg.c3 !== null ||
                reg.c4 !== null;
              const idCollapse = `collapse-${reg.id_inscripcion}`;
              const btnExpandir = tieneParciales
                ? `<button class="btn btn-sm btn-link text-info p-0 me-2" data-bs-toggle="collapse" data-bs-target="#${idCollapse}"><i class="bi bi-plus-square"></i></button>`
                : `<span class="d-inline-block me-4" style="width:16px;"></span>`; // Espacio vacío para alinear

              row.innerHTML = `
                <td class="ps-4 text-muted small">${reg.nombre_periodo}</td>
                <td class="fw-bold">
                  ${btnExpandir}
                  ${reg.nombre_materia} <br>
                  <span class="badge bg-light text-dark border fw-normal mt-1 ms-4">Semestre ${reg.semestre_ideal} • ${reg.creditos} Créditos</span>
                  ${etiquetaAcreditacion}
                </td>
                <td class="text-muted">${reg.nombre_grupo}</td>
                <td class="text-center fw-bold fs-5 ${colorCalificacion}">${califMostrar}</td>
                <td class="text-center"><span class="badge ${badgeClass}">${reg.estado_materia}</span></td>
                <td class="text-end pe-4">
                  <button class="btn btn-sm btn-outline-warning btn-editar-inscripcion border-0 me-1" 
                    data-id="${reg.id_inscripcion}"
                    data-periodo="${reg.id_periodo_fk}"
                    data-materia="${reg.id_materia_fk}"
                    data-grupo="${reg.id_grupo_fk}"
                    data-calif="${reg.calificacion_final !== null ? reg.calificacion_final : ""}"
                    data-acreditacion="${reg.tipo_acreditacion || "CN"}"
                    data-c1="${reg.c1 !== null ? reg.c1 : ""}" data-c2="${reg.c2 !== null ? reg.c2 : ""}"
                    data-c3="${reg.c3 !== null ? reg.c3 : ""}" data-c4="${reg.c4 !== null ? reg.c4 : ""}"
                    data-c5="${reg.c5 !== null ? reg.c5 : ""}" data-c6="${reg.c6 !== null ? reg.c6 : ""}"
                    data-c7="${reg.c7 !== null ? reg.c7 : ""}" data-c8="${reg.c8 !== null ? reg.c8 : ""}"
                    data-c9="${reg.c9 !== null ? reg.c9 : ""}" data-c10="${reg.c10 !== null ? reg.c10 : ""}"
                    title="Editar registro">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger btn-borrar-inscripcion border-0" data-id="${reg.id_inscripcion}" title="Eliminar registro">
                    <i class="bi bi-trash"></i>
                  </button>
                </td>
              `;
              kardexTableBody.appendChild(row);

              // Si tiene parciales, inyectamos la fila oculta (Acordeón)
              if (tieneParciales) {
                const rowDetalle = document.createElement("tr");
                rowDetalle.className = "collapse bg-dark bg-opacity-50";
                rowDetalle.id = idCollapse;

                let desglose = `<div class="d-flex gap-3 justify-content-center py-2 text-muted small font-monospace">`;
                for (let i = 1; i <= 10; i++) {
                  const c = reg[`c${i}`];
                  if (c !== null) {
                    const color = c < 70 ? "text-danger fw-bold" : "text-info";
                    desglose += `<span>C${i}: <span class="${color}">${c}</span></span>`;
                  }
                }
                desglose += `</div>`;

                rowDetalle.innerHTML = `<td colspan="6" class="p-0 border-0">${desglose}</td>`;
                kardexTableBody.appendChild(rowDetalle);
              }
            });
          } catch (error) {
            console.error(error);
            kardexTableBody.innerHTML =
              '<tr><td colspan="6" class="text-center text-danger py-4"><i class="bi bi-exclamation-triangle me-2"></i>Error al cargar el historial.</td></tr>';
          }
        };

        // ESCUCHADOR DE CLICS EN LA TABLA (EDITAR Y BORRAR)
        if (kardexTableBody) {
          kardexTableBody.addEventListener("click", async (e) => {
            // Lógica: Clic en EDITAR
            const btnEditar = e.target.closest(".btn-editar-inscripcion");
            if (btnEditar) {
              idInscripcionAEditar = btnEditar.dataset.id;
              acadPeriodo.value = btnEditar.dataset.periodo;
              acadMateria.value = btnEditar.dataset.materia;

              // Como acadGrupo depende de acadPeriodo, lo cargamos "a mano"
              acadGrupo.innerHTML = '<option value="">Cargando...</option>';
              try {
                const grupos = await window.electronAPI.invoke(
                  "get-grupos-por-periodo",
                  btnEditar.dataset.periodo,
                );
                acadGrupo.innerHTML =
                  '<option value="">Seleccione Grupo...</option>';
                grupos.forEach((g) => {
                  const selected =
                    g.id_grupo == btnEditar.dataset.grupo ? "selected" : "";
                  acadGrupo.innerHTML += `<option value="${g.id_grupo}" ${selected}>${g.nombre_grupo}</option>`;
                });
              } catch (error) {
                console.error(error);
              }

              acadCalificacion.value = btnEditar.dataset.calif;
              document.getElementById("acad-acreditacion").value =
                btnEditar.dataset.acreditacion || "CN";

              // ---> INYECCIÓN SEGURA: CARGAR COMPETENCIAS AL EDITAR <---
              let maxActivo = 0;
              for (let i = 1; i <= 10; i++) {
                // Leemos del dataset del botón
                const val = btnEditar.dataset[`c${i}`];
                const inputDom = document.getElementById(`acad-c${i}`);
                if (inputDom) {
                  // Si el valor no es nulo ni vacío, lo asignamos
                  if (
                    val &&
                    val !== "null" &&
                    val !== "undefined" &&
                    val !== ""
                  ) {
                    inputDom.value = val;
                    maxActivo = i; // Detectamos hasta qué casilla se usó
                  } else {
                    inputDom.value = "";
                  }
                }
              }

              // Usamos nombres únicos para evitar choques de variables
              const elSwitch = document.getElementById("acad-switch-modalidad");
              const elSelectUnidades = document.getElementById(
                "acad-select-num-competencias",
              );

              if (maxActivo > 0) {
                // Encendemos el modo competencias
